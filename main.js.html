  function submitLoginForm_(event) {
    var userId;
    var password;
    var loginBtn = document.getElementById('loginBtn');

    event.preventDefault();
    userId = String(getFieldValue_('login_user_id') || '').trim().toUpperCase();
    password = String(getFieldValue_('login_password') || '');

    if (!userId) {
      setStatusText_('Masukkan User ID terlebih dahulu');
      renderUnauthorizedMessage_('User ID wajib diisi untuk masuk ke webapp.');
      return;
    }

    if (!password) {
      setStatusText_('Masukkan password terlebih dahulu');
      renderUnauthorizedMessage_('Password wajib diisi untuk masuk ke webapp.');
      return;
    }

    loginBtn.disabled = true;
    setStatusText_('Memeriksa kredensial login...');

    if (LAST_ASYNC_STATUS_TIMER) {
      clearTimeout(LAST_ASYNC_STATUS_TIMER);
    }
    LAST_ASYNC_STATUS_TIMER = setTimeout(function() {
      try {
        loginBtn.disabled = false;
        setStatusText_('Gagal login (timeout)');
        renderUnauthorizedMessage_('Login tidak mendapat respon. Coba refresh halaman (Ctrl+F5) atau cek log eksekusi Apps Script.');
      } catch (error) {
        // ignore
      }
    }, 15000);

    google.script.run
      .withSuccessHandler(function(profile) {
        if (LAST_ASYNC_STATUS_TIMER) {
          clearTimeout(LAST_ASYNC_STATUS_TIMER);
          LAST_ASYNC_STATUS_TIMER = null;
        }
        loginBtn.disabled = false;
        syncCurrentUser_(profile);

        if (!appState.currentUser.authorized) {
          clearSavedUserSession_();
          setStatusText_('Akses belum aktif');
          renderUnauthorizedMessage_('User ID ' + userId + ' belum terdaftar aktif di MASTER_USER.');
          renderUnauthorizedState_();
          return;
        }

        saveUserSession_(appState.currentUser.user_id);
        setFieldValue_('login_password', '');
        applyCurrentUserAccess_();
        setStatusText_('User berhasil masuk');
        renderResult_('Siap digunakan oleh ' + (appState.currentUser.nama_user || appState.currentUser.user_id), false);
        loadAllData_();
      })
      .withFailureHandler(function(error) {
        if (LAST_ASYNC_STATUS_TIMER) {
          clearTimeout(LAST_ASYNC_STATUS_TIMER);
          LAST_ASYNC_STATUS_TIMER = null;
        }
        loginBtn.disabled = false;
        clearSavedUserSession_();
        setStatusText_('Gagal login');
        renderUnauthorizedMessage_('Gagal login: ' + error.message);
      })
      .loginFromDashboard({
        user_id: userId,
        password: password
      });

  function collectSalesItemDraft_() {
    calculateTotals_();

    var namaItem = String(getFieldValue_('item') || '').trim();
    var qty = Number(getFieldValue_('qty') || 0);
    var harga = parseCurrencyInput_(getFieldValue_('harga'));
    var diskonTipe = normalizeDiscountType_(getFieldValue_('diskon_tipe'));
    var diskonInput = getDiscountInputValue_(diskonTipe, getFieldValue_('diskon'));
    var grossSubtotal = qty * harga;
    var diskon = calculateDiscountNominal_(grossSubtotal, diskonTipe, diskonInput);
    var diskonPersen = grossSubtotal > 0 ? (diskon / grossSubtotal) * 100 : 0;
    var subtotal = parseCurrencyInput_(getFieldValue_('line_subtotal'));
    var product = getProductByName_(namaItem);
    var hargaDasar = Number(product && (product.harga_dasar || product.harga_default) || 0);

    if (!namaItem) {
      return { validationMessage: 'Produk wajib dipilih sebelum menambah item.' };
    }

    if (!product) {
      return { validationMessage: 'Produk tidak ditemukan di master item.' };
    }

    if (hargaDasar <= 0 && harga > 0) {
      hargaDasar = harga;
    }

    if (hargaDasar <= 0) {
      return { validationMessage: 'Harga dasar produk belum diinput approver. Hubungi approver untuk melengkapi harga dasar item.' };
    }

    if (qty <= 0) {
      return { validationMessage: 'Qty item harus lebih dari 0.' };
    }

    if (harga < 0) {
      return { validationMessage: 'Harga item tidak boleh negatif.' };
    }

    if (diskonInput < 0) {
      return { validationMessage: 'Diskon item tidak boleh negatif.' };
    }

    if (diskon > grossSubtotal) {
      return { validationMessage: 'Diskon item maksimal 100%.' };
    }

    return {
      validationMessage: '',
      item: {
        kode_item: product ? product.kode_item || '' : '',
        nama_item: namaItem,
        qty: qty,
        satuan: product ? product.satuan || '' : '',
        harga: harga,
        harga_dasar: hargaDasar,
        diskon: diskon,
        diskon_persen: diskonPersen,
        diskon_tipe: diskonTipe,
        diskon_input: diskonInput,
        butuh_persetujuan_harga: harga < hargaDasar,
        subtotal: subtotal
      }
    };
  }

  function validateAgentFormPayload_(payload) {
    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order customer wajib ditambahkan.';
    }

    if (String(payload.jenis_customer || '') === 'Lama' && !String(payload.customer_id || '').trim()) {
      return 'Pilih customer lama dari hasil pencarian.';
    }

    if (!String(payload.tanggal_kirim_rencana || '').trim()) {
      return 'Tanggal Kirim Rencana wajib diisi.';
    }

    if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
      return 'Tanggal Jatuh Tempo wajib diisi.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    if (!String(payload.nama_customer_input || '').trim()) {
      return 'Nama Cust / Customer wajib diisi untuk customer baru.';
    }

    if (!String(payload.pic_customer || '').trim()) {
      return 'PIC Customer wajib diisi untuk customer baru.';
    }

    if (!String(payload.alamat_kirim || '').trim()) {
      return 'Alamat Kirim wajib diisi untuk customer baru.';
    }

    if (!String(payload.no_hp_customer || '').trim()) {
      return 'No. HP Customer wajib diisi untuk customer baru.';
    }

    return '';
  }

  function validateSalesFormPayload_(payload) {
    var requiredNewCustomerFields;

    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order wajib ditambahkan.';
    }

    if (!String(payload.tanggal_kirim_rencana || '').trim()) {
      return 'Tanggal Kirim Rencana wajib diisi.';
    }

    if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
      return 'Tanggal Jatuh Tempo wajib diisi.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    requiredNewCustomerFields = [
      { key: 'nama_customer_input', label: 'Nama Customer' },
      { key: 'pic_customer', label: 'PIC Customer' },
      { key: 'alamat_kirim', label: 'Alamat Kirim' },
      { key: 'no_hp_customer', label: 'No. HP Customer' },
      { key: 'link_google_maps', label: 'Link Google Maps' }
    ];

    for (var i = 0; i < requiredNewCustomerFields.length; i += 1) {
      if (!String(payload[requiredNewCustomerFields[i].key] || '').trim()) {
        return requiredNewCustomerFields[i].label + ' wajib diisi untuk customer baru.';
      }
    }

    return '';
  }

      'ID Customer: ' + (result.customer_id || '-'),
      'Jumlah Item: ' + String(result.jumlah_item || 0),
      'Status Order: ' + statusOrder,
      'Tanggal Jatuh Tempo: ' + (result.tanggal_jatuh_tempo || '-'),
      'Butuh Persetujuan: ' + result.butuh_persetujuan
    ];

    if (result.alasan_hold) {
      lines.push('Alasan Hold: ' + result.alasan_hold);
    }

    if (currentUserIsFreelance_()) {
      lines.push('Jenis Komisi: ' + (result.jenis_komisi_order || '-'));
      lines.push('Estimasi Komisi: ' + formatCommissionDisplayText_(result));
      lines.push('Status Komisi: ' + (result.status_komisi || '-'));

    renderSalesSubmitResult_(result, {
      isWarning: isWarning,
      statusOrder: statusOrder
    });
    renderGlobalResultOnly_(lines.join('\n'), isWarning);

  function renderSalesSubmitResult_(result, options) {
    var card = document.getElementById('resultCard');
    var content = document.getElementById('resultContent');
    var safeOptions = options || {};
    var statusOrder = String(safeOptions.statusOrder || result.status_order || '-').trim() || '-';
    var isWarning = !!safeOptions.isWarning;
    var statusBadgeHtml = buildStatusBadge_(statusOrder);
    var guidanceHtml = isWarning
      ? '<div class="submit-guidance">Tindakan: Tunggu approver menyetujui order ini sebelum diproses lebih lanjut.</div>'
      : '<div class="submit-guidance submit-guidance-ok">Tindakan: Order sudah tercatat. Lanjut pantau status order pada proses berikutnya.</div>';

    if (!card || !content) {
      return;
    }

    card.classList.toggle('result-card-warning', isWarning);
    card.classList.toggle('result-card-success', !isWarning);

    content.className = isWarning ? 'result-warn sales-submit-result' : 'result-ok sales-submit-result';
    content.innerHTML = '' +
      '<div class="submit-kicker">' + (isWarning ? 'Perlu perhatian sales' : 'Order berhasil diproses') + '</div>' +
      '<div class="submit-meta-line"><strong>No. SO:</strong> ' + escapeHtml_(result.no_so || '-') + '</div>' +
      '<div class="submit-meta-line"><strong>ID Customer:</strong> ' + escapeHtml_(result.customer_id || '-') + '</div>' +
      '<div class="submit-meta-line"><strong>Jumlah Item:</strong> ' + escapeHtml_(String(result.jumlah_item || 0)) + '</div>' +
      '<div class="submit-meta-line submit-status-line"><strong>Status Order:</strong> ' + statusBadgeHtml + '</div>' +
      '<div class="submit-meta-line"><strong>Tanggal Jatuh Tempo:</strong> ' + escapeHtml_(result.tanggal_jatuh_tempo || '-') + '</div>' +
      '<div class="submit-meta-line"><strong>Butuh Persetujuan:</strong> ' + escapeHtml_(result.butuh_persetujuan || '-') + '</div>' +
      (currentUserIsFreelance_()
        ? '<div class="submit-commission-grid">' +
            '<div class="submit-meta-line"><strong>Jenis Komisi:</strong> ' + escapeHtml_(result.jenis_komisi_order || '-') + '</div>' +
            '<div class="submit-meta-line"><strong>Estimasi Komisi:</strong> ' + escapeHtml_(formatCommissionDisplayText_(result)) + '</div>' +
            '<div class="submit-meta-line submit-status-line"><strong>Status Komisi:</strong> ' + buildStatusBadge_(result.status_komisi || '-') + '</div>' +
          '</div>'
        : '') +
      (result.alasan_hold
        ? '<div class="submit-meta-line submit-alasan-hold"><strong>Alasan Hold:</strong> ' + escapeHtml_(result.alasan_hold || '-') + '</div>'
        : '') +
      guidanceHtml;
  }

  function showToast_(message, type, title) {
    var stack = document.getElementById('appToastStack');
    var toastId = 'toast-' + String(Date.now()) + '-' + String(Math.floor(Math.random() * 10000));
    var toast;
    var tone = String(type || 'info').trim() || 'info';

    if (!stack || !message) {
      return;
    }

    toast = document.createElement('div');
    toast.className = 'app-toast app-toast-' + tone;
    toast.setAttribute('role', 'status');
    toast.setAttribute('data-toast-id', toastId);
    toast.innerHTML =
      '<div class="app-toast-title">' + escapeHtml_(String(title || getToastDefaultTitle_(tone))) + '</div>' +
      '<div class="app-toast-message">' + escapeHtml_(String(message || '')) + '</div>';

    stack.appendChild(toast);

    toastHideTimers_[toastId] = window.setTimeout(function() {
      removeToast_(toastId);
    }, 2800);
  }

  function removeToast_(toastId) {
    var stack = document.getElementById('appToastStack');
    var toast;

    if (!stack || !toastId) {
      return;
    }

    if (toastHideTimers_[toastId]) {
      clearTimeout(toastHideTimers_[toastId]);
      delete toastHideTimers_[toastId];
    }

    toast = stack.querySelector('[data-toast-id="' + toastId + '"]');
    if (toast && toast.parentNode) {
      toast.parentNode.removeChild(toast);
    }
  }

  function getToastDefaultTitle_(type) {
    var tone = String(type || 'info').trim().toLowerCase();

    if (tone === 'success') {
      return 'Berhasil';
    }

    if (tone === 'warning') {
      return 'Perlu Perhatian';
    }

    return 'Info';
  }

  function applyCurrentUserAccess_() {
    var currentUser = appState.currentUser || {};
    var roleKey = currentUser.role_key || '';
    var summary = 'Belum login';
    var appTabs = document.getElementById('appTabs');

    if (currentUser.authorized) {
      summary = (currentUser.nama_user || currentUser.user_id || '-') + ' | ' + (currentUser.role || '-') + ' | ' + (currentUser.user_id || '-');
    }

    setText_('userSummary', summary);
    document.getElementById('logoutBtn').classList.toggle('hidden', !currentUser.authorized);
    document.getElementById('authNotice').classList.toggle('hidden', !!currentUser.authorized);
    if (appTabs) {
      appTabs.classList.toggle('hidden', !currentUser.authorized);
    }

    document.querySelectorAll('.tab-btn').forEach(function(button) {
      var allowed = elementAllowsRole_(button, roleKey);
      button.classList.toggle('hidden', !allowed);
      button.disabled = !allowed;
    });

    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.toggle('hidden', !elementAllowsRole_(panel, roleKey));
      panel.classList.remove('active');
    });

    if (currentUser.authorized) {
      if (roleKey === 'cs_admin') {
        activateAdminView_('operations');
      }
      if (roleKey === 'approver') {
        activateApproverView_('approval');
      }
      if (roleKey === 'sales') {
        activateSalesView_(currentUserIsSlfMurni_() ? 'order' : 'activity');
      }
      if (roleKey === 'sales' || roleKey === 'approver' || roleKey === 'cs_admin' || roleKey === 'controller' || roleKey === 'mtr') {
        activateTab_(roleKey === 'cs_admin' ? 'admin' : (roleKey === 'mtr' ? 'controller' : roleKey));
      }
    }
  }

  function elementAllowsRole_(element, roleKey) {
    var roles = String(element && element.dataset ? element.dataset.role || '' : '')
      .split(/\s+/)
      .filter(Boolean);

    return roles.indexOf(roleKey) !== -1;
  }

  function renderUnauthorizedState_() {
    applyCurrentUserAccess_();
    document.getElementById('authNotice').classList.remove('hidden');
    setFieldValue_('login_user_id', appState.currentUser && appState.currentUser.user_id ? appState.currentUser.user_id : loadSavedUserSession_());
    setFieldValue_('login_password', '');
    renderUnauthorizedMessage_(
      'Silahkan Login Dengan ID dan password anda'
    );
    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.classList.add('hidden');
    });
    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.remove('active');
      panel.classList.add('hidden');
    });

  function saveUserSession_(userId) {
    var normalizedUserId = String(userId || '').trim().toUpperCase();

    appState.sessionUserId = normalizedUserId;

    try {
      localStorage.setItem(APP_USER_STORAGE_KEY, normalizedUserId);
    } catch (error) {
      // Browser mobile tertentu kadang membatasi storage untuk halaman Apps Script.
    }
  }

  function loadSavedUserSession_() {
    var userId = '';

    try {
      userId = String(localStorage.getItem(APP_USER_STORAGE_KEY) || '').trim().toUpperCase();
    } catch (error) {
      userId = '';
    }

  function getFilteredDeliveryOrders_() {
    var filterDate = normalizeDateKey_(appState.deliveryFilterDate);
    var statusFilter = normalizeSearchText_(appState.deliveryStatusFilter || '');
    var verificationFilter = normalizeSearchText_(appState.deliveryVerificationFilter || '');
    var rows = appState.deliveryOrders.slice();

    if (filterDate) {
      rows = rows.filter(function(row) {
        return getDeliveryDateKey_(row) === filterDate;
      });
    }

    if (statusFilter) {
      rows = rows.filter(function(row) {
        return normalizeSearchText_(row && row.status_kirim) === statusFilter;
      });
    }

    if (verificationFilter) {
      rows = rows.filter(function(row) {
        return normalizeSearchText_((row && row.status_verifikasi_cs) || 'Belum Dicek') === verificationFilter;
      });
    }

    return rows.sort(compareDeliveryOrdersLatestFirst_);
  }

  function getDeliveryDateKey_(row) {
    return normalizeDateKey_(row && (row.tanggal_kirim || row.tanggal_cetak || ''));
  }

  function compareDeliveryOrdersLatestFirst_(left, right) {
    var leftDeliveryDate = getDeliveryDateKey_(left) || '0000-00-00';
    var rightDeliveryDate = getDeliveryDateKey_(right) || '0000-00-00';
    var leftCreatedAt = getDeliveryCreatedAtSortKey_(left);
    var rightCreatedAt = getDeliveryCreatedAtSortKey_(right);
    var leftNoSj = String(left && left.no_surat_jalan || '');
    var rightNoSj = String(right && right.no_surat_jalan || '');

    if (leftDeliveryDate !== rightDeliveryDate) {
      return rightDeliveryDate.localeCompare(leftDeliveryDate);
    }

    if (leftCreatedAt !== rightCreatedAt) {
      return rightCreatedAt.localeCompare(leftCreatedAt);
    }

    return rightNoSj.localeCompare(leftNoSj, 'id-ID');
  }

  function getDeliveryCreatedAtSortKey_(row) {
    var createdAt = String(row && row.tanggal_cetak || '').trim();
    var dateKey = normalizeDateKey_(createdAt) || getDeliveryDateKey_(row) || '0000-00-00';
    var timeMatch = createdAt.match(/(?:T|\s)(\d{2}):(\d{2})(?::(\d{2}))?/);
    var timeKey = timeMatch
      ? [timeMatch[1], timeMatch[2], timeMatch[3] || '00'].join(':')
      : '00:00:00';

    return dateKey + 'T' + timeKey;
  }

  function normalizeDeliverySearchQuery_() {
    return normalizeSearchText_(appState.deliverySearch || '');
  }

  function getFilteredSearchedDeliveryOrders_(baseRows) {
    var rows = Array.isArray(baseRows) ? baseRows : getFilteredDeliveryOrders_();
    var query = normalizeDeliverySearchQuery_();

    if (query.length < 2) {
      return rows;
    }

    return rows.filter(function(row) {
      var haystacks = [
        row && row.no_surat_jalan,
        row && row.no_so,
        row && row.nama_customer
      ];

      return haystacks.some(function(value) {
        return normalizeSearchText_(value).indexOf(query) !== -1;
      });
    });
  }

  function getDeliveryPageTotal_(rows) {
    var sourceRows = Array.isArray(rows) ? rows : getFilteredSearchedDeliveryOrders_();
    return Math.max(1, Math.ceil((sourceRows.length || 0) / DELIVERY_PAGE_SIZE));
  }

  function normalizeDeliveryPage_(totalPages) {
    var maxPage = Number(totalPages || getDeliveryPageTotal_());
    var currentPage = Number(appState.deliveryPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > maxPage) {
      currentPage = maxPage;
    }

    appState.deliveryPage = currentPage;
    return currentPage;
  }

  function handleDeliveryPageChange_(direction) {
    var totalPages = getDeliveryPageTotal_();
    var nextPage = normalizeDeliveryPage_(totalPages) + Number(direction || 0);

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.deliveryPage) {
      return;
    }

    appState.deliveryPage = nextPage;
    renderDeliveryTable_();
  }

  function getSortedCustomersByName_(customers) {
    return (Array.isArray(customers) ? customers.slice() : []).sort(function(left, right) {
      var leftName = normalizeSearchText_(left && left.nama_customer);
      var rightName = normalizeSearchText_(right && right.nama_customer);

      if (leftName < rightName) return -1;
      if (leftName > rightName) return 1;

      return String(left && left.kode_customer || '').localeCompare(String(right && right.kode_customer || ''), 'id-ID');
    });
  }

  function renderSalesCustomerSearchResults_(query) {
    var container = document.getElementById('customerSearchResults');
    var selectedCustomerId = getFieldValue_('customer_id');
    var normalizedQuery = normalizeSearchText_(query);
    var filteredCustomers;
    var emptyMessage = currentUserIsFreelance_()
      ? 'Ketik minimal 2 huruf untuk mencari customer milik Anda.'
      : 'Ketik minimal 2 huruf untuk mencari customer lama.';
    var continueMessage = currentUserIsFreelance_()
      ? 'Lanjutkan ketik minimal 2 huruf agar daftar customer milik Anda muncul.'
      : 'Lanjutkan ketik minimal 2 huruf agar hasil customer muncul.';
    var notFoundMessage = currentUserIsFreelance_()
      ? 'Customer tidak ditemukan. Coba ketik nama, kode customer, PIC, atau no. HP dari customer milik Anda.'
      : 'Customer tidak ditemukan. Coba ketik nama, kode customer, PIC, atau no. HP.';

    if (!container) return;

    if (!normalizedQuery) {
      container.innerHTML = '<div class="customer-search-empty">' + emptyMessage + '</div>';
      return;
    }

    if (normalizedQuery.length < 2) {
      container.innerHTML = '<div class="customer-search-empty">' + continueMessage + '</div>';
      return;
    }

    filteredCustomers = filterCustomersByQuery_(query).slice(0, 10);

    if (!filteredCustomers.length) {
      container.innerHTML = '<div class="customer-search-empty">' + notFoundMessage + '</div>';
      return;
    }

    container.innerHTML = filteredCustomers.map(function(customer) {
      var meta = [
        String(customer.kode_customer || '').trim(),
        String(customer.pic || '').trim(),
        String(customer.no_hp || '').trim()
      ].filter(function(value) {
        return value !== '';
      }).join(' | ');

      return '' +
        '<button type="button" class="customer-search-option' + (selectedCustomerId === customer.kode_customer ? ' active' : '') + '" onclick="selectCustomerFromSearch_(\'' + escapeJs_(customer.kode_customer) + '\')">' +
          '<strong>' + escapeHtml_(customer.nama_customer || '-') + '</strong>' +
          '<small>' + escapeHtml_(meta || String(customer.alamat || '-').trim() || '-') + '</small>' +
        '</button>';
    }).join('');
  }

  function filterCustomersByQuery_(query) {
    var normalizedQuery = normalizeSearchText_(query);

    return getSortedCustomersByName_(appState.customers).filter(function(customer) {
      var haystack = [
        customer.nama_customer,
        customer.kode_customer,
        customer.pic,
        customer.no_hp
      ].map(normalizeSearchText_).join(' ');

      if (!normalizedQuery) {
        return true;
      }

      return haystack.indexOf(normalizedQuery) !== -1;
    });
  }

  function formatShortDateTimeId_(value) {

  function copyTextToClipboard_(text, onSuccess, onFailure) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(onFailure);
      return;
    }

    var tempArea = document.createElement('textarea');
    tempArea.value = text;
    tempArea.setAttribute('readonly', 'readonly');
    tempArea.style.position = 'fixed';
    tempArea.style.top = '-9999px';
    document.body.appendChild(tempArea);
    tempArea.focus();
    tempArea.select();

    try {
      document.execCommand('copy');
      document.body.removeChild(tempArea);
      onSuccess();
    } catch (error) {
      document.body.removeChild(tempArea);
      onFailure(error);
    }
  }

    var link = document.createElement('a');

    link.href = url;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function getControllerPresetRange_(presetKey) {
    var today = new Date();
    var start;
    var end;
    var monthStart;
    var monthEnd;

    function toIso(dateValue) {
      return [
        dateValue.getFullYear(),
        padNumber_(dateValue.getMonth() + 1),
        padNumber_(dateValue.getDate())
      ].join('-');
    }

    if (presetKey === 'week') {
      start = new Date(today);
      start.setDate(today.getDate() - ((today.getDay() + 6) % 7));
      end = new Date(today);
      return { startDate: toIso(start), endDate: toIso(end) };
    }

    if (presetKey === 'month') {
      monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      return { startDate: toIso(monthStart), endDate: toIso(end) };
    }

    if (presetKey === 'last_month') {
      monthStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      monthEnd = new Date(today.getFullYear(), today.getMonth(), 0);
      return { startDate: toIso(monthStart), endDate: toIso(monthEnd) };
    }

    if (presetKey === 'all') {
      return { startDate: '', endDate: '' };
    }

    return { startDate: toIso(today), endDate: toIso(today) };
  }

  function renderMtrSalesMovementMap_() {
    var data = appState.mtrMapData || {};
    var routes = Array.isArray(data.routes) ? data.routes : [];
    var canvas = document.getElementById('mtrSalesMap');
    var placeholder = document.getElementById('mtrMapPlaceholder');

    renderMtrMapSummary_(routes);
    renderMtrMapTimeline_(routes);

    if (!canvas) {
      return;
    }

    if (window.__mapLibreScriptFailed || typeof maplibregl === 'undefined') {
      if (placeholder) {
        placeholder.textContent = 'MapLibre gagal dimuat. Cek koneksi internet lalu refresh.';
        placeholder.classList.remove('hidden');
      }
      return;
    }

    if (!mtrSalesMapInstance_) {
      mtrSalesMapInstance_ = new maplibregl.Map({
        container: 'mtrSalesMap',
        style: 'https://tiles.openfreemap.org/styles/bright',
        center: [106.816666, -6.2],
        zoom: 10,
        attributionControl: true
      });
      mtrSalesMapInstance_.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
      mtrSalesMapInstance_.addControl(new maplibregl.FullscreenControl(), 'top-right');
      mtrSalesMapInstance_.on('load', function() {
        drawMtrSalesMovementMap_(routes);
      });
      return;
    }

    if (!mtrSalesMapInstance_.loaded()) {
      mtrSalesMapInstance_.once('load', function() {
        drawMtrSalesMovementMap_(routes);
      });
      return;
    }

    drawMtrSalesMovementMap_(routes);
  }

  function drawMtrSalesMovementMap_(routes) {
    var bounds = null;
    var colors = ['#2563eb', '#059669', '#d97706', '#7c3aed', '#dc2626', '#0891b2'];
    var pointCount = 0;

    clearMtrSalesMovementMap_();

    (routes || []).forEach(function(route, routeIndex) {
      var points = Array.isArray(route.points) ? route.points : [];
      var coordinates = [];
      var routeColor = colors[routeIndex % colors.length];

      points.forEach(function(point, pointIndex) {
        var lng = Number(point.longitude);
        var lat = Number(point.latitude);

        if (isNaN(lng) || isNaN(lat)) {
          return;
        }

        coordinates.push([lng, lat]);
        pointCount += 1;
        addMtrSalesMovementMarker_(route, point, pointIndex, routeColor);

        if (!bounds) {
          bounds = new maplibregl.LngLatBounds([lng, lat], [lng, lat]);
        } else {
          bounds.extend([lng, lat]);
        }
      });

      if (coordinates.length >= 2) {
        addMtrSalesMovementRoute_(route.sales_id || routeIndex, coordinates, routeColor);
      }
    });

    setText_('mtrMapPlaceholder', pointCount ? '' : 'Belum ada titik GPS untuk filter ini.');
    var placeholder = document.getElementById('mtrMapPlaceholder');
    if (placeholder) {
      placeholder.classList.toggle('hidden', !!pointCount);
    }

    if (bounds) {
      mtrSalesMapInstance_.fitBounds(bounds, {
        padding: { top: 42, right: 42, bottom: 42, left: 42 },
        maxZoom: 15,
        duration: 600
      });
    }
  }

  function clearMtrSalesMovementMap_() {
    if (!mtrSalesMapInstance_) {
      return;
    }

    mtrSalesMapMarkers_.forEach(function(marker) {
      marker.remove();
    });
    mtrSalesMapMarkers_ = [];

    mtrSalesMapRouteIds_.forEach(function(ids) {
      try {
        if (mtrSalesMapInstance_.getLayer(ids.layerId)) {
          mtrSalesMapInstance_.removeLayer(ids.layerId);
        }
        if (mtrSalesMapInstance_.getSource(ids.sourceId)) {
          mtrSalesMapInstance_.removeSource(ids.sourceId);
        }
      } catch (error) {
        // Abaikan cleanup map yang sudah berubah state.
      }
    });
    mtrSalesMapRouteIds_ = [];
  }

  function addMtrSalesMovementRoute_(salesId, coordinates, color) {
    var safeId = String(salesId || 'route').replace(/[^a-zA-Z0-9_-]+/g, '-');
    var sourceId = 'mtr-route-source-' + safeId;
    var layerId = 'mtr-route-layer-' + safeId;

    mtrSalesMapInstance_.addSource(sourceId, {
      type: 'geojson',
      data: {
        type: 'Feature',
        properties: {},
        geometry: {
          type: 'LineString',
          coordinates: coordinates
        }
      }
    });

    mtrSalesMapInstance_.addLayer({
      id: layerId,
      type: 'line',
      source: sourceId,
      layout: {
        'line-join': 'round',
        'line-cap': 'round'
      },
      paint: {
        'line-color': color,
        'line-width': 4,
        'line-opacity': 0.78
      }
    });

    mtrSalesMapRouteIds_.push({ sourceId: sourceId, layerId: layerId });
  }

  function addMtrSalesMovementMarker_(route, point, pointIndex, routeColor) {
    var el = document.createElement('button');
    var markerClass = getMtrMapMarkerClass_(point, pointIndex, route.points || []);
    var lng = Number(point.longitude);
    var lat = Number(point.latitude);
    var marker;
    var popupHtml;

    el.type = 'button';
    el.className = 'mtr-map-marker ' + markerClass;
    el.textContent = String(pointIndex + 1);
    el.style.borderColor = routeColor;
    el.title = (route.nama_sales || '-') + ' - ' + (point.jam || '-');

    popupHtml = '' +
      '<div class="mtr-map-popup">' +
        '<strong>' + escapeHtml_(route.nama_sales || route.sales_id || '-') + '</strong>' +
        '<small>' + escapeHtml_((point.jam || '-') + ' | ' + (point.tipe_aktivitas || '-')) + '</small>' +
        (point.nama_customer ? '<p>Customer: ' + escapeHtml_(point.nama_customer) + '</p>' : '') +
        (point.hasil_kegiatan ? '<p>Hasil: ' + escapeHtml_(point.hasil_kegiatan) + '</p>' : '') +
        '<p>Status waktu: ' + escapeHtml_(point.status_waktu || '-') + '</p>' +
        '<p>Status lokasi: ' + escapeHtml_(point.status_lokasi || '-') + '</p>' +
        '<p>Perangkat: ' + escapeHtml_(point.status_perangkat || '-') + '</p>' +
        (point.link_maps ? '<a href="' + escapeHtml_(point.link_maps) + '" target="_blank" rel="noopener">Buka Google Maps</a>' : '') +
      '</div>';

    marker = new maplibregl.Marker({ element: el })
      .setLngLat([lng, lat])
      .setPopup(new maplibregl.Popup({ offset: 18, closeButton: false }).setHTML(popupHtml))
      .addTo(mtrSalesMapInstance_);

    mtrSalesMapMarkers_.push(marker);
  }

  function getMtrMapMarkerClass_(point, pointIndex, points) {
    var typeKey = String(point && point.tipe_aktivitas || '').toLowerCase();

    if (point && point.severity === 'alert') {
      return 'marker-alert';
    }
    if (point && point.severity === 'warning') {
      return 'marker-warning';
    }
    if (typeKey.indexOf('selesai') !== -1 || pointIndex === points.length - 1) {
      return 'marker-end';
    }
    if (typeKey.indexOf('mulai') !== -1 || pointIndex === 0) {
      return 'marker-start';
    }
    if (typeKey.indexOf('catat') !== -1 || typeKey.indexOf('kegiatan') !== -1) {
      return 'marker-work';
    }
    return 'marker-update';
  }

  function renderMtrMapSummary_(routes) {
    var container = document.getElementById('mtrMapSummary');
    var routeCount = (routes || []).length;
    var pointCount = 0;
    var distance = 0;
    var anomalyCount = 0;
    var selectedSales = getFieldValue_('mtrMapSales') || appState.mtrMapSales || '';

    if (!container) {
      return;
    }

    (routes || []).forEach(function(route) {
      pointCount += Number(route.total_points || 0);
      distance += Number(route.total_distance_km || 0);
      anomalyCount += Number(route.total_anomali || 0);
    });

    container.innerHTML = '' +
      '<span class="summary-label">Ringkasan Peta</span>' +
      '<strong>' + escapeHtml_(pointCount) + ' titik GPS</strong>' +
      '<small>' + escapeHtml_(routeCount) + ' sales ditampilkan' + (selectedSales ? ' | ' + escapeHtml_(selectedSales) : '') + '</small>' +
      '<div class="mtr-map-summary-grid">' +
        '<span><b>' + escapeHtml_(roundClientNumber_(distance, 2)) + ' km</b><small>estimasi jarak</small></span>' +
        '<span><b>' + escapeHtml_(anomalyCount) + '</b><small>anomali</small></span>' +
      '</div>';
  }

  function renderMtrMapTimeline_(routes) {
    var container = document.getElementById('mtrMapTimeline');
    var points = [];

    if (!container) {
      return;
    }

    (routes || []).forEach(function(route) {
      (route.points || []).forEach(function(point) {
        points.push({
          route: route,
          point: point
        });
      });
    });

    points.sort(function(left, right) {
      return String(left.point.jam || '').localeCompare(String(right.point.jam || ''));

  function getControllerTrendSeries_(rows) {
    var sourceRows = Array.isArray(rows) ? rows : [];
    var normalizedMap = {};
    var latestDateKey = '';
    var anchorDate;
    var result = [];
    var index;
    var currentDate;
    var dateKey;
    var sourceRow;

    sourceRows.forEach(function(row) {
      var rowDateKey = normalizeDateKey_(row.tanggal || '');

      if (!rowDateKey) {
        return;
      }

      normalizedMap[rowDateKey] = row;
      if (!latestDateKey || rowDateKey > latestDateKey) {
        latestDateKey = rowDateKey;
      }
    });

    anchorDate = parseIsoDateToLocal_(latestDateKey || getTodayIsoDate_());

    for (index = 6; index >= 0; index -= 1) {
      currentDate = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate() - index);
      dateKey = [
        currentDate.getFullYear(),
        String(currentDate.getMonth() + 1).padStart(2, '0'),
        String(currentDate.getDate()).padStart(2, '0')
      ].join('-');
      sourceRow = normalizedMap[dateKey] || {};
      result.push({
        tanggal: dateKey,
        shortLabel: formatShortDateLabelId_(dateKey),
        label: formatShortDateId_(dateKey),
        so_count: Number(sourceRow.so_count || 0),
        omzet: Number(sourceRow.omzet || 0),
        value: formatNumber_(sourceRow.so_count || 0),
        note: formatCurrencyInput_(sourceRow.omzet || 0)
      });
    }

    return result;
  }

  function parseIsoDateToLocal_(value) {
    var parts = normalizeDateKey_(value).split('-');
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || !day) {
      return new Date();
    }

    return new Date(year, monthIndex, day);
  }

          '.field .label{font-weight:900;}' +
          '.full-row{margin-top:1.2mm;font-size:8.9pt;font-weight:900;line-height:1.05;}' +
          '.full-row .label{font-weight:900;display:inline-block;width:20mm;}' +
          '.box-line{border:1.2px solid #000;min-height:7mm;max-height:10mm;padding:0.8mm 1.2mm;white-space:pre-line;font-size:8.7pt;font-weight:800;line-height:1.08;overflow:hidden;}' +
          '.section-title{font-weight:900;font-size:9.2pt;margin:1.8mm 0 0.8mm;letter-spacing:0.2px;line-height:1;}' +
          'table{width:100%;border-collapse:collapse;font-size:8.6pt;font-weight:800;line-height:1.08;table-layout:fixed;}' +
          'th,td{border:1.2px solid #000;padding:0.7mm 1mm;vertical-align:top;}' +
          'th{font-weight:900;text-align:center;}' +
          '.center{text-align:center;}' +
          '.right{text-align:right;}' +
          '.notes-box{border:1.2px solid #000;padding:0.8mm 1.2mm;min-height:6.5mm;max-height:13mm;font-size:8.5pt;font-weight:800;line-height:1.08;overflow:hidden;}' +
          '.signatures{display:grid;grid-template-columns:repeat(4,1fr);gap:2.4mm;margin-top:2.8mm;}' +
          '.sig{text-align:center;font-size:8.4pt;font-weight:900;line-height:1.05;}' +
          '.sig .top{margin-bottom:0.8mm;}' +
          '.sig .line{border-top:0;margin-bottom:0.9mm;height:10.5mm;}' +
          '.sig .bottom{display:block;}' +
          '.nota-footer{display:grid;grid-template-columns:30% 70%;gap:2.8mm;margin-top:2.8mm;align-items:end;}' +
          '.nota-note{font-size:8.2pt;font-weight:900;line-height:1.1;}' +
          '.preview-banner{border:1.2px dashed #000;background:#fff;color:#000;padding:1mm 1.4mm;margin:1mm 5.8mm 0;font-weight:900;font-size:8.8pt;display:flex;justify-content:space-between;gap:1.5mm;}' +
          '.split-grid{display:grid;grid-template-columns:62% 38%;gap:2.8mm;}' +
          '.summary table td:first-child{font-weight:900;}' +
          '.summary .grand td{font-weight:900;font-size:9pt;}' +
          '.tight td{height:5.3mm;}' +
          '.note-title{font-weight:900;margin-bottom:0.8mm;}' +
          '.surat-jalan-section{padding:2.8mm 4.5mm 2mm 4.5mm;}' +
          '.surat-jalan-section .section-header{grid-template-columns:minmax(0,1fr) 48mm;gap:2.4mm;padding-top:2.8mm;}' +
          '.surat-jalan-section .company{font-size:11.8pt;letter-spacing:-0.1px;white-space:nowrap;}' +
          '.surat-jalan-section .meta-line{font-size:8.1pt;}' +
          '.surat-jalan-section .doc-title .title{font-size:14.4pt;letter-spacing:-0.1px;}' +
          '.surat-jalan-section .doc-title .number{font-size:9.3pt;letter-spacing:-0.1px;}' +
          '.surat-jalan-section .field,.surat-jalan-section .full-row{font-size:9.4pt;}' +
          '.surat-jalan-section table{font-size:9pt;}' +
          '.surat-jalan-section th,.surat-jalan-section td{padding:0.75mm 1mm;}' +
          '.surat-jalan-section .notes-box{min-height:6.5mm;max-height:10.5mm;font-size:8.8pt;}' +
          '.nota-section{padding:8.2mm 4.5mm 2mm 4.5mm;}' +
          '.nota-section .section-header{grid-template-columns:minmax(0,1fr) 48mm;gap:2.4mm;padding-top:1.2mm;}' +
          '.nota-section .company{font-size:11.8pt;letter-spacing:-0.1px;white-space:nowrap;}' +
          '.nota-section .meta-line{font-size:8.1pt;}' +
          '.nota-section .doc-title .title{font-size:14.4pt;letter-spacing:-0.1px;}' +
          '.nota-section .doc-title .number{font-size:9.3pt;letter-spacing:-0.1px;}' +
          '.nota-section .field,.nota-section .full-row{font-size:9.3pt;}' +
          '.nota-section .field{grid-template-columns:22mm 2mm 1fr;}' +
          '.nota-section table{font-size:8.8pt;}' +
          '.nota-section th,.nota-section td{padding:0.7mm 0.9mm;}' +
          '.nota-section .box-line{min-height:6.5mm;max-height:8.5mm;}' +
          '.nota-section .right{white-space:nowrap;}' +
          '.nota-section .notes-box{min-height:17mm;max-height:22mm;font-size:8.6pt;}' +
          '.nota-section .split-grid{grid-template-columns:58% 42%;gap:2.4mm;}' +
          '.nota-section .summary td:last-child{width:30mm;white-space:nowrap;}' +
          '.nota-section .summary .grand td{font-size:9.2pt;}' +
          '.nota-section .nota-footer{grid-template-columns:28% 72%;gap:2.4mm;margin-top:2.4mm;}' +
          '.nota-section .sig{font-size:8.2pt;}' +
          '.nota-section .sig .line{height:8.5mm;}' +
          '@media screen{body{background:#eee;padding:4mm 0}.sheet{box-shadow:0 0 0 1px #bbb}.preview-banner + .surat-jalan-section{height:132mm;padding-top:2.4mm}}' +
          '@media print{html,body{margin:0;padding:0;overflow:visible;background:#fff}.print-stack{display:block}.sheet{position:relative;width:196mm;height:126mm;margin:0 auto;box-shadow:none;overflow:hidden;page-break-before:avoid;page-break-inside:avoid;break-before:avoid;break-inside:avoid}.sheet.sheet-break{page-break-after:always;break-after:page}.preview-banner{display:none}.print-area{width:196mm;height:126mm;margin:0;overflow:hidden}.print-section{width:196mm;height:126mm;break-inside:avoid;page-break-inside:avoid;page-break-before:avoid;break-before:avoid}.print-sj-only .sheet,.print-nota-only .sheet,.print-sj-only .print-area,.print-nota-only .print-area,.print-sj-only .print-section,.print-nota-only .print-section,.print-combined-dual-page .sheet,.print-combined-dual-page .print-area,.print-combined-dual-page .print-section{width:196mm;height:126mm}.print-combined-dual-page .sheet:last-child{page-break-after:auto;break-after:auto}}' +
        '</style>' +
      '</head>' +
      '<body class="' + (isCombinedDualPage ? 'print-combined-dual-page' : (isNotaOnly ? 'print-nota-only' : 'print-sj-only')) + '">' +
        printBodyHtml +
        printAutoScript +
      '</body>' +
      '</html>';
  }

  function buildPrintAutoCloseScript_() {
    return '' +
      '<script>' +
        '(function(){' +
          'var closed=false;' +
          'function closePrintWindow(){' +
            'if(closed){return;}' +
            'closed=true;' +
            'setTimeout(function(){window.close();},250);' +
          '}' +
          'window.addEventListener("afterprint",closePrintWindow);' +
          'window.addEventListener("focus",function(){setTimeout(closePrintWindow,500);});' +
          'window.addEventListener("load",function(){' +
            'setTimeout(function(){window.print();},250);' +
          '});' +
        '})();' +
      '<\\/script>';
  }

  function buildPrintSheet_(data, options) {
    var safeOptions = options || {};
    var mode = String(safeOptions.mode || '').trim().toLowerCase();
    var isPreview = mode === 'preview_sj';
    var isNotaOnly = mode === 'nota_only';
    var isCombinedDualPage = mode === 'combined_dual_page';

    if (isCombinedDualPage) {
      return '' +
        '<div class="print-stack">' +
          '<div class="sheet sheet-break">' +
            '<div class="print-area">' +
              buildSuratJalanSection_(data) +
            '</div>' +
          '</div>' +
          '<div class="sheet">' +
            '<div class="print-area">' +
              buildNotaSection_(data) +
            '</div>' +
          '</div>' +
        '</div>';
    }

    return '' +
      '<div class="print-stack">' +
        '<div class="sheet">' +
          '<div class="print-area">' +
            (isPreview
              ? '<div class="preview-banner"><span>PREVIEW DOKUMEN</span><span>Belum dicetak</span></div>'
              : '') +
            (isNotaOnly ? buildNotaSection_(data) : buildSuratJalanSection_(data)) +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function buildSuratJalanSection_(data) {
    var detailRows = buildPrintSuratJalanRows_(data.items);
    var isPreview = String(data.status_kirim || '').trim() === 'Preview';
    var headerTitle = isPreview ? 'PREVIEW SURAT JALAN' : 'SURAT JALAN';
    var headerNumber = String(data.no_surat_jalan || '').trim() || 'Belum Dibuat';

    return '' +
      '<section class="print-section surat-jalan-section">' +
        buildPrintHeader_(headerTitle, headerNumber) +
        '<div class="fields">' +
          buildPrintField_('TANGGAL', formatPrintDate_(data.tanggal_kirim || data.tanggal_cetak || '')) +
          buildPrintField_('NO SJ', headerNumber) +
          buildPrintField_('NO SO', data.no_so || '-') +
          buildPrintField_('NO NOTA', buildPrintNotaNumber_(data)) +
          buildPrintField_('CUSTOMER', data.nama_customer || '-') +
          buildPrintField_('PIC / HP', joinPrintValues_(data.pic_customer, data.no_hp_customer, ' / ') || '-') +
        '</div>' +
        '<div class="full-row"><span class="label">ALAMAT</span>: </div>' +
        '<div class="box-line">' + escapeHtml_(data.alamat_kirim || '-') + '</div>' +
        '<div class="section-title">DETAIL BARANG</div>' +
        '<table class="tight">' +
          '<thead>' +
            '<tr><th style="width:6%">NO</th><th>DESKRIPSI BARANG</th><th style="width:10%">QTY</th><th style="width:10%">SAT</th><th style="width:19%">KET.</th></tr>' +
          '</thead>' +
          '<tbody>' + detailRows + '</tbody>' +
        '</table>' +
        '<div class="section-title">CATATAN OPERASIONAL</div>' +
        '<div class="notes-box">' + buildPrintHtmlLines_(buildSuratJalanNotes_(data) || '-') + '</div>' +
        '<div class="signatures">' +
          buildPrintSignatureBox_('SECURITY') +
          buildPrintSignatureBox_('DRIVER') +
          buildPrintSignatureBox_('GUDANG') +
          buildPrintSignatureBox_('PENERIMA', 'STEMPEL / PARAF') +
        '</div>' +
      '</section>';
  }

  function buildNotaSection_(data) {
    var detailRows = buildPrintNotaRows_(data.items);
    var subtotal = getPrintSubtotal_(data);
    var diskon = getPrintDiskon_(data);
    var total = Number(data.total || 0);

    return '' +
      '<section class="print-section nota-section">' +
        buildPrintHeader_('NOTA', buildPrintNotaNumber_(data), true) +
        '<div class="fields">' +
          buildPrintField_('TANGGAL', formatPrintDate_(data.tanggal_kirim || data.tanggal_cetak || '')) +
          buildPrintField_('NO SJ', data.no_surat_jalan || '-') +
          buildPrintField_('NO NOTA', buildPrintNotaNumber_(data)) +
          buildPrintField_('TERM', data.term_pembayaran || '-') +
          buildPrintField_('CUSTOMER', data.nama_customer || '-') +
          buildPrintField_('SALES', data.sales_nama || '-') +
        '</div>' +
        '<div class="full-row"><span class="label">ALAMAT</span>: </div>' +
        '<div class="box-line">' + escapeHtml_(data.alamat_kirim || '-') + '</div>' +
        '<table class="tight" style="margin-top:2mm;">' +
          '<thead>' +
            '<tr><th style="width:5%">NO</th><th style="width:34%">BARANG</th><th style="width:8%">QTY</th><th style="width:8%">SAT</th><th style="width:15%">HARGA</th><th style="width:12%">DISC</th><th style="width:18%">JUMLAH</th></tr>' +
          '</thead>' +
          '<tbody>' + detailRows + '</tbody>' +
        '</table>' +
        '<div class="split-grid" style="margin-top:2mm;">' +
          '<div>' +
            '<div class="notes-box">' +
              '<div class="note-title">CATATAN / TERBILANG</div>' +
              buildPrintNotaNotesHtml_(data, total) +
            '</div>' +
          '</div>' +
          '<div class="summary">' +
            '<table>' +
              '<tbody>' +
                '<tr><td colspan="2">RINGKASAN TAGIHAN</td></tr>' +
                '<tr><td>SUBTOTAL</td><td class="right">' + escapeHtml_(formatPrintMoneyPlain_(subtotal)) + '</td></tr>' +
                '<tr><td>DISKON</td><td class="right">' + escapeHtml_(formatPrintMoneyPlain_(diskon)) + '</td></tr>' +
                '<tr class="grand"><td>GRAND TOTAL</td><td class="right">' + escapeHtml_(formatPrintMoneyPlain_(total)) + '</td></tr>' +
              '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="nota-footer">' +
          '<div class="nota-note">' +
            '<div class="note-title">NOTE</div>' +
            '<div>Galon Kosong = __________ jumlah</div>' +
            '<div>PARAF: __________</div>' +
          '</div>' +
          '<div class="signatures" style="margin-top:0;">' +
            buildPrintSignatureBox_('ADMIN/SALES') +
            buildPrintSignatureBox_('FINANCE') +
            buildPrintSignatureBox_('DRIVER') +
            buildPrintSignatureBox_('PENERIMA', 'STEMPEL / PARAF') +
          '</div>' +
        '</div>' +
      '</section>';
  }

  function buildPrintSuratJalanRows_(items) {
    var details = getPrintableItems_(items);
    var rowsHtml = details.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td class="center">' + escapeHtml_(String(index + 1)) + '</td>' +
          '<td>' + escapeHtml_(item.nama_item || '-') + '</td>' +
          '<td class="center">' + escapeHtml_(formatNumber_(item.qty || 0)) + '</td>' +
          '<td class="center">' + escapeHtml_(formatPrintUnit_(item.satuan || '-')) + '</td>' +
          '<td></td>' +
        '</tr>';
    }).join('');

    return rowsHtml;
  }

  function buildPrintNotaRows_(items) {
    var details = getPrintableItems_(items);
    var rowsHtml = details.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td class="center">' + escapeHtml_(String(index + 1)) + '</td>' +
          '<td>' + escapeHtml_(item.nama_item || '-') + '</td>' +
          '<td class="center">' + escapeHtml_(formatNumber_(item.qty || 0)) + '</td>' +
          '<td class="center">' + escapeHtml_(formatPrintUnit_(item.satuan || '-')) + '</td>' +
          '<td class="right">' + escapeHtml_(formatPrintMoneyPlain_(item.harga || 0)) + '</td>' +
          '<td class="right">' + escapeHtml_(formatPrintMoneyPlain_(item.diskon || 0)) + '</td>' +
          '<td class="right">' + escapeHtml_(formatPrintMoneyPlain_(item.subtotal || 0)) + '</td>' +
        '</tr>';
    }).join('');

    return rowsHtml;
  }

  function buildPrintHeader_(title, number, compactTop) {
    return '' +
      '<div class="section-header"' + (compactTop ? ' style="padding-top:1mm;"' : '') + '>' +
        '<div class="company-block">' +
          '<div class="company-text">' +
            '<div class="company">PT ABUYAMAS TIRTA SEJAHTERA</div>' +
            '<div class="meta-line">JL. KAPLING BLOK EO NO.31 RT.01 RW.09, CIJUJUNG, SUKARAJA, BOGOR</div>' +
            '<div class="meta-line">TELP 081217002021  EMAIL airtismarketingats@gmail.com</div>' +
          '</div>' +
        '</div>' +
        '<div class="doc-title">' +
          '<div class="title">' + escapeHtml_(title || '-') + '</div>' +
          '<div class="number">' + escapeHtml_(number || '-') + '</div>' +
        '</div>' +
      '</div>';
  }

  function buildPrintField_(label, value) {
    return '' +
      '<div class="field">' +
        '<div class="label">' + escapeHtml_(label || '-') + '</div>' +
        '<div>:</div>' +
        '<div>' + escapeHtml_(value || '-') + '</div>' +
      '</div>';
  }

  function buildPrintSignatureBox_(label, topLabel) {
    return '' +
      '<div class="sig">' +
        (topLabel ? '<div class="top">' + escapeHtml_(topLabel || '-') + '</div>' : '') +
        '<div class="line"></div>' +
        '<div class="bottom">' + escapeHtml_(label || '-') + '</div>' +
      '</div>';
  }

  function getPrintableItems_(items) {
    return Array.isArray(items) && items.length ? items.slice() : [{
      nama_item: '',
      qty: '',
      satuan: '',
      harga: 0,
      diskon: 0,
      subtotal: 0
    }];
  }

  function getPrintSubtotal_(data) {
    if (Number(data.subtotal || 0) > 0) {
      return Number(data.subtotal || 0);
    }

    return getPrintableItems_(data.items).reduce(function(result, item) {
      return result + (Number(item.qty || 0) * Number(item.harga || 0));
    }, 0);
  }

  function getPrintDiskon_(data) {
    if (Number(data.diskon || 0) > 0) {
      return Number(data.diskon || 0);
    }

    return getPrintableItems_(data.items).reduce(function(result, item) {
      return result + Number(item.diskon || 0);
    }, 0);
  }

  function buildSuratJalanNotes_(data) {
    var notes = [];
    var picHp = joinPrintValues_(data.pic_customer, data.no_hp_customer, ' / ');

    if (picHp) {
      notes.push('PIC : ' + picHp);
    }

    if (data.catatan_order) {
      notes.push('ORDER : ' + data.catatan_order);
    }

    if (data.catatan_kirim) {
      notes.push('KIRIM : ' + data.catatan_kirim);
    }

    return notes.join('\n');
  }

  function formatPrintDate_(value) {
    var text = String(value || '').trim();
    var match = text.match(/^(\d{4})-(\d{2})-(\d{2})/);

    if (!match) {
      return text || '-';
    }

    return match[3] + '/' + match[2] + '/' + match[1];
  }

  function buildTerbilangRupiah_(value) {
    var amount = Math.floor(Number(value || 0));

    if (amount <= 0) {
      return 'Nol rupiah';
    }

    return toTitleCaseWords_(numberToBahasaWords_(amount).trim()) + ' rupiah';
  }

  function numberToBahasaWords_(value) {
    var angka = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan', 'sepuluh', 'sebelas'];

    value = Math.floor(Number(value || 0));

    if (value < 12) {
      return angka[value];
    }

    if (value < 20) {
      return numberToBahasaWords_(value - 10) + ' belas';
    }

    if (value < 100) {
      return numberToBahasaWords_(Math.floor(value / 10)) + ' puluh ' + numberToBahasaWords_(value % 10);
    }

    if (value < 200) {
      return 'seratus ' + numberToBahasaWords_(value - 100);
    }

    if (value < 1000) {
      return numberToBahasaWords_(Math.floor(value / 100)) + ' ratus ' + numberToBahasaWords_(value % 100);
    }

    if (value < 2000) {
      return 'seribu ' + numberToBahasaWords_(value - 1000);
    }

    if (value < 1000000) {
      return numberToBahasaWords_(Math.floor(value / 1000)) + ' ribu ' + numberToBahasaWords_(value % 1000);
    }

    if (value < 1000000000) {
      return numberToBahasaWords_(Math.floor(value / 1000000)) + ' juta ' + numberToBahasaWords_(value % 1000000);
    }

    return String(value);
  }

  function joinPrintValues_(firstValue, secondValue, separator) {
    var values = [firstValue, secondValue].filter(function(value) {
      return String(value || '').trim() !== '';
    });

    return values.join(separator || ' ');
  }

  function buildPrintNotaNumber_(data) {
    var noSo = String(data && data.no_so ? data.no_so : '').trim();

    if (!noSo) {
      return '-';
    }

    var matchedNoSo = noSo.match(/^SO-?(\d{4})(\d{2})(\d{2})(\d+)$/i);

    if (matchedNoSo) {
      return 'NT-' + matchedNoSo[4] + matchedNoSo[3] + matchedNoSo[2] + matchedNoSo[1];
    }

    return noSo.replace(/^SO/i, 'NT');
  }

  function formatPrintUnit_(value) {
    return String(value || '-').trim().toUpperCase() || '-';
  }

  function formatPrintMoneyPlain_(value) {
    return formatNumber_(Number(value || 0));
  }

  function buildPrintHtmlLines_(text) {
    return escapeHtml_(text || '-').replace(/\n/g, '<br>');
  }

  function buildPrintNotaNotesHtml_(data, total) {
    var notes = [];
    var orderNotes = joinPrintValues_(data.catatan_order, data.catatan_kirim, ' | ');

    notes.push('- PERIKSA BARANG SAAT DITERIMA.');
    notes.push('- PEMBAYARAN MENGIKUTI TERM YANG DISEPAKATI.');

    if (orderNotes) {
      notes.push('- CATATAN: ' + orderNotes);
    }

    return buildPrintHtmlLines_(notes.join('\n')) + ' &nbsp;&nbsp; <strong>' +
      escapeHtml_(buildTerbilangRupiah_(total).toUpperCase()) +
    '</strong>';
  }
</script>
