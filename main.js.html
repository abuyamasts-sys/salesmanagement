  function openBillingPaymentModal_(tagihanId, mode) {
    var row = (appState.tagihan || []).find(function(item) {
      return String(item.tagihan_id || '').trim() === String(tagihanId || '').trim();
    }) || null;

    if (!row) {
      renderResult_('Tagihan tidak ditemukan.', true);
      return;
    }

    var total = Number(row.total_tagihan || 0);
    var paid = Number(row.total_bayar || 0);
    var remaining = Number(row.sisa_tagihan || Math.max(0, total - paid));
    var customerLabel = String(row.nama_customer || '-').trim();
    var kode = String(row.kode_customer || '').trim();
    var modeKey = String(mode || '').trim().toUpperCase();

    if (kode) {
      customerLabel += ' (' + kode + ')';
    }

    appState.billingPaymentDraft = {
      tagihan_id: String(row.tagihan_id || '').trim(),
      mode: modeKey || 'CICIL',
      max: remaining
    };

    setText_('billingPaymentCustomer', customerLabel);
    setText_('billingPaymentTotal', formatCurrencyInput_(total));
    setText_('billingPaymentPaid', formatCurrencyInput_(paid));
    setText_('billingPaymentRemaining', formatCurrencyInput_(remaining));

    setText_('billingPaymentTitle', modeKey === 'LUNAS' ? 'Pelunasan Tagihan' : 'Pembayaran Tagihan');
    setText_('billingPaymentSubtitle', modeKey === 'LUNAS'
      ? 'Nominal otomatis diisi sebesar sisa tagihan.'
      : 'Masukkan nominal bayar (boleh cicil).');

    var amountEl = document.getElementById('billingPaymentAmount');
    var noteEl = document.getElementById('billingPaymentNote');

    if (noteEl) {
      noteEl.value = '';
    }

    if (amountEl) {
      if (modeKey === 'LUNAS') {
        amountEl.value = formatCurrencyInput_(remaining);
        amountEl.disabled = true;
      } else {
        amountEl.disabled = false;
        amountEl.value = '';
        amountEl.focus();
      }
    }

    var backdrop = document.getElementById('billingPaymentBackdrop');
    if (backdrop) {
      backdrop.classList.remove('hidden');
    }
  }

  function closeBillingPaymentModal_() {
    appState.billingPaymentDraft = null;
    var backdrop = document.getElementById('billingPaymentBackdrop');
    if (backdrop) {
      backdrop.classList.add('hidden');
    }
  }

  function handleBillingPaymentAmountInput_() {
    var el = document.getElementById('billingPaymentAmount');
    if (!el || el.disabled) return;

    var value = parseCurrencyInput_(el.value);
    el.value = formatCurrencyInput_(value);
  }

  function submitBillingPaymentForm_(event) {
    if (event) event.preventDefault();
    if (!ensureAuthorizedSession_()) return;

    var draft = appState.billingPaymentDraft || null;
    if (!draft || !draft.tagihan_id) {
      renderResult_('Draft pembayaran tidak ditemukan. Tutup modal dan coba lagi.', true);
      return;
    }

    var amountEl = document.getElementById('billingPaymentAmount');
    var noteEl = document.getElementById('billingPaymentNote');

    var nominal = amountEl ? parseCurrencyInput_(amountEl.value) : 0;
    var note = noteEl ? String(noteEl.value || '').trim() : '';

    if (draft.mode !== 'LUNAS' && !(nominal > 0)) {
      renderResult_('Nominal bayar harus lebih dari 0.', true);
      return;
    }

    setStatusText_('Menyimpan pembayaran...');

    var runner = google.script.run
      .withSuccessHandler(function(result) {
        setStatusText_('Pembayaran tersimpan');
        renderResult_(result && result.message ? result.message : 'Pembayaran tersimpan', false);
        closeBillingPaymentModal_();
        loadAdminBillingData_();
        loadAdminAgentFormData_();
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal simpan pembayaran');
        renderResult_('Gagal simpan pembayaran: ' + error.message, true);
      });

    if (draft.mode === 'LUNAS') {
      runner.markTagihanLunasFromDashboard(appState.currentUser.user_id, {
        tagihan_id: draft.tagihan_id,
        catatan_pelunasan: note
      });
      return;
    }

    runner.recordTagihanPaymentFromDashboard(appState.currentUser.user_id, {
      tagihan_id: draft.tagihan_id,
      nominal_bayar: nominal,
      catatan_bayar: note
    });
  }

    if (currentUserHasRole_('approver')) {

    }

    if (currentUserHasRole_('cs_admin')) {
      loadAdminOperationsData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    if (currentUserHasRole_('controller') || currentUserHasRole_('mtr')) {
      loadControllerData_(function() {
        setStatusText_(currentUserHasRole_('mtr') ? 'Dashboard monitoring siap' : 'Dashboard controller siap');
      });
      return;
    }

    setStatusText_('Role belum didukung');
    renderResult_('Role user belum dikenali oleh webapp.', true);
  }

  function loadSalesData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {

  function submitFieldActivity_(activityType, extraPayload) {
    if (!ensureAuthorizedSession_()) return;

    var buttonMap = {
      'Mulai Kerja': 'fieldStartBtn',
      'Update Lokasi': 'fieldUpdateBtn',
      'Selesai Kerja': 'fieldEndBtn',
      'Catat Kegiatan': 'fieldWorkSaveBtn'
    };
    var button = document.getElementById(buttonMap[activityType] || '');
    var extra = extraPayload || {};

    if (!navigator.geolocation) {
      renderResult_('GPS browser tidak tersedia di perangkat ini.', true);
      return;
    }

    setFieldActivityButtonsDisabled_(true);
    setStatusText_('Mengambil lokasi...');
    setText_('salesActivityNote', 'Mengambil lokasi dari HP. Pastikan izin lokasi aktif.');

    navigator.geolocation.getCurrentPosition(function(position) {
      var coords = position.coords || {};
      var payload = {
        tipe_aktivitas: activityType,
        location: {
          latitude: coords.latitude,
          longitude: coords.longitude,
          accuracy: coords.accuracy
        },
        device_id: getOrCreateFieldDeviceId_(),
        user_agent: navigator.userAgent || '',
        catatan: extra.hasil_kegiatan || ''
      };
      Object.keys(extra).forEach(function(key) {
        payload[key] = extra[key];
      });

      setStatusText_('Menyimpan aktivitas...');

      google.script.run
        .withSuccessHandler(function(result) {
          var successMessage = result && result.message ? result.message : 'Aktivitas tersimpan.';
          var updateCount = result && result.today ? Number(result.today.total_update_lokasi || 0) : 0;
          setFieldActivityButtonsDisabled_(false);
          appState.fieldActivity = {
            config: appState.fieldActivity && appState.fieldActivity.config ? appState.fieldActivity.config : null,
            today: result && result.today ? result.today : null,
            recentLogs: result && result.recentLogs ? result.recentLogs : []
          };
          renderSalesFieldActivity_();
          setStatusText_('Aktivitas tersimpan');
          renderResult_(successMessage, false);
          if (activityType === 'Update Lokasi') {
            showToast_('Update lokasi ke-' + formatNumber_(updateCount || 1) + ' berhasil dicatat.', 'success', 'Lokasi tersimpan');
            setText_('salesActivityNote', 'Lokasi berhasil dicatat. Total update lokasi hari ini: ' + formatNumber_(updateCount || 1) + '.');
          } else {
            showToast_(successMessage, 'success', 'Aktivitas tersimpan');
          }
          if (activityType === 'Catat Kegiatan') {
            setFieldValue_('fieldWorkResult', '');
          }
        })
        .withFailureHandler(function(error) {
          setFieldActivityButtonsDisabled_(false);
          setStatusText_('Gagal simpan aktivitas');
          renderResult_('Gagal simpan aktivitas: ' + (error && error.message ? error.message : error), true);
          setText_('salesActivityNote', 'Gagal menyimpan. Coba lagi saat sinyal lebih stabil.');
        })
        .recordFieldActivityFromDashboard(appState.currentUser.user_id, payload);
    }, function(error) {
      setFieldActivityButtonsDisabled_(false);
      setStatusText_('Lokasi tidak terbaca');
      renderResult_('Lokasi tidak terbaca: ' + getGeolocationErrorMessage_(error), true);
      setText_('salesActivityNote', 'Aktifkan izin lokasi, lalu tekan tombol lagi.');
      if (button) button.focus();
    }, {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    });
  }

  function getOrCreateFieldDeviceId_() {
    var storageKey = 'airtis_field_device_id';

      value = String(localStorage.getItem(storageKey) || '').trim();

        value = 'dev-' + String(Date.now()) + '-' + String(Math.floor(Math.random() * 1000000));

  function renderSalesFieldActivity_() {
    var data = appState.fieldActivity || {};
    var config = data.config || {};
    var today = data.today || {};
    var slots = Array.isArray(today.slots) ? today.slots : [];
    var nextAction = today.next_action || {};
    var status = today.status_harian || 'Belum mulai';
    var lastUpdate = today.jam_update_terakhir || '';
    var statusBadge = document.getElementById('salesActivityStatusBadge');
    var timeline = document.getElementById('salesActivityTimeline');
    var hasStarted = slots.some(function(slot) {
      return slot.type === 'Mulai Kerja' && slot.status !== 'Tidak Update';
    });
    var hasEnded = slots.some(function(slot) {
      return slot.type === 'Selesai Kerja' && slot.status !== 'Tidak Update';
    });
    var totalUpdateLokasi = Number(today.total_update_lokasi || 0);
    var totalKegiatan = Number(today.total_catatan_kegiatan_sales || 0);
    var lastLocationTime = today.jam_lokasi_terakhir || '';
    var fieldSummary = [
      { label: 'Mulai', value: today.jam_mulai || '-' },
      { label: 'Update', value: formatNumber_(totalUpdateLokasi) + ' titik' },
      { label: 'Kegiatan', value: formatNumber_(totalKegiatan) + ' catatan' },
      { label: 'Terakhir', value: lastLocationTime || lastUpdate || '-' },
      { label: 'Selesai', value: today.jam_selesai || '-' }
    ];

    setText_('salesActivityNextAction', buildSalesActivityHeadline_(today, nextAction));
    setText_('salesActivityLastUpdate', 'Update terakhir: ' + (lastUpdate || '-'));
    setText_('salesActivitySubtitle', today.jadwal_kerja || config.scheduleText || 'Mulai kerja, update lokasi bebas, dan selesai kerja.');
    setText_('salesActivityNote', buildSalesActivityNote_(today));

    if (statusBadge) {
      statusBadge.textContent = status;
      statusBadge.className = 'sales-activity-status status-' + String(status || '').toLowerCase().replace(/[^a-z0-9]+/g, '-');
    }

    if (timeline) {
      timeline.innerHTML = fieldSummary.length ? fieldSummary.map(function(item) {
        return '' +
          '<span class="field-summary-tile">' +
            '<strong>' + escapeHtml_(item.label || '-') + '</strong>' +
            '<small>' + escapeHtml_(item.value || '-') + '</small>' +
          '</span>';
      }).join('') : '';
    }

    setSingleActivityButtonState_('fieldStartBtn', hasStarted, 'Mulai kerja hari ini sudah tercatat.');
    setSingleActivityButtonState_('fieldEndBtn', hasEnded, 'Selesai kerja hari ini sudah tercatat.');
  }

  function buildSalesActivityHeadline_(today, nextAction) {
    var source = today || {};
    var status = normalizeClientText_(source.status_harian || '');
    var totalUpdateLokasi = Number(source.total_update_lokasi || 0);

    if (status === 'belum mulai') {
      return 'Mulai Kerja';
    }

    if (status === 'selesai') {
      return 'Selesai ' + (source.jam_selesai || '');
    }

    if (status === 'perlu cek') {
      return 'Perlu Cek Aktivitas';
    }

    if (totalUpdateLokasi > 0) {
      return 'Update Lokasi ' + formatNumber_(totalUpdateLokasi) + ' Titik';
    }

    return (nextAction && nextAction.label) || 'Update Lokasi Bebas';
  }

  function buildSalesActivityNote_(today) {
    var source = today || {};

    if (!source.total_update) {
      return 'Tekan Mulai saat mulai kerja. Sistem menyimpan jam server dan lokasi GPS.';
    }

    if (source.anomali_lokasi || source.anomali_perangkat) {
      return 'Ada catatan yang perlu dicek admin. Tetap lanjutkan update sesuai jadwal.';
    }

    if (source.status_harian === 'Selesai') {
      return 'Aktivitas hari ini selesai. Semua titik dan catatan tetap tersimpan.';
    }

    if (!Number(source.total_update_lokasi || 0)) {
      return 'Update lokasi bisa ditekan setiap kali tiba di outlet atau titik kunjungan.';
    }

    return 'Update lokasi bebas jam. Tekan Update setiap tiba di outlet agar histori rute lengkap.';
  }

  function renderApproverKpiTable_() {
    var tbody = document.getElementById('approverKpiTableBody');
    var rows;
    var statusPriorityMap = {
      'Belum Ada Target': 1,
      'Belum Mulai': 2,
      'Berjalan': 3,
      'Tercapai': 4,
      'Melebihi': 5
    };
    if (!tbody) return;

    rows = (appState.approverKpiRows || []).slice().sort(function(left, right) {
      var leftRank = statusPriorityMap[String(left.status_kpi || '').trim()] || 99;
      var rightRank = statusPriorityMap[String(right.status_kpi || '').trim()] || 99;

      if (leftRank !== rightRank) {
        return leftRank - rightRank;
      }

      if (Number(left.progress_percent || 0) !== Number(right.progress_percent || 0)) {
        return Number(left.progress_percent || 0) - Number(right.progress_percent || 0);
      }

      return String(left.sales_name || left.sales_id || '').localeCompare(String(right.sales_name || right.sales_id || ''), 'id-ID');
    });

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-cell">Belum ada data progress KPI.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function(row) {
      var salesId = String(row.sales_id || '').trim();
      var salesName = String(row.sales_name || salesId || '-').trim() || '-';
      var targetQty = Number(row.target_qty || 0);
      var achievedQty = Number(row.achieved_qty || 0);
      var remainingQty = Number(row.remaining_qty || 0);
      var progressPercent = Number(row.progress_percent || 0);
      var orderCount = Number(row.order_count || 0);
      var updateMeta = [];
      var note = String(row.catatan_target || '').trim();
      var progressBarClass = 'kpi-progress-bar-fill';
      if (row.last_target_updated_by) updateMeta.push('Oleh ' + String(row.last_target_updated_by));
      if (row.last_target_update) updateMeta.push(String(row.last_target_update));
      if (note) updateMeta.push('Catatan: ' + note);

      if (progressPercent >= 100) {
        progressBarClass += ' is-success';
      } else if (progressPercent === 0 || String(row.status_kpi || '') === 'Belum Mulai') {
        progressBarClass += ' is-warning';
      }

      return '' +
        '<tr>' +
          '<td><div class="kpi-sales-cell"><strong>' + escapeHtml_(salesName) + '</strong><small>' + escapeHtml_(salesId || '-') + '</small></div></td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(targetQty)) + '</td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(achievedQty)) + '</td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(remainingQty)) + '</td>' +
          '<td><div class="kpi-progress-cell"><div class="kpi-progress-value">' + escapeHtml_(String(progressPercent) + '%') + '</div><div class="kpi-progress-bar"><div class="' + progressBarClass + '" style="width:' + escapeHtml_(String(Math.max(Math.min(progressPercent, 100), 0))) + '%"></div></div></div></td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(orderCount)) + '</td>' +
          '<td>' + buildStatusBadge_(row.status_kpi || 'Belum Ada Target') + '</td>' +
          '<td><small>' + escapeHtml_(updateMeta.join(' | ') || '-') + '</small></td>' +
        '</tr>';
    }).join('');
  }

  function renderApproverExportTable_() {
    var tbody = document.getElementById('approverExportTableBody');

    var orders = getFilteredExportOrders_();
    var batchButtonsDisabled = !orders.length;
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;

    if (!tbody) return;
    document.getElementById('downloadKledoBatchBtn').disabled = batchButtonsDisabled;

    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-cell">Belum ada order siap export Kledo.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getApproverExportPageTotal_(orders);
    currentPage = normalizeApproverExportPage_(totalPages);
    startIndex = (currentPage - 1) * APPROVER_EXPORT_PAGE_SIZE;
    endIndex = Math.min(startIndex + APPROVER_EXPORT_PAGE_SIZE, orders.length);
    pageRows = orders.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {

      return '' +

          '<td>' + buildApproverExportOrderCellHtml_(row) + '</td>' +

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + orders.length + ' order siap export';

    pagination.innerHTML = '' +

        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +

  function getApproverExportPageTotal_(rows) {
    var sourceRows = Array.isArray(rows) ? rows : getFilteredExportOrders_();

  function normalizeApproverExportPage_(totalPages) {
    var maxPage = Number(totalPages || getApproverExportPageTotal_());
    var currentPage = Number(appState.approverExportPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > maxPage) {
      currentPage = maxPage;
    }

    appState.approverExportPage = currentPage;
    return currentPage;
  }

  function handleApproverExportPageChange_(direction) {
    var nextPage = normalizeApproverExportPage_() + Number(direction || 0);
    var totalPages = getApproverExportPageTotal_();

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.approverExportPage) {
      return;
    }

    appState.approverExportPage = nextPage;
    renderApproverExportTable_();
  }

    setText_('summaryBackupTotal', String(summary.total_backup || 0));
    setText_('summaryBackupLastTime', String(summary.backup_terakhir || '-').trim() || '-');

    setText_('summaryBackupSheetCount', String(summary.jumlah_sheet_operasional || 0));

  function renderApproverBackupTable_() {
    var tbody = document.getElementById('approverBackupTableBody');
    var pagination = document.getElementById('approverBackupPagination');
    var rows = appState.backupHistory || [];
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var visibleRows;
    var pageInfo;

    if (!tbody) return;

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Belum ada riwayat backup.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getBackupHistoryPageTotal_();
    currentPage = normalizeBackupHistoryPage_();
    startIndex = (currentPage - 1) * BACKUP_HISTORY_PAGE_SIZE;
    endIndex = Math.min(startIndex + BACKUP_HISTORY_PAGE_SIZE, rows.length);
    visibleRows = rows.slice(startIndex, endIndex);

    tbody.innerHTML = visibleRows.map(function(row) {
      var fileUrl = String(row.file_url || '').trim();
      var fileLabel = String(row.nama_file || '-').trim() || '-';
      var status = String(row.status_backup || '-').trim() || '-';
      var sheetCount = Number(row.jumlah_sheet || 0);
      var note = String(row.catatan || '-').trim() || '-';
      var createdAt = String(row.timestamp_backup || [row.tanggal_backup || '', row.jam_backup || ''].join(' ')).trim() || '-';

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(createdAt) + '</td>' +
          '<td>' + (fileUrl

            : escapeHtml_(fileLabel)) + '</td>' +
          '<td>' + buildStatusBadge_(status) + '</td>' +
          '<td class="cell-right">' + escapeHtml_(String(sheetCount || 0)) + '</td>' +
          '<td>' + escapeHtml_(String(row.dibackup_oleh || '-').trim() || '-') + '</td>' +
          '<td>' + escapeHtml_(note) + '</td>' +
        '</tr>';

    if (!pagination) {
      return;
    }

    if (rows.length <= BACKUP_HISTORY_PAGE_SIZE) {
      pagination.innerHTML = '';
      return;
    }

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + rows.length + ' riwayat backup';
    pagination.innerHTML = '' +
      '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
      '<div class="table-pagination-actions">' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleBackupHistoryPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleBackupHistoryPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
      '</div>';
  }

  function getBackupHistoryPageTotal_() {
    return Math.max(1, Math.ceil(((appState.backupHistory || []).length || 0) / BACKUP_HISTORY_PAGE_SIZE));
  }

  function normalizeBackupHistoryPage_() {
    var totalPages = getBackupHistoryPageTotal_();
    var currentPage = Number(appState.backupHistoryPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > totalPages) {
      currentPage = totalPages;
    }

    appState.backupHistoryPage = currentPage;
    return currentPage;
  }

  function handleBackupHistoryPageChange_(direction) {
    var nextPage = normalizeBackupHistoryPage_() + Number(direction || 0);
    var totalPages = getBackupHistoryPageTotal_();

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.backupHistoryPage) {
      return;
    }

    appState.backupHistoryPage = nextPage;
    renderApproverBackupTable_();
  }

  function renderApproverPriceTable_() {
    var tbody = document.getElementById('approverPriceTableBody');
    var products;

    if (!tbody) return;

    products = getFilteredApproverProducts_();

    if (!products.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Item tidak ditemukan.</td></tr>';
      return;
    }

    tbody.innerHTML = products.map(function(product) {
      var kodeItem = String(product.kode_item || '');
      var hargaDasar = Number(product.harga_dasar || product.harga_default || 0);
      var updateMeta = [];

      if (product.diupdate_oleh) {
        updateMeta.push('Oleh ' + product.diupdate_oleh);
      }

      if (product.tanggal_update_harga) {
        updateMeta.push(String(product.tanggal_update_harga));
      }

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(kodeItem) + '</td>' +
          '<td>' + escapeHtml_(product.nama_item || '-') + '</td>' +

          '<td><div class="price-input-wrap">' +
            '<span class="price-input-prefix">Rp</span>' +
            '<input class="price-base-input" id="base-price-' + escapeHtml_(kodeItem) + '" type="number" min="0" step="1" value="' + escapeHtml_(String(hargaDasar || 0)) + '" />' +
          '</div></td>' +
          '<td><div class="price-update-meta">' + escapeHtml_(updateMeta.join(' | ') || 'Belum pernah diupdate') + '</div></td>' +
          '<td><button type="button" class="primary-btn" onclick="saveProductBasePrice_(\'' + escapeJs_(kodeItem) + '\')">Simpan</button></td>' +
        '</tr>';
    }).join('');
  }

  function getFilteredApprovals_() {
    var query = normalizeSearchText_(appState.approverSearch);
    var filterDate = normalizeDateKey_(appState.approverFilterDate);

    return (appState.approvals || []).slice().sort(compareApprovalsByPriority_).filter(function(row) {
      var haystack;
      var rowDate = normalizeDateKey_(row.tanggal_pengajuan);

      if (filterDate && rowDate !== filterDate) {
        return false;
      }

      if (!query) {
        return true;
      }

      haystack = [
        row.no_so,
        row.customer,
        row.sales_nama,
        row.diajukan_oleh,
        row.item,
        row.alasan_approval,
        row.status_customer
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function getFilteredExportOrders_() {
    var startDate = normalizeDateKey_(appState.approverExportStartDate || appState.approverExportFilterDate);
    var endDate = normalizeDateKey_(appState.approverExportEndDate || appState.approverExportFilterDate);
    var swapDate;

    if (startDate && endDate && startDate > endDate) {
      swapDate = startDate;
      startDate = endDate;
      endDate = swapDate;
    }

    return (appState.exportOrders || []).slice().filter(function(row) {
      var rowDate = normalizeDateKey_(row.tanggal_diterima || row.tanggal_verifikasi_cs);

      if (startDate && (!rowDate || rowDate < startDate)) {
        return false;
      }

      if (endDate && (!rowDate || rowDate > endDate)) {
        return false;
      }

      return true;
    });
  }

  function getFilteredApproverProducts_() {
    var query = normalizeSearchText_(appState.approverPriceSearch);

    return (appState.products || []).slice().sort(function(left, right) {
      return normalizeSearchText_(left.nama_item).localeCompare(normalizeSearchText_(right.nama_item), 'id-ID');
    }).filter(function(product) {
      var haystack;

      if (!query) {
        return true;
      }

      haystack = [
        product.kode_item,
        product.nama_item,
        product.satuan
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function compareApprovalsByPriority_(left, right) {
    return getApprovalPriorityScore_(right) - getApprovalPriorityScore_(left);
  }

  function getApprovalPriorityScore_(row) {
    var score = 0;

    if (normalizeClientText_(row.status_customer) === 'ditahan') {
      score += 10000;
    }

    if (normalizeClientText_(row.status_pembayaran_customer) === 'ditahan') {
      score += 6000;
    }

    score += Number(row.jumlah_nota_overdue || 0) * 100;
    score += Math.floor(Number(row.total_tunggakan || 0) / 100000);

    if (String(row.tanggal_jatuh_tempo_terdekat || '').trim()) {
      score += 25;
    }

    return score;
  }

  function buildApproverCustomerCellHtml_(row) {
    var metaLines = [];

    if (row.sales_nama) {
      metaLines.push('<div class="approver-meta-line"><strong>Sales Order:</strong> ' + escapeHtml_(row.sales_nama) + '</div>');
    }

    if (row.diajukan_oleh) {
      metaLines.push('<div class="approver-meta-line"><strong>Diajukan Oleh:</strong> ' + escapeHtml_(row.diajukan_oleh) + '</div>');
    }

    if (row.tanggal_pengajuan) {
      metaLines.push('<div class="approver-meta-line"><strong>Tanggal:</strong> ' + escapeHtml_(row.tanggal_pengajuan) + '</div>');
    }

    return '' +
      '<div class="approver-customer-cell">' +
        '<strong>' + escapeHtml_(row.customer || '-') + '</strong>' +
        '<div class="approver-meta">' + metaLines.join('') + '</div>' +
      '</div>';
  }

  function buildApproverOrderCellHtml_(row) {
    var paymentLines = [];

    if (String(row.status_persetujuan_pembayaran || '').trim()) {
      paymentLines.push('<div class="approver-meta-line"><strong>Status Bayar:</strong> ' + escapeHtml_(row.status_persetujuan_pembayaran) + '</div>');
    }

    if (Number(row.nominal_transfer_diterima || 0) > 0) {
      paymentLines.push('<div class="approver-meta-line"><strong>Transfer:</strong> Rp ' + escapeHtml_(formatNumber_(row.nominal_transfer_diterima || 0)) + '</div>');
      paymentLines.push('<div class="approver-meta-line"><strong>Selisih:</strong> Rp ' + escapeHtml_(formatNumber_(row.selisih_pembayaran || 0)) + '</div>');
    }

    return '' +
      '<div class="approver-order-cell">' +
        buildOrderDetailCellHtml_(row) +
        '<div class="approver-order-total"><strong>Total:</strong> Rp ' + escapeHtml_(formatNumber_(row.total || 0)) + '</div>' +
        (paymentLines.length ? '<div class="approver-meta">' + paymentLines.join('') + '</div>' : '') +
      '</div>';
  }

  function buildApproverRiskSummary_(row) {
    var lines = [];
    var badges = [];
    var alasanApproval = String(row.alasan_approval || '').trim();
    var statusCustomer = normalizeClientText_(row.status_customer);
    var statusPembayaran = String(row.status_pembayaran_customer || '').trim();
    var jumlahNota = Number(row.jumlah_nota_overdue || 0);
    var totalTunggakan = Number(row.total_tunggakan || 0);
    var jatuhTempo = String(row.tanggal_jatuh_tempo_terdekat || '').trim();
    var catatan = String(row.catatan_piutang || '').trim();

    if (statusPembayaran) {
      badges.push(buildPaymentBadge_(statusPembayaran));
    }

    if (String(row.status_customer || '').trim()) {
      badges.push(buildStatusBadge_(row.status_customer));
    }

    if (statusCustomer === 'ditahan') {
      lines.push('Status customer ditahan');
    }

    if (jumlahNota > 0) {
      lines.push('Customer menunggak ' + jumlahNota + ' nota');
    }

    if (totalTunggakan > 0) {
      lines.push('Total tunggakan Rp ' + formatNumber_(totalTunggakan));
    }

    if (jatuhTempo) {
      lines.push('JT terdekat ' + jatuhTempo);
    }

    if (alasanApproval && !isDuplicateApprovalReason_(alasanApproval, lines)) {
      lines.push(alasanApproval);
    }

    if (catatan) {
      lines.push('Catatan piutang: ' + catatan);
    }

    if (!lines.length) {
      lines.push('Perlu persetujuan manual');
    }

    return '' +
      '<div class="approver-risk-cell">' +
        (badges.length ? '<div class="inline-actions approver-risk-badges">' + badges.join('') + '</div>' : '') +
        '<div class="risk-summary">' + lines.map(function(line) {
          return '<div class="risk-line">- ' + escapeHtml_(line) + '</div>';
        }).join('') + '</div>' +
      '</div>';
  }

  function buildApproverActionsHtml_(noSo) {
    return '' +
      '<div class="approver-action-stack">' +
        '<input class="mini-input approver-note-input" id="approval-note-' + escapeHtml_(noSo) + '" type="text" placeholder="Catatan keputusan wajib" />' +
        '<div class="approver-inline-message hidden" id="approval-message-' + escapeHtml_(noSo) + '"></div>' +
        '<div class="inline-actions">' +
          '<button type="button" class="approve-btn" onclick="handleApproveOrder(\'' + escapeJs_(noSo) + '\')">Approve</button>' +
          '<button type="button" class="danger-btn" onclick="handleRejectOrder(\'' + escapeJs_(noSo) + '\')">Reject</button>' +
        '</div>' +
      '</div>';
  }

  function isDuplicateApprovalReason_(reason, existingLines) {
    var normalizedReason = normalizeSearchText_(reason);

    return (existingLines || []).some(function(line) {
      return normalizeSearchText_(line).indexOf(normalizedReason) !== -1 ||
        normalizedReason.indexOf(normalizeSearchText_(line)) !== -1;
    });
  }

  function renderReadyOrderTable_() {
    var tbody = document.getElementById('readyOrderTableBody');
    var pagination = document.getElementById('readyOrderPagination');
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;
    var orderedRows;
    var emptyColspan = 10;
    var searchActive = normalizeReadyOrderSearchQuery_().length >= 2;
    if (!tbody) return;

    if (!appState.readyOrders.length) {
      tbody.innerHTML = '<tr><td colspan="' + emptyColspan + '" class="empty-cell">Belum ada order siap kirim.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    orderedRows = getFilteredReadyOrders_().slice().sort(function(left, right) {
      var leftStatus = getAdminReadyOrderDisplayStatus_(left);
      var rightStatus = getAdminReadyOrderDisplayStatus_(right);
      var leftPriority = getAdminReadyOrderPriority_(leftStatus);
      var rightPriority = getAdminReadyOrderPriority_(rightStatus);
      var leftDate = normalizeDateKey_(left && left.tanggal_kirim_rencana) || '9999-12-31';
      var rightDate = normalizeDateKey_(right && right.tanggal_kirim_rencana) || '9999-12-31';

      if (leftPriority !== rightPriority) {
        return leftPriority - rightPriority;
      }

      if (leftDate !== rightDate) {
        return leftDate.localeCompare(rightDate);
      }

      return String(left && left.no_so || '').localeCompare(String(right && right.no_so || ''));
    });

    if (!orderedRows.length) {
      tbody.innerHTML = '<tr><td colspan="' + emptyColspan + '" class="empty-cell">' +
        escapeHtml_(searchActive ? 'Customer tidak ditemukan.' : 'Belum ada order siap kirim.') +
      '</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getReadyOrderPageTotal_();
    currentPage = normalizeReadyOrderPage_();
    startIndex = (currentPage - 1) * READY_ORDER_PAGE_SIZE;
    endIndex = Math.min(startIndex + READY_ORDER_PAGE_SIZE, orderedRows.length);
    pageRows = orderedRows.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      var noSo = String(row.no_so || '');
      var inputSalesDate = formatShortDateId_(row.tanggal_order || '');
      var inputSalesLabel = formatTimeLabelWib_(row.jam_order || '');
      var tanggalKirim = formatShortDateId_(row.tanggal_kirim_rencana || row.tanggal_kirim || row.tanggal_order || '');
      var customerName = String(row.nama_customer_input || row.nama_customer || '-');
      var salesName = String(row.sales_nama || '-');
      var displayStatus = getAdminReadyOrderDisplayStatus_(row);

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td><strong>' + escapeHtml_(inputSalesDate || '-') + '</strong><br/><small>' + escapeHtml_(inputSalesLabel) + '</small></td>' +
          '<td>' + escapeHtml_(tanggalKirim) + '</td>' +
          '<td>' + escapeHtml_(customerName) + '</td>' +
          '<td>' + escapeHtml_(salesName) + '</td>' +
          '<td>' + buildOrderItemSummaryHtml_(row) + '</td>' +
          '<td>' + escapeHtml_(getOrderQtyLabel_(row)) + '</td>' +
          '<td>' + buildStatusBadge_(displayStatus) + '</td>' +
          '<td>' + formatNumber_(row.total_order || row.total) + '</td>' +
          '<td>' + buildReadyOrderActionsHtml_(row, noSo) + '</td>' +
        '</tr>';
    }).join('');

    if (!pagination) {
      return;
    }

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + orderedRows.length + ' order siap kirim/pending';

    pagination.innerHTML = '' +
      '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
      '<div class="table-pagination-actions">' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleReadyOrderPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleReadyOrderPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
      '</div>';
  }

  function getAdminReadyOrderDisplayStatus_(row) {
    var statusOrder = String(row && row.status_order || '').trim();
    var tanggalRencana = normalizeDateKey_(row && row.tanggal_kirim_rencana);
    var today = getTodayIsoDate_();

    if (normalizeSearchText_(statusOrder) === 'siap kirim' && tanggalRencana && tanggalRencana < today) {
      return 'Pending Kirim';
    }

    return statusOrder || '-';
  }

  function getAdminReadyOrderPriority_(status) {
    var normalizedStatus = normalizeSearchText_(status);

    if (normalizedStatus === 'menunggu persetujuan') {
      return 0;
    }

    if (normalizedStatus === 'pending kirim') {
      return 1;
    }

    return 2;
  }

  function buildReadyOrderActionsHtml_(row, noSo) {
    var statusOrder = normalizeSearchText_(row && row.status_order);
    var needsApproval = statusOrder === 'menunggu persetujuan' ||
      normalizeSearchText_(row && row.butuh_persetujuan) === 'ya';
    var actions = [
      '<button type="button" class="danger-btn" onclick="openCancelSalesOrderModal(\'' + escapeJs_(noSo) + '\')">Batalkan SO</button>',
      '<button type="button" class="ghost-btn" onclick="openCsRevisionModal(\'' + escapeJs_(noSo) + '\')">Revisi CS</button>'
    ];

    if (needsApproval) {
      actions.push('<span class="ready-order-waiting">Menunggu Approval</span>');
    } else {
      actions.push('<button type="button" class="preview-btn" onclick="handlePreviewSuratJalan(\'' + escapeJs_(noSo) + '\')">Preview</button>');
      actions.push('<button type="button" class="approve-btn" onclick="handleCreateSuratJalan(\'' + escapeJs_(noSo) + '\')">Buat SJ</button>');
    }

    return '<div class="ready-order-actions">' + actions.join('') + '</div>';
  }

  function getReadyOrderPageTotal_() {
    return Math.max(1, Math.ceil((getFilteredReadyOrders_().length || 0) / READY_ORDER_PAGE_SIZE));
  }

  function normalizeReadyOrderPage_() {
    var totalPages = getReadyOrderPageTotal_();
    var currentPage = Number(appState.readyOrderPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > totalPages) {
      currentPage = totalPages;
    }

    appState.readyOrderPage = currentPage;
    return currentPage;
  }

  function handleReadyOrderPageChange_(direction) {
    var nextPage = normalizeReadyOrderPage_() + Number(direction || 0);
    var totalPages = getReadyOrderPageTotal_();

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.readyOrderPage) {
      return;
    }

    appState.readyOrderPage = nextPage;
    renderReadyOrderTable_();
  }

  function handleReadyOrderSearchInput_() {
    appState.readyOrderSearch = getFieldValue_('readyOrderSearch');
    appState.readyOrderPage = 1;
    renderReadyOrderTable_();
  }

  function normalizeReadyOrderSearchQuery_() {
    return normalizeSearchText_(appState.readyOrderSearch || '');
  }

  function getFilteredReadyOrders_() {
    var query = normalizeReadyOrderSearchQuery_();

    if (query.length < 2) {
      return appState.readyOrders || [];
    }

    return (appState.readyOrders || []).filter(function(row) {
      var haystacks = [
        row && row.nama_customer_input,
        row && row.nama_customer,
        row && row.no_so,
        row && row.sales_nama,
        row && row.item_summary
      ];

      return haystacks.some(function(value) {
        return normalizeSearchText_(value).indexOf(query) !== -1;
      });
    });
  }

  function renderDeliveryTable_() {
    var tbody = document.getElementById('deliveryTableBody');
    var pagination = document.getElementById('deliveryPagination');
    var filteredOrders;
    var activeDateLabel;
    var searchQuery;
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;
    if (!tbody) return;

    if (!appState.deliveryOrders.length) {

      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">' +
        escapeHtml_(activeDateLabel ? ('Belum ada surat jalan untuk tanggal ' + activeDateLabel + '.') : 'Belum ada surat jalan.') +
      '</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    filteredOrders = getFilteredSearchedDeliveryOrders_(filteredOrders);

    if (!filteredOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">' +
        escapeHtml_(searchQuery ? 'Surat jalan tidak ditemukan.' : 'Belum ada surat jalan.') +
      '</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getDeliveryPageTotal_(filteredOrders);
    currentPage = normalizeDeliveryPage_(totalPages);
    startIndex = (currentPage - 1) * DELIVERY_PAGE_SIZE;
    endIndex = Math.min(startIndex + DELIVERY_PAGE_SIZE, filteredOrders.length);
    pageRows = filteredOrders.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      var noSo = String(row.no_so || '');
      var actions = [];
      var statusVerifikasi = String(row.status_verifikasi_cs || 'Belum Dicek');
      var statusPersetujuanPembayaran = String(row.status_persetujuan_pembayaran || '').trim();

      if (String(row.status_kirim || '') === 'Siap Kirim') {
        actions.push('<button type="button" class="approve-btn" onclick="handleMarkDelivered(\'' + escapeJs_(noSo) + '\')">Terkirim</button>');
      }

      if (String(row.status_kirim || '') === 'Terkirim') {
        actions.push('<button type="button" class="ghost-btn" onclick="openDeliveryVerification(\'' + escapeJs_(noSo) + '\')">Verifikasi CS</button>');

        if (statusVerifikasi === 'Sudah Dicek' && ['Menunggu Persetujuan', 'Ditolak', 'Kurang Bayar'].indexOf(statusPersetujuanPembayaran) === -1) {
          actions.push('<button type="button" class="ghost-btn" onclick="handleCompleteOrder(\'' + escapeJs_(noSo) + '\')">Selesai</button>');
        } else if (statusVerifikasi === 'Sudah Dicek' && statusPersetujuanPembayaran === 'Menunggu Persetujuan') {
          actions.push('<div class="sales-info-note">Silahkan meminta approval approver untuk menyelesaikan transaksi.</div>');
        } else if (statusVerifikasi === 'Sudah Dicek') {
          actions.push('<div class="sales-info-note">Transaksi belum bisa diselesaikan. Cek status pembayaran.</div>');
        }
      }

      if ((String(row.status_kirim || '') === 'Siap Kirim' || String(row.status_kirim || '') === 'Terkirim') && statusVerifikasi !== 'Sudah Dicek') {
        actions.push('<button type="button" class="danger-btn" onclick="handleCancelDelivery(\'' + escapeJs_(noSo) + '\')">Batal Kirim</button>');
      }

      actions.push(
        '<div class="print-actions-group">' +
          '<button type="button" class="print-action-btn print-action-btn-primary" onclick="handlePrintSjNota(\'' + escapeJs_(noSo) + '\')">Print SJ+Nota</button>' +
          '<button type="button" class="ghost-btn print-action-btn" onclick="handlePrintSuratJalan(\'' + escapeJs_(noSo) + '\')">Print SJ</button>' +
          '<button type="button" class="ghost-btn print-action-btn" onclick="handlePrintNota(\'' + escapeJs_(noSo) + '\')">Print Nota</button>' +
        '</div>'
      );

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(row.no_surat_jalan) + '</td>' +
          '<td>' + escapeHtml_(formatShortDateId_(row.tanggal_kirim || row.tanggal_cetak || '')) + '</td>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + escapeHtml_(row.nama_customer) + '</td>' +
          '<td>' + buildDeliveryStatusCellHtml_(row) + '</td>' +
          '<td><div class="inline-actions">' + actions.join('') + '</div></td>' +
        '</tr>';
    }).join('');

    if (!pagination) {
      return;
    }

    if (filteredOrders.length <= DELIVERY_PAGE_SIZE) {
      pagination.innerHTML = '';
      return;
    }

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + filteredOrders.length + ' surat jalan';

    pagination.innerHTML = '' +
      '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
      '<div class="table-pagination-actions">' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleDeliveryPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleDeliveryPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
      '</div>';
  }

  function buildPayoutBatchSummaryText_(detail) {
    var payload = detail || {};
    var batch = payload.batch || {};
    var rows = Array.isArray(payload.rows) ? payload.rows : [];
    var lineItems = [];

    if (!batch.payout_batch_id && !rows.length) {
      return '';
    }

    lineItems = rows.map(function(row, index) {
      return [
        String(index + 1) + '. ' + String(row.no_so || '-'),
        String(row.nama_customer || '-'),
        formatCurrencyInput_(row.nominal_komisi || 0),
        'Status ' + String(row.status_detail || '-')
      ].join(' | ');
    });

    return [
      'Ringkasan Batch Payout SLF',
      'No Batch: ' + String(batch.payout_batch_id || '-'),
      'Sales: ' + String(batch.sales_nama || batch.sales_id || '-'),
      'Tanggal: ' + formatShortDateId_(batch.tanggal_pengajuan || batch.created_at || ''),
      'Status: ' + String(batch.status_payout || '-'),
      'Jumlah SO: ' + String(batch.jumlah_so || rows.length || 0),
      'Total Komisi: ' + formatCurrencyInput_(batch.total_komisi || 0),
      'Bank Tujuan: ' + String(batch.bank_nama || '-'),
      'No. Rekening: ' + String(batch.bank_no_rekening || '-'),
      'Nama Rekening: ' + String(batch.bank_nama_pemilik || '-'),
      'Catatan Sales: ' + String(batch.catatan_sales || '-'),
      'Catatan Approver: ' + String(batch.catatan_approver || '-'),
      '',
      'Daftar SO:',
      lineItems.length ? lineItems.join('\n') : '-'
    ].join('\n');
  }

    if (saveBtn) {
      saveBtn.disabled = true;

    setStatusText_('Menyimpan target KPI...');

    if (KPI_SAVE_ASYNC_STATUS_TIMER) {
      clearTimeout(KPI_SAVE_ASYNC_STATUS_TIMER);
    }
    KPI_SAVE_ASYNC_STATUS_TIMER = setTimeout(function() {
      try {
        if (saveBtn) {
          saveBtn.disabled = false;
        }
        setStatusText_('Gagal simpan target KPI (timeout)');
        renderResult_('Simpan target KPI tidak mendapat respon dari Apps Script. Cek Deploy terbaru dan menu Executions di Apps Script untuk melihat error server.', true);
      } catch (error) {
        // ignore
      }
    }, 15000);

    google.script.run
      .withSuccessHandler(function(result) {
        if (KPI_SAVE_ASYNC_STATUS_TIMER) {
          clearTimeout(KPI_SAVE_ASYNC_STATUS_TIMER);
          KPI_SAVE_ASYNC_STATUS_TIMER = null;
        }
        if (saveBtn) {
          saveBtn.disabled = false;
        }
        setStatusText_('Target KPI tersimpan');
        if (result && result.mode === 'all') {
          renderResult_('Target KPI berhasil diterapkan ke semua sales aktif (' + String(result.updated_count || 0) + ' sales).', false);

          renderResult_('Target KPI berhasil disimpan.', false);

          renderApproverKpiSummary_();
          renderApproverKpiTable_();

          renderApproverKpiSummary_();
          renderApproverKpiTable_();
          handleApproverKpiSalesChange_();
        } else {
          loadApproverKpiData_();
        }
      })
      .withFailureHandler(function(error) {
        if (KPI_SAVE_ASYNC_STATUS_TIMER) {
          clearTimeout(KPI_SAVE_ASYNC_STATUS_TIMER);
          KPI_SAVE_ASYNC_STATUS_TIMER = null;
        }

          saveBtn.disabled = false;

  function updateDeliverySummaryAfterStatusChange_(previousStatus, nextStatus) {
    var summary = appState.deliverySummary || null;
    if (!summary) {
      return;
    }

    function toKey(status) {
      var normalized = String(status || '').trim().toLowerCase();
      if (normalized === 'siap kirim') return 'siap_kirim';
      if (normalized === 'terkirim') return 'terkirim';
      if (normalized === 'selesai') return 'selesai';
      return '';
    }

    var prevKey = toKey(previousStatus);
    var nextKey = toKey(nextStatus);

    if (prevKey && typeof summary[prevKey] === 'number') {
      summary[prevKey] = Math.max(Number(summary[prevKey] || 0) - 1, 0);
    }

    if (nextKey && typeof summary[nextKey] === 'number') {
      summary[nextKey] = Number(summary[nextKey] || 0) + 1;
    }

    appState.deliverySummary = summary;
  }

  function updateDeliveryOrderInState_(noSo, updates) {
    var target = getDeliveryOrderByNoSo_(noSo);
    if (!target) return null;

    var previousStatus = String(target.status_kirim || '').trim();

    Object.keys(updates || {}).forEach(function(key) {
      target[key] = updates[key];
    });

    return {
      order: target,
      previousStatus: previousStatus,
      nextStatus: String(target.status_kirim || '').trim()
    };
  }

  function renderDeliveryVerificationModal_(order) {
    var tbody = document.getElementById('deliveryVerificationTableBody');
    var details = Array.isArray(order && order.details) ? order.details : [];

    setText_('verificationNoSo', order.no_so || '-');
    setText_('verificationNoSj', order.no_surat_jalan || '-');
    setText_('verificationCustomer', order.nama_customer || order.nama_customer_input || '-');
    setText_('verificationStatus', order.status_verifikasi_cs || 'Belum Dicek');
    setFieldValue_('verificationNote', order.catatan_verifikasi_cs || '');
    setFieldValue_('verificationPaymentReceived', String(Number(order.nominal_transfer_diterima || order.total_final || order.total || 0)));
    setFieldValue_('verificationPaymentNote', order.catatan_pembayaran_cs || '');

    if (!tbody) {
      return;
    }

    if (!details.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">Belum ada item untuk diverifikasi.</td></tr>';
      updateDeliveryVerificationTotals_();
      return;
    }

    tbody.innerHTML = details.map(function(detail, index) {
      var qtyTerkirim = Number(detail.qty_terkirim || detail.qty || 0);
      var hargaFinal = Number(detail.harga_final || detail.harga || 0);
      var diskonFinal = Number(detail.diskon_final || detail.diskon || 0);
      var subtotalFinal = Number(detail.subtotal_final || detail.subtotal || 0);

      return '' +
        '<tr>' +
          '<td><div class="sales-item-meta">' +
            '<strong>' + escapeHtml_(detail.nama_item || '-') + '</strong>' +
            '<small>' + escapeHtml_(detail.satuan || '-') + '</small>' +
          '</div></td>' +
          '<td>' + escapeHtml_(formatNumber_(detail.qty || 0)) + '</td>' +
          '<td><input id="verify-qty-' + index + '" type="number" min="0" step="1" value="' + escapeHtml_(String(qtyTerkirim)) + '" oninput="handleVerificationLineInput_(' + index + ')" /></td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(detail.harga || 0)) + '</td>' +
          '<td><input id="verify-harga-' + index + '" type="number" min="0" step="1" value="' + escapeHtml_(String(hargaFinal)) + '" oninput="handleVerificationLineInput_(' + index + ')" /></td>' +
          '<td><input id="verify-diskon-' + index + '" type="number" min="0" step="1" value="' + escapeHtml_(String(diskonFinal)) + '" oninput="handleVerificationLineInput_(' + index + ')" /></td>' +
          '<td><input id="verify-subtotal-' + index + '" type="text" readonly value="' + escapeHtml_(formatCurrencyInput_(subtotalFinal)) + '" /></td>' +
        '</tr>';
    }).join('');

    updateDeliveryVerificationTotals_();

  function handleVerificationLineInput_(index) {
    var qty = Number(getFieldValue_('verify-qty-' + index) || 0);
    var harga = Number(getFieldValue_('verify-harga-' + index) || 0);
    var diskon = Number(getFieldValue_('verify-diskon-' + index) || 0);
    var subtotal = (qty * harga) - diskon;

    setFieldValue_('verify-subtotal-' + index, formatCurrencyInput_(subtotal > 0 ? subtotal : 0));
    updateDeliveryVerificationTotals_();
  }

  function updateDeliveryVerificationTotals_() {
    var order = getDeliveryOrderByNoSo_(appState.currentDeliveryVerificationNoSo);
    var details = Array.isArray(order && order.details) ? order.details : [];
    var totals = details.reduce(function(result, _, index) {
      var qty = Number(getFieldValue_('verify-qty-' + index) || 0);
      var harga = Number(getFieldValue_('verify-harga-' + index) || 0);
      var diskon = Number(getFieldValue_('verify-diskon-' + index) || 0);
      var subtotal = Math.max((qty * harga) - diskon, 0);

      result.subtotal += qty * harga;
      result.diskon += diskon;
      result.total += subtotal;
      return result;
    }, {
      subtotal: 0,
      diskon: 0,
      total: 0
    });

    setFieldValue_('verificationSubtotalFinal', formatCurrencyInput_(totals.subtotal));
    setFieldValue_('verificationDiskonFinal', formatCurrencyInput_(totals.diskon));
    setFieldValue_('verificationTotalFinal', formatCurrencyInput_(totals.total));
    updateDeliveryVerificationPaymentSummary_(totals.total);
  }

  function updateDeliveryVerificationPaymentSummary_(totalFinal) {
    var nominalTransfer = Number(getFieldValue_('verificationPaymentReceived') || 0);
    var selisih = nominalTransfer - Number(totalFinal || 0);
    var status = resolveVerificationPaymentStatus_(selisih);
    var notice = document.getElementById('verificationPaymentNotice');

    setFieldValue_('verificationPaymentDiff', formatCurrencyInput_(selisih));
    setFieldValue_('verificationPaymentStatus', status);

    if (!notice) {
      return;
    }

    if (selisih > 2000) {
      notice.textContent = 'Silahkan meminta approval approver untuk menyelesaikan transaksi.';
      notice.classList.remove('hidden');
      return;
    }

    if (selisih < 0) {
      notice.textContent = 'Nominal transfer lebih kecil dari total final. Transaksi belum bisa diselesaikan.';
      notice.classList.remove('hidden');
      return;
    }

    if (selisih > 0) {
      notice.textContent = 'Lebih bayar sampai Rp 2.000 cukup dicatat oleh CS.';
      notice.classList.remove('hidden');
      return;
    }

    notice.textContent = '';
    notice.classList.add('hidden');
  }

  function resolveVerificationPaymentStatus_(selisih) {
    var diff = Number(selisih || 0);

    if (diff < 0) return 'Kurang Bayar';
    if (diff > 2000) return 'Menunggu Approval';
    if (diff > 0) return 'Lebih Bayar Toleransi';
    return 'Sesuai';
  }

  function collectDeliveryVerificationPayload_() {
    var order = getDeliveryOrderByNoSo_(appState.currentDeliveryVerificationNoSo);
    var details = Array.isArray(order && order.details) ? order.details : [];
    var items = details.map(function(detail, index) {
      var qtyTerkirim = Number(getFieldValue_('verify-qty-' + index) || 0);
      var hargaFinal = Number(getFieldValue_('verify-harga-' + index) || 0);
      var diskonFinal = Number(getFieldValue_('verify-diskon-' + index) || 0);
      var subtotalFinal = Math.max((qtyTerkirim * hargaFinal) - diskonFinal, 0);

      return {
        detail_id: detail.detail_id || '',
        qty_terkirim: qtyTerkirim,
        harga_final: hargaFinal,
        diskon_final: diskonFinal,
        subtotal_final: subtotalFinal
      };
    });

    return {
      no_so: appState.currentDeliveryVerificationNoSo,
      items: items,
      catatan_verifikasi_cs: getFieldValue_('verificationNote'),
      nominal_transfer_diterima: Number(getFieldValue_('verificationPaymentReceived') || 0),
      catatan_pembayaran_cs: getFieldValue_('verificationPaymentNote')
    };
  }

  function saveDeliveryVerification_() {
    var payload = collectDeliveryVerificationPayload_();

    if (!payload.no_so) {
      renderResult_('Pilih surat jalan yang ingin diverifikasi dulu.', true);
      return;
    }

    setStatusText_('Menyimpan verifikasi CS...');

    google.script.run
      .withSuccessHandler(function(result) {
        setStatusText_('Verifikasi CS berhasil disimpan');
        if (result && result.requires_payment_approval) {
          renderResult_('Verifikasi CS untuk order ' + result.no_so + ' berhasil disimpan. Silahkan meminta approval approver untuk menyelesaikan transaksi.', false);
        } else {

          '<td><input id="csRevisionDiskon-' + index + '" type="number" min="0" step="1" value="' + escapeHtml_(String(currentDiskon)) + '" oninput="handleCsRevisionLineInput_(' + index + ')" /></td>' +
          '<td><input id="csRevisionSubtotal-' + index + '" type="text" readonly value="' + escapeHtml_(formatCurrencyInput_(subtotalBaru)) + '" /></td>' +
          '<td>' + escapeHtml_(item.satuan || '-') + '</td>' +

  function collectCsRevisionPayload_() {
    var draft = appState.csRevisionDraft || {};

    return {
      no_so: draft.no_so || '',
      tanggal_kirim_rencana: getFieldValue_('csRevisionTanggalKirim'),
      term_pembayaran: getFieldValue_('csRevisionTermPembayaran'),
      tanggal_jatuh_tempo: getFieldValue_('csRevisionTanggalJatuhTempo'),
      catatan: getFieldValue_('csRevisionCatatan'),
      alasan_revisi: getFieldValue_('csRevisionAlasan'),
      items: (draft.details || []).map(function(item, index) {
        return {
          detail_id: item.detail_id,
          kode_item: item.kode_item || '',
          nama_item: item.nama_item || '',
          qty: Number(getFieldValue_('csRevisionQty-' + index) || 0),
          harga: parseCurrencyInput_(getFieldValue_('csRevisionHarga-' + index)),
          diskon: Number(getFieldValue_('csRevisionDiskon-' + index) || 0)
        };
      })
    };
  }

  function validateCsRevisionPayload_(payload) {
    if (!String(payload.no_so || '').trim()) {
      return 'No. SO revisi tidak ditemukan.';
    }

    if (!String(payload.tanggal_kirim_rencana || '').trim()) {
      return 'Tanggal kirim rencana wajib diisi.';
    }

    if (!String(payload.term_pembayaran || '').trim()) {
      return 'Term pembayaran wajib diisi.';
    }

    if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
      return 'Tanggal jatuh tempo wajib diisi.';
    }

    if (!String(payload.alasan_revisi || '').trim()) {
      return 'Alasan revisi wajib diisi.';
    }

    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item revisi wajib diisi.';
    }

    for (var i = 0; i < payload.items.length; i += 1) {
      if (!(Number(payload.items[i].qty || 0) > 0)) {
        return 'Qty revisi pada semua item harus lebih dari 0.';
      }
      if (Number(payload.items[i].harga || 0) < 0) {
        return 'Harga revisi tidak boleh negatif.';
      }
      if (Number(payload.items[i].diskon || 0) < 0) {
        return 'Diskon revisi tidak boleh negatif.';
      }
    }

    return '';
  }

  function saveCsRevision_(event) {
    var payload;
    var validationMessage;
    var saveBtn = document.getElementById('saveCsRevisionBtn');
    var invalidFieldId = '';

    if (event && typeof event.preventDefault === 'function') {
      event.preventDefault();
    }

    clearCsRevisionMessage_();
    clearCsRevisionFieldErrors_();
    payload = collectCsRevisionPayload_();
    validationMessage = validateCsRevisionPayload_(payload);

    if (validationMessage) {
      if (!String(payload.term_pembayaran || '').trim()) {
        invalidFieldId = 'csRevisionTermPembayaran';
      } else if (!String(payload.tanggal_kirim_rencana || '').trim()) {
        invalidFieldId = 'csRevisionTanggalKirim';
      } else if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
        invalidFieldId = 'csRevisionTanggalJatuhTempo';
      } else if (!String(payload.alasan_revisi || '').trim()) {
        invalidFieldId = 'csRevisionAlasan';
      }

      showCsRevisionMessage_(validationMessage);
      markCsRevisionFieldError_(invalidFieldId);
      setStatusText_('Form Revisi CS belum lengkap');
      renderResult_(validationMessage, true);
      return;
    }

    saveBtn.disabled = true;
    setStatusText_('Menyimpan Revisi CS...');

    google.script.run
      .withSuccessHandler(function(result) {
        saveBtn.disabled = false;
        closeCsRevisionModal_();
        setStatusText_('Revisi CS berhasil disimpan');
        renderResult_(
          (result && result.message ? result.message : 'Revisi CS berhasil disimpan.') +
          '\nNo. SO: ' + (result.no_so || '-') +
          '\nStatus Order: ' + (result.status_order || '-'),
          false
        );
        loadAdminOperationsData_();
      })
      .withFailureHandler(function(error) {
        saveBtn.disabled = false;
        showCsRevisionMessage_('Gagal menyimpan revisi order: ' + error.message);
        setStatusText_('Gagal menyimpan Revisi CS');
        renderResult_('Gagal menyimpan revisi order: ' + error.message, true);
      })
      .saveSalesOrderRevisionFromDashboard(appState.currentUser.user_id, payload);
  }

  function handleAddCsRevisionItem_() {
    var select = document.getElementById('csRevisionAddItem');
    var option = select && select.options ? select.options[select.selectedIndex] : null;
    var draft = appState.csRevisionDraft || {};
    var kodeItem = option ? String(option.dataset.kodeItem || option.value || '').trim() : '';
    var namaItem = option ? String(option.dataset.namaItem || option.textContent || '').trim() : '';
    var qty = Number(getFieldValue_('csRevisionAddQty') || 0);
    var harga = parseCurrencyInput_(getFieldValue_('csRevisionAddHarga'));
    var diskon = Number(getFieldValue_('csRevisionAddDiskon') || 0);
    var product;

    clearCsRevisionMessage_();

    if (!kodeItem || !namaItem) {
      showCsRevisionMessage_('Pilih produk yang ingin ditambahkan.');
      return;
    }

    if ((draft.details || []).some(function(item) {
      return String(item.kode_item || '').trim() === kodeItem || String(item.nama_item || '').trim() === namaItem;
    })) {
      showCsRevisionMessage_('Produk ini sudah ada di SO. Silakan revisi qty atau harga pada baris yang sudah ada.');
      return;
    }

    if (!(qty > 0)) {
      showCsRevisionMessage_('Qty item baru harus lebih dari 0.');
      return;
    }

    if (harga < 0) {
      showCsRevisionMessage_('Harga item baru tidak boleh negatif.');
      return;
    }

    if (diskon < 0) {
      showCsRevisionMessage_('Diskon item baru tidak boleh negatif.');
      return;
    }

    product = (appState.products || []).find(function(row) {
      return String(row.kode_item || '').trim() === kodeItem;
    }) || null;

    draft.details = Array.isArray(draft.details) ? draft.details : [];
    draft.details.push({
      detail_id: '',
      kode_item: kodeItem,
      nama_item: namaItem,
      qty: qty,
      original_qty: 0,
      satuan: product && product.satuan ? product.satuan : '',
      harga: harga,
      original_harga: 0,
      diskon: diskon,
      subtotal: Math.max((qty * harga) - diskon, 0),
      is_new: true
    });

    appState.csRevisionDraft = draft;
    renderCsRevisionDraft_();
  }

  function handleRemoveCsRevisionItem_(index) {
    var draft = appState.csRevisionDraft || {};

    if (!Array.isArray(draft.details) || !draft.details.length) {
      return;
    }

    draft.details.splice(index, 1);
    appState.csRevisionDraft = draft;
    renderCsRevisionDraft_();
  }

  function handleCsRevisionLineInput_(index) {
    var draft = appState.csRevisionDraft || {};
    var detail = draft && draft.details ? draft.details[index] : null;
    var qty = Number(getFieldValue_('csRevisionQty-' + index) || 0);
    var harga = parseCurrencyInput_(getFieldValue_('csRevisionHarga-' + index));
    var diskon = Number(getFieldValue_('csRevisionDiskon-' + index) || 0);
    var subtotal = Math.max((qty * harga) - diskon, 0);

    if (!detail) {
      return;
    }

    detail.qty = qty;
    detail.harga = harga;
    detail.diskon = diskon;
    detail.subtotal = subtotal;
    setFieldValue_('csRevisionHarga-' + index, formatPlainNumberInput_(harga));
    setFieldValue_('csRevisionSubtotal-' + index, formatCurrencyInput_(subtotal));
    updateCsRevisionTotals_();
  }

  function updateCsRevisionTotals_() {
    var draft = appState.csRevisionDraft || {};
    var totals = (draft.details || []).reduce(function(result, item, index) {
      var qty = Number(getFieldValue_('csRevisionQty-' + index) || item.qty || 0);
      var harga = parseCurrencyInput_(getFieldValue_('csRevisionHarga-' + index) || item.harga || 0);
      var diskon = Number(getFieldValue_('csRevisionDiskon-' + index) || item.diskon || 0);
      var subtotal = Math.max((qty * harga) - diskon, 0);

      result.subtotal += qty * harga;
      result.diskon += diskon;
      result.total += subtotal;
      return result;
    }, {
      subtotal: 0,
      diskon: 0,
      total: 0
    });

    setText_('csRevisionSubtotal', formatCurrencyInput_(totals.subtotal));
    setText_('csRevisionDiskon', formatCurrencyInput_(totals.diskon));
    setText_('csRevisionTotal', formatCurrencyInput_(totals.total));
  }

  function getFilteredBillingRows_() {
    var query = normalizeSearchText_(getFieldValue_('billingSearch'));
    var startDate = normalizeDateKey_(appState.billingFilterStartDate || getFieldValue_('billingFilterStartDate'));
    var endDate = normalizeDateKey_(appState.billingFilterEndDate || getFieldValue_('billingFilterEndDate'));
    var rows = appState.tagihan.slice();

    if (startDate || endDate) {
      rows = rows.filter(function(row) {
        var rowDate = normalizeDateKey_(row.tanggal_dibuat || '');

        if (!rowDate) {
          return false;
        }

        if (startDate && rowDate < startDate) {
          return false;
        }

        if (endDate && rowDate > endDate) {
          return false;
        }

        return true;
      });
    }

    if (!query) {
      return rows;
    }

    return rows.filter(function(row) {
      var haystack = [
        row.tagihan_id,
        row.no_so,
        row.kode_customer,
        row.nama_customer,
        row.sales_nama,
        row.term_pembayaran,
        row.status_customer,
        row.status_pembayaran,
        row.status_tagihan,
        row.catatan_piutang,
        row.catatan_pelunasan
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function renderBillingTable_() {
    var tbody = document.getElementById('billingTableBody');
    var pagination = document.getElementById('billingPagination');
    var rows = getFilteredBillingRows_();
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;
    if (!tbody) return;

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-cell">Tidak ada data tagihan.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getBillingPageTotal_(rows);
    currentPage = normalizeBillingPage_(totalPages);
    startIndex = (currentPage - 1) * BILLING_PAGE_SIZE;
    endIndex = Math.min(startIndex + BILLING_PAGE_SIZE, rows.length);
    pageRows = rows.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      var kode = String(row.kode_customer || '').trim();
      var name = String(row.nama_customer || '-').trim();
      var meta = kode ? (name + ' (' + kode + ')') : name;

      var statusLine = [
        row.status_pembayaran ? ('Bayar: ' + row.status_pembayaran) : '',
        row.status_customer ? ('Customer: ' + row.status_customer) : ''
      ].filter(Boolean).join(' | ');

      var total = Number(row.total_tagihan || 0);
      var bayar = Number(row.total_bayar || 0);
      var sisa = Number(row.sisa_tagihan || Math.max(0, total - bayar));
      var overdue = Number(row.jumlah_nota_overdue || 0);
      var jt = normalizeDateKey_(row.jt_terdekat || '');
      var note = String(row.catatan_piutang || '').trim() || '-';
      var statusKey = normalizeSearchText_(row.status_tagihan);
      var canPay = statusKey === 'belum lunas' || statusKey === 'sebagian';
      var paymentInfo = canPay
        ? ('Bayar: ' + formatCurrencyInput_(bayar) + ' | Sisa: ' + formatCurrencyInput_(sisa))
        : (row.tanggal_lunas ? ('Lunas: ' + normalizeDateKey_(row.tanggal_lunas)) : '');

  function getBillingMonthRange_(monthKey) {
    var match = String(monthKey || '').trim().match(/^(\d{4})-(\d{2})$/);
    var year;
    var monthIndex;
    var endDate;

    if (!match) {
      return { startDate: '', endDate: '' };
    }

    year = Number(match[1]);
    monthIndex = Number(match[2]) - 1;
    endDate = new Date(year, monthIndex + 1, 0);

    return {
      startDate: match[1] + '-' + match[2] + '-01',
      endDate: [
        String(endDate.getFullYear()),
        String(endDate.getMonth() + 1).padStart(2, '0'),
        String(endDate.getDate()).padStart(2, '0')
      ].join('-')
    };
  }

  function calculateSalesCommissionSummary_() {
    var summary = {
      potensial: { count: 0, amount: 0 },
      dalam_proses: { count: 0, amount: 0 },
      siap_cair: { count: 0, amount: 0 },
      sudah_dibayar: { count: 0, amount: 0 }
    };

    (appState.salesHistoryOrders || []).forEach(function(order) {
      var statusKey = normalizeClientText_(order.status_komisi).replace(/\s+/g, '_');
      var amount = resolveCommissionAmountForStatus_(order);

      if (statusKey === 'menunggu_pembayaran' || statusKey === 'masuk_batch') {
        summary.dalam_proses.count += 1;
        summary.dalam_proses.amount += amount;
        return;
      }

      if (!summary[statusKey]) {
        return;
      }

      summary[statusKey].count += 1;
      summary[statusKey].amount += amount;
    });

    return summary;
  }

  function getFilteredSalesHistoryOrders_() {
    var query = normalizeSearchText_(appState.salesHistorySearch);
    var statusFilter = normalizeSearchText_(appState.salesHistoryStatus);

    return (appState.salesHistoryOrders || []).filter(function(row) {
      var haystack;
      var rowStatus = normalizeSearchText_(row.status_order);

      if (statusFilter && rowStatus !== statusFilter) {
        return false;
      }

      if (!query) {
        return true;
      }

      haystack = [
        row.no_so,
        row.nama_customer_input,
        row.nama_customer,
        row.item_summary,
        row.qty_summary,
        row.tanggal_order,
        row.tanggal_kirim_rencana,
        row.tanggal_kirim,
        row.catatan,
        row.alasan_hold,
        row.alasan_batal
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function getSalesHistoryPageTotal_() {
    return Math.max(1, Math.ceil(getFilteredSalesHistoryOrders_().length / SALES_HISTORY_PAGE_SIZE));
  }

  function normalizeSalesHistoryPage_() {
    var totalPages = getSalesHistoryPageTotal_();
    var currentPage = Number(appState.salesHistoryPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > totalPages) {
      currentPage = totalPages;
    }

    appState.salesHistoryPage = currentPage;
    return currentPage;
  }

  function renderSalesHistoryStatusOptions_() {
    var selects = [
      document.getElementById('salesHistoryStatusFilter'),
      document.getElementById('salesHistoryInlineStatusFilter')
    ].filter(Boolean);
    var options = ['<option value="">Semua Status</option>'];
    var statuses = {};

    if (!selects.length) return;

    (appState.salesHistoryOrders || []).forEach(function(row) {
      var status = String(row.status_order || '').trim();
      if (status) {
        statuses[status] = true;
      }
    });

    Object.keys(statuses).sort(function(left, right) {
      return normalizeSearchText_(left).localeCompare(normalizeSearchText_(right), 'id-ID');
    }).forEach(function(status) {
      options.push('<option value="' + escapeHtml_(status) + '">' + escapeHtml_(status) + '</option>');
    });

    selects.forEach(function(select) {
      select.innerHTML = options.join('');
      select.value = appState.salesHistoryStatus || '';
    });
  }

  function renderSalesHistoryTable_() {
    var targets = [
      {
        tbody: document.getElementById('salesHistoryTableBody'),
        pagination: document.getElementById('salesHistoryPagination'),
        compact: false
      },
      {
        tbody: document.getElementById('salesHistoryInlineTableBody'),
        pagination: document.getElementById('salesHistoryInlinePagination'),
        compact: true
      }
    ].filter(function(target) {
      return !!target.tbody;
    });
    var orders = getFilteredSalesHistoryOrders_();
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;

    if (!targets.length) return;

    if (!orders.length) {
      targets.forEach(function(target) {
        target.tbody.innerHTML = '<tr><td colspan="' + (target.compact ? '6' : '12') + '" class="empty-cell">Belum ada order yang cocok dengan filter.</td></tr>';
        if (target.pagination) {
          target.pagination.innerHTML = '';
        }
      });
      return;
    }

    totalPages = getSalesHistoryPageTotal_();
    currentPage = normalizeSalesHistoryPage_();
    startIndex = (currentPage - 1) * SALES_HISTORY_PAGE_SIZE;
    endIndex = Math.min(startIndex + SALES_HISTORY_PAGE_SIZE, orders.length);
    pageRows = orders.slice(startIndex, endIndex);

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + orders.length + ' order';

    targets.forEach(function(target) {
      target.tbody.innerHTML = pageRows.map(function(row) {
        return target.compact ? buildSalesHistoryCompactRowHtml_(row) : buildSalesHistoryFullRowHtml_(row);
      }).join('');

      if (target.pagination) {
        target.pagination.innerHTML = '' +
          '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
          '<div class="table-pagination-actions">' +
            '<button type="button" class="ghost-btn pagination-btn" onclick="handleSalesHistoryPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
            '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
            '<button type="button" class="ghost-btn pagination-btn" onclick="handleSalesHistoryPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
          '</div>';
      }
    });
  }

  function renderAdminCustomerSearchResults_(query) {
    var container = document.getElementById('adminCustomerSearchResults');
    var normalizedQuery = normalizeSearchText_(query);
    var selectedCustomer = getSelectedAdminCustomer_();
    var results;

    if (!container) {
      return;
    }

    if (selectedCustomer && normalizedQuery === normalizeSearchText_(buildCustomerSearchLabel_(selectedCustomer))) {
      container.innerHTML = '';
      return;
    }

    if (!normalizedQuery) {
      container.innerHTML = '<div class="customer-search-empty">Ketik minimal 2 huruf untuk mencari customer.</div>';
      return;
    }

    if (normalizedQuery.length < 2) {
      container.innerHTML = '<div class="customer-search-empty">Minimal 2 huruf.</div>';
      return;
    }

    results = getSortedCustomersByName_(appState.customers).filter(function(customer) {
      var haystack = normalizeSearchText_([
        customer.kode_customer,
        customer.nama_customer,
        customer.pic,
        customer.no_hp,
        customer.alamat
      ].join(' '));

      return haystack.indexOf(normalizedQuery) !== -1;
    }).slice(0, 8);

    if (!results.length) {
      container.innerHTML = '<div class="customer-search-empty">Customer tidak ditemukan.</div>';
      return;
    }

    container.innerHTML = results.map(function(customer) {
      var code = String(customer.kode_customer || '').trim();
      var subtitle = [
        customer.pic || '',
        customer.no_hp || '',
        customer.alamat || ''
      ].filter(Boolean).join(' | ');

      return '' +
        '<button type="button" class="customer-search-option" onclick="selectAdminCustomerFromSearch_(\'' + escapeJs_(code) + '\')">' +
          '<strong>' + escapeHtml_(customer.nama_customer || '-') + '</strong>' +
          '<span>' + escapeHtml_(code || '-') + (subtitle ? ' - ' + escapeHtml_(subtitle) : '') + '</span>' +
        '</button>';
    }).join('');
  }

  function syncPaymentDueDateByField_(deliveryFieldId, termFieldId, dueDateFieldId) {
    var deliveryDate = normalizeDateKey_(getFieldValue_(deliveryFieldId));
    var termValue = getFieldValue_(termFieldId);
    var dueDate;

    if (!deliveryDate) {
      setFieldValue_(dueDateFieldId, '');
      return;
    }

    dueDate = addDaysToIsoDate_(deliveryDate, getPaymentTermDays_(termValue));
    setFieldValue_(dueDateFieldId, dueDate);
  }

  function getPaymentTermDays_(termValue) {
    var normalizedTerm = normalizeClientText_(termValue);
    var match = normalizedTerm.match(/(\d+)/);

    if (!normalizedTerm || normalizedTerm === 'cash') {
      return 0;
    }

    return match ? Number(match[1] || 0) : 0;
  }

  function addDaysToIsoDate_(isoDate, daysToAdd) {
    var normalizedDate = normalizeDateKey_(isoDate);
    var dateValue;

    if (!normalizedDate) {
      return '';
    }

    dateValue = new Date(normalizedDate + 'T00:00:00');
    dateValue.setDate(dateValue.getDate() + Number(daysToAdd || 0));

    return [
      dateValue.getFullYear(),
      String(dateValue.getMonth() + 1).padStart(2, '0'),
      String(dateValue.getDate()).padStart(2, '0')
    ].join('-');
  }

    var validationMessage = validateAgentFormPayload_(payload);
    var submitBtn = document.getElementById('submitAgentBtn');

    if (submitBtn) {

      if (submitBtn) {

      showAgentSubmitMessage_('Submit belum mendapat respon dari Apps Script. Coba klik Submit sekali lagi. Jika tetap gagal, refresh halaman lalu login ulang.');
    }, 45000);

    google.script.run
      .withSuccessHandler(function(result) {
        window.clearTimeout(submitTimeout);
        if (submitBtn) {
          submitBtn.disabled = false;
        }
        setStatusText_('Pengiriman berhasil diproses');
        clearAgentSubmitMessage_();

          'Order customer berhasil dibuat.\nNo. SO: ' + result.no_so + '\nStatus Order: ' + result.status_order,

        );
        resetAgentForm_();

          loadAdminData_();
        } else {

        }
      })
      .withFailureHandler(function(error) {
        var message = 'Gagal submit pengiriman: ' + (error && error.message ? error.message : error);

        window.clearTimeout(submitTimeout);
        if (submitBtn) {
          submitBtn.disabled = false;
        }
        setStatusText_('Pengiriman gagal diproses');
        showAgentSubmitMessage_(message);
        renderResult_(message, true);
