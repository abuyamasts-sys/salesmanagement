  function openBillingPaymentModal_(tagihanId, mode) {
    var row = (appState.tagihan || []).find(function(item) {
      return String(item.tagihan_id || '').trim() === String(tagihanId || '').trim();
    }) || null;

    if (!row) {
      renderResult_('Tagihan tidak ditemukan.', true);
      return;
    }

    var total = Number(row.total_tagihan || 0);
    var paid = Number(row.total_bayar || 0);
    var remaining = Number(row.sisa_tagihan || Math.max(0, total - paid));
    var customerLabel = String(row.nama_customer || '-').trim();
    var kode = String(row.kode_customer || '').trim();
    var modeKey = String(mode || '').trim().toUpperCase();

    if (kode) {
      customerLabel += ' (' + kode + ')';
    }

    appState.billingPaymentDraft = {
      tagihan_id: String(row.tagihan_id || '').trim(),
      mode: modeKey || 'CICIL',
      max: remaining
    };

    setText_('billingPaymentCustomer', customerLabel);
    setText_('billingPaymentTotal', formatCurrencyInput_(total));
    setText_('billingPaymentPaid', formatCurrencyInput_(paid));
    setText_('billingPaymentRemaining', formatCurrencyInput_(remaining));

    setText_('billingPaymentTitle', modeKey === 'LUNAS' ? 'Pelunasan Tagihan' : 'Pembayaran Tagihan');
    setText_('billingPaymentSubtitle', modeKey === 'LUNAS'
      ? 'Nominal otomatis diisi sebesar sisa tagihan.'
      : 'Masukkan nominal bayar (boleh cicil).');

    var amountEl = document.getElementById('billingPaymentAmount');
    var noteEl = document.getElementById('billingPaymentNote');

    if (noteEl) {
      noteEl.value = '';
    }

    if (amountEl) {
      if (modeKey === 'LUNAS') {
        amountEl.value = formatCurrencyInput_(remaining);
        amountEl.disabled = true;
      } else {
        amountEl.disabled = false;
        amountEl.value = '';
        amountEl.focus();
      }
    }

    var backdrop = document.getElementById('billingPaymentBackdrop');
    if (backdrop) {
      backdrop.classList.remove('hidden');
    }
  }

  function closeBillingPaymentModal_() {
    appState.billingPaymentDraft = null;
    var backdrop = document.getElementById('billingPaymentBackdrop');
    if (backdrop) {
      backdrop.classList.add('hidden');
    }
  }

  function handleBillingPaymentAmountInput_() {
    var el = document.getElementById('billingPaymentAmount');
    if (!el || el.disabled) return;

    var value = parseCurrencyInput_(el.value);
    el.value = formatCurrencyInput_(value);
  }

  function submitBillingPaymentForm_(event) {
    if (event) event.preventDefault();
    if (!ensureAuthorizedSession_()) return;

    var draft = appState.billingPaymentDraft || null;
    if (!draft || !draft.tagihan_id) {
      renderResult_('Draft pembayaran tidak ditemukan. Tutup modal dan coba lagi.', true);
      return;
    }

    var amountEl = document.getElementById('billingPaymentAmount');
    var noteEl = document.getElementById('billingPaymentNote');

    var nominal = amountEl ? parseCurrencyInput_(amountEl.value) : 0;
    var note = noteEl ? String(noteEl.value || '').trim() : '';

    if (draft.mode !== 'LUNAS' && !(nominal > 0)) {
      renderResult_('Nominal bayar harus lebih dari 0.', true);
      return;
    }

    setStatusText_('Menyimpan pembayaran...');

    var runner = google.script.run
      .withSuccessHandler(function(result) {
        setStatusText_('Pembayaran tersimpan');
        renderResult_(result && result.message ? result.message : 'Pembayaran tersimpan', false);
        closeBillingPaymentModal_();
        loadAdminBillingData_();
        loadAdminAgentFormData_();
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal simpan pembayaran');
        renderResult_('Gagal simpan pembayaran: ' + error.message, true);
      });

    if (draft.mode === 'LUNAS') {
      runner.markTagihanLunasFromDashboard(appState.currentUser.user_id, {
        tagihan_id: draft.tagihan_id,
        catatan_pelunasan: note
      });
      return;
    }

    runner.recordTagihanPaymentFromDashboard(appState.currentUser.user_id, {
      tagihan_id: draft.tagihan_id,
      nominal_bayar: nominal,
      catatan_bayar: note
    });
  }

    if (currentUserHasRole_('controller')) {

      });
      return;
    }

    setStatusText_('Role belum didukung');
    renderResult_('Role user belum dikenali oleh webapp.', true);
  }

  function loadSalesData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.customers = Array.isArray(payload.customers) ? payload.customers : [];
          appState.users = Array.isArray(payload.users) ? payload.users : [];
          appState.products = Array.isArray(payload.products) ? payload.products : [];
          appState.salesHistoryOrders = Array.isArray(payload.salesHistoryOrders) ? payload.salesHistoryOrders : [];
          appState.salesPayoutBatches = Array.isArray(payload.salesPayoutBatches) ? payload.salesPayoutBatches : [];
          appState.slfMinPayout = Number(payload.slfMinPayout || 0);
          syncCurrentUser_(payload.currentUser);

          renderSalesOptions_();
          applySalesModeUi_();
          renderCustomerOptions_();
          renderProductOptions_();
          renderSalesHistoryStatusOptions_();
          renderSalesHistoryTable_();
          renderSalesCommissionSummary_();
          renderSalesPayoutSection_();
          renderSalesOrderItems_();
          handleSalesChange_();
          handleCustomerChange_();
          handleProductChange_();
          loadSalesPayoutBatches_();
          loadSalesKpiSummary_();

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render data sales');
          renderResult_('Gagal render data sales: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat data sales');
        renderResult_('Gagal memuat data sales: ' + error.message, true);
      })
      .getSalesOrderFormData(appState.currentUser.user_id);
  }

  function loadControllerData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    ensureControllerFilterDefaults_();
    syncControllerPlaceholderState_();
    setStatusText_('Memuat dashboard controller...');

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          syncCurrentUser_(payload.currentUser);
          applyControllerSummaryPayload_(payload.summary || null);
          applyControllerSalesKpiSnapshotPayload_(payload.salesKpiSnapshot || null);
          applyControllerStatusSummaryPayload_(payload.statusSummary || []);
          applyControllerOpsSummaryPayload_(payload.opsSummary || null);
          applyControllerTrendPayload_(payload.trend || []);
          applyControllerTopSalesPayload_(payload.topSales || []);
          applyControllerTopCustomersPayload_(payload.topCustomers || []);
          applyControllerTopItemsPayload_(payload.topItems || []);
          appState.controllerLastUpdated = String(payload.lastUpdated || '').trim() || appState.controllerLastUpdated;
          renderControllerDashboard_();
          setStatusText_('Dashboard controller siap');

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render dashboard controller');
          renderResult_('Gagal render dashboard controller: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat dashboard controller');
        renderResult_('Gagal memuat dashboard controller: ' + (error && error.message ? error.message : error), true);

        startDate: appState.controllerStartDate,
        endDate: appState.controllerEndDate

  }

  function loadSalesKpiSummary_(callback) {
    if (!ensureAuthorizedSession_()) return;

    var monthKey = normalizeMonthKeyClient_(getFieldValue_('salesKpiMonth')) || appState.salesKpiMonth || getTodayMonthKey_();
    appState.salesKpiMonth = monthKey;
    setFieldValue_('salesKpiMonth', monthKey);

    if (!google || !google.script || !google.script.run) {
      setStatusText_('Fitur KPI belum aktif');
      renderResult_('Fitur KPI belum tersedia di deployment ini. Silakan redeploy Apps Script (Deploy > Manage deployments > Edit > Update).', true);
      return;
    }

    google.script.run
      .withSuccessHandler(function(summary) {
        try {
          appState.salesKpiSummary = summary || null;
          appState.salesKpiOrdersPage = 1;
          renderSalesKpiSummary_();
          renderSalesKpiOrders_();

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render KPI sales');
          renderResult_('Gagal render KPI sales: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat KPI sales');
        renderResult_('Gagal memuat KPI sales: ' + (error && error.message ? error.message : error), true);
      })
      .getSalesKpiSummaryFromDashboard(appState.currentUser.user_id, {
        bulan: monthKey
      });
  }

  function loadApproverData_(callback) {

    google.script.run

  function renderApproverKpiTable_() {
    var tbody = document.getElementById('approverKpiTableBody');
    var rows;
    var statusPriorityMap = {
      'Belum Ada Target': 1,
      'Belum Mulai': 2,
      'Berjalan': 3,
      'Tercapai': 4,
      'Melebihi': 5
    };
    if (!tbody) return;

    rows = (appState.approverKpiRows || []).slice().sort(function(left, right) {
      var leftRank = statusPriorityMap[String(left.status_kpi || '').trim()] || 99;
      var rightRank = statusPriorityMap[String(right.status_kpi || '').trim()] || 99;

      if (leftRank !== rightRank) {
        return leftRank - rightRank;
      }

      if (Number(left.progress_percent || 0) !== Number(right.progress_percent || 0)) {
        return Number(left.progress_percent || 0) - Number(right.progress_percent || 0);
      }

      return String(left.sales_name || left.sales_id || '').localeCompare(String(right.sales_name || right.sales_id || ''), 'id-ID');
    });

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-cell">Belum ada data progress KPI.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function(row) {
      var salesId = String(row.sales_id || '').trim();
      var salesName = String(row.sales_name || salesId || '-').trim() || '-';
      var targetQty = Number(row.target_qty || 0);
      var achievedQty = Number(row.achieved_qty || 0);
      var remainingQty = Number(row.remaining_qty || 0);
      var progressPercent = Number(row.progress_percent || 0);
      var orderCount = Number(row.order_count || 0);
      var updateMeta = [];
      var note = String(row.catatan_target || '').trim();
      var progressBarClass = 'kpi-progress-bar-fill';
      if (row.last_target_updated_by) updateMeta.push('Oleh ' + String(row.last_target_updated_by));
      if (row.last_target_update) updateMeta.push(String(row.last_target_update));
      if (note) updateMeta.push('Catatan: ' + note);

      if (progressPercent >= 100) {
        progressBarClass += ' is-success';
      } else if (progressPercent === 0 || String(row.status_kpi || '') === 'Belum Mulai') {
        progressBarClass += ' is-warning';
      }

      return '' +
        '<tr>' +
          '<td><div class="kpi-sales-cell"><strong>' + escapeHtml_(salesName) + '</strong><small>' + escapeHtml_(salesId || '-') + '</small></div></td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(targetQty)) + '</td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(achievedQty)) + '</td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(remainingQty)) + '</td>' +
          '<td><div class="kpi-progress-cell"><div class="kpi-progress-value">' + escapeHtml_(String(progressPercent) + '%') + '</div><div class="kpi-progress-bar"><div class="' + progressBarClass + '" style="width:' + escapeHtml_(String(Math.max(Math.min(progressPercent, 100), 0))) + '%"></div></div></div></td>' +
          '<td class="cell-right">' + escapeHtml_(formatNumber_(orderCount)) + '</td>' +
          '<td>' + buildStatusBadge_(row.status_kpi || 'Belum Ada Target') + '</td>' +
          '<td><small>' + escapeHtml_(updateMeta.join(' | ') || '-') + '</small></td>' +
        '</tr>';
    }).join('');
  }

  function getFilteredApprovals_() {
    var query = normalizeSearchText_(appState.approverSearch);
    var filterDate = normalizeDateKey_(appState.approverFilterDate);

    return (appState.approvals || []).slice().sort(compareApprovalsByPriority_).filter(function(row) {
      var haystack;
      var rowDate = normalizeDateKey_(row.tanggal_pengajuan);

      if (filterDate && rowDate !== filterDate) {
        return false;
      }

      if (!query) {
        return true;
      }

      haystack = [
        row.no_so,
        row.customer,
        row.sales_nama,
        row.diajukan_oleh,
        row.item,
        row.alasan_approval,
        row.status_customer
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function getFilteredExportOrders_() {
    var filterDate = normalizeDateKey_(appState.approverExportFilterDate);

    return (appState.exportOrders || []).slice().filter(function(row) {
      var rowDate = normalizeDateKey_(row.tanggal_selesai || row.tanggal_verifikasi_cs || row.tanggal_order);

      if (!filterDate) {
        return true;
      }

      return rowDate === filterDate;
    });
  }

  function getFilteredApproverProducts_() {
    var query = normalizeSearchText_(appState.approverPriceSearch);

    return (appState.products || []).slice().sort(function(left, right) {
      return normalizeSearchText_(left.nama_item).localeCompare(normalizeSearchText_(right.nama_item), 'id-ID');
    }).filter(function(product) {
      var haystack;

      if (!query) {
        return true;
      }

      haystack = [
        product.kode_item,
        product.nama_item,
        product.satuan
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function compareApprovalsByPriority_(left, right) {
    return getApprovalPriorityScore_(right) - getApprovalPriorityScore_(left);
  }

  function getApprovalPriorityScore_(row) {
    var score = 0;

    if (normalizeClientText_(row.status_customer) === 'ditahan') {
      score += 10000;
    }

    if (normalizeClientText_(row.status_pembayaran_customer) === 'ditahan') {
      score += 6000;
    }

    score += Number(row.jumlah_nota_overdue || 0) * 100;
    score += Math.floor(Number(row.total_tunggakan || 0) / 100000);

    if (String(row.tanggal_jatuh_tempo_terdekat || '').trim()) {
      score += 25;
    }

    return score;
  }

  function buildApproverCustomerCellHtml_(row) {
    var metaLines = [];

    if (row.sales_nama) {
      metaLines.push('<div class="approver-meta-line"><strong>Sales Order:</strong> ' + escapeHtml_(row.sales_nama) + '</div>');
    }

    if (row.diajukan_oleh) {
      metaLines.push('<div class="approver-meta-line"><strong>Diajukan Oleh:</strong> ' + escapeHtml_(row.diajukan_oleh) + '</div>');
    }

    if (row.tanggal_pengajuan) {
      metaLines.push('<div class="approver-meta-line"><strong>Tanggal:</strong> ' + escapeHtml_(row.tanggal_pengajuan) + '</div>');
    }

    return '' +
      '<div class="approver-customer-cell">' +
        '<strong>' + escapeHtml_(row.customer || '-') + '</strong>' +
        '<div class="approver-meta">' + metaLines.join('') + '</div>' +
      '</div>';
  }

  function buildApproverOrderCellHtml_(row) {
    return '' +
      '<div class="approver-order-cell">' +
        buildOrderDetailCellHtml_(row) +
        '<div class="approver-order-total"><strong>Total:</strong> Rp ' + escapeHtml_(formatNumber_(row.total || 0)) + '</div>' +
      '</div>';
  }

  function buildApproverRiskSummary_(row) {
    var lines = [];
    var badges = [];
    var alasanApproval = String(row.alasan_approval || '').trim();
    var statusCustomer = normalizeClientText_(row.status_customer);
    var statusPembayaran = String(row.status_pembayaran_customer || '').trim();
    var jumlahNota = Number(row.jumlah_nota_overdue || 0);
    var totalTunggakan = Number(row.total_tunggakan || 0);
    var jatuhTempo = String(row.tanggal_jatuh_tempo_terdekat || '').trim();
    var catatan = String(row.catatan_piutang || '').trim();

    if (statusPembayaran) {
      badges.push(buildPaymentBadge_(statusPembayaran));
    }

    if (String(row.status_customer || '').trim()) {
      badges.push(buildStatusBadge_(row.status_customer));
    }

    if (statusCustomer === 'ditahan') {
      lines.push('Status customer ditahan');
    }

    if (jumlahNota > 0) {
      lines.push('Customer menunggak ' + jumlahNota + ' nota');
    }

    if (totalTunggakan > 0) {
      lines.push('Total tunggakan Rp ' + formatNumber_(totalTunggakan));
    }

    if (jatuhTempo) {
      lines.push('JT terdekat ' + jatuhTempo);
    }

    if (alasanApproval && !isDuplicateApprovalReason_(alasanApproval, lines)) {
      lines.push(alasanApproval);
    }

    if (catatan) {
      lines.push('Catatan piutang: ' + catatan);
    }

    if (!lines.length) {
      lines.push('Perlu persetujuan manual');
    }

    return '' +
      '<div class="approver-risk-cell">' +
        (badges.length ? '<div class="inline-actions approver-risk-badges">' + badges.join('') + '</div>' : '') +
        '<div class="risk-summary">' + lines.map(function(line) {
          return '<div class="risk-line">- ' + escapeHtml_(line) + '</div>';
        }).join('') + '</div>' +
      '</div>';
  }

  function buildApproverActionsHtml_(noSo) {
    return '' +
      '<div class="approver-action-stack">' +
        '<input class="mini-input approver-note-input" id="approval-note-' + escapeHtml_(noSo) + '" type="text" placeholder="Catatan keputusan wajib" />' +
        '<div class="approver-inline-message hidden" id="approval-message-' + escapeHtml_(noSo) + '"></div>' +
        '<div class="inline-actions">' +
          '<button type="button" class="approve-btn" onclick="handleApproveOrder(\'' + escapeJs_(noSo) + '\')">Approve</button>' +
          '<button type="button" class="danger-btn" onclick="handleRejectOrder(\'' + escapeJs_(noSo) + '\')">Reject</button>' +
        '</div>' +
      '</div>';
  }

  function isDuplicateApprovalReason_(reason, existingLines) {
    var normalizedReason = normalizeSearchText_(reason);

    return (existingLines || []).some(function(line) {
      return normalizeSearchText_(line).indexOf(normalizedReason) !== -1 ||
        normalizedReason.indexOf(normalizeSearchText_(line)) !== -1;
    });
  }

  function renderReadyOrderTable_() {
    var tbody = document.getElementById('readyOrderTableBody');
    var pagination = document.getElementById('readyOrderPagination');
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;
    var orderedRows;
    var emptyColspan = 10;
    var searchActive = normalizeReadyOrderSearchQuery_().length >= 2;
    if (!tbody) return;

    if (!appState.readyOrders.length) {
      tbody.innerHTML = '<tr><td colspan="' + emptyColspan + '" class="empty-cell">Belum ada order siap kirim.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    orderedRows = getFilteredReadyOrders_().slice().sort(function(left, right) {
      var leftStatus = getAdminReadyOrderDisplayStatus_(left);
      var rightStatus = getAdminReadyOrderDisplayStatus_(right);
      var leftPriority = normalizeSearchText_(leftStatus) === 'pending kirim' ? 0 : 1;
      var rightPriority = normalizeSearchText_(rightStatus) === 'pending kirim' ? 0 : 1;
      var leftDate = normalizeDateKey_(left && left.tanggal_kirim_rencana) || '9999-12-31';
      var rightDate = normalizeDateKey_(right && right.tanggal_kirim_rencana) || '9999-12-31';

      if (leftPriority !== rightPriority) {
        return leftPriority - rightPriority;
      }

      if (leftDate !== rightDate) {
        return leftDate.localeCompare(rightDate);
      }

      return String(left && left.no_so || '').localeCompare(String(right && right.no_so || ''));
    });

    if (!orderedRows.length) {
      tbody.innerHTML = '<tr><td colspan="' + emptyColspan + '" class="empty-cell">' +
        escapeHtml_(searchActive ? 'Customer tidak ditemukan.' : 'Belum ada order siap kirim.') +
      '</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getReadyOrderPageTotal_();
    currentPage = normalizeReadyOrderPage_();
    startIndex = (currentPage - 1) * READY_ORDER_PAGE_SIZE;
    endIndex = Math.min(startIndex + READY_ORDER_PAGE_SIZE, orderedRows.length);
    pageRows = orderedRows.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      var noSo = String(row.no_so || '');
      var inputSalesDate = formatShortDateId_(row.tanggal_order || '');
      var inputSalesLabel = formatTimeLabelWib_(row.jam_order || '');
      var tanggalKirim = formatShortDateId_(row.tanggal_kirim_rencana || row.tanggal_kirim || row.tanggal_order || '');
      var customerName = String(row.nama_customer_input || row.nama_customer || '-');
      var salesName = String(row.sales_nama || '-');
      var displayStatus = getAdminReadyOrderDisplayStatus_(row);

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td><strong>' + escapeHtml_(inputSalesDate || '-') + '</strong><br/><small>' + escapeHtml_(inputSalesLabel) + '</small></td>' +
          '<td>' + escapeHtml_(tanggalKirim) + '</td>' +
          '<td>' + escapeHtml_(customerName) + '</td>' +
          '<td>' + escapeHtml_(salesName) + '</td>' +
          '<td>' + buildOrderItemSummaryHtml_(row) + '</td>' +
          '<td>' + escapeHtml_(getOrderQtyLabel_(row)) + '</td>' +
          '<td>' + buildStatusBadge_(displayStatus) + '</td>' +
          '<td>' + formatNumber_(row.total_order || row.total) + '</td>' +
          '<td><div class="ready-order-actions">' +
            '<button type="button" class="danger-btn" onclick="openCancelSalesOrderModal(\'' + escapeJs_(noSo) + '\')">Batalkan SO</button>' +
            '<button type="button" class="ghost-btn" onclick="openCsRevisionModal(\'' + escapeJs_(noSo) + '\')">Revisi CS</button>' +
            '<button type="button" class="preview-btn" onclick="handlePreviewSuratJalan(\'' + escapeJs_(noSo) + '\')">Preview</button>' +
            '<button type="button" class="approve-btn" onclick="handleCreateSuratJalan(\'' + escapeJs_(noSo) + '\')">Buat SJ</button>' +
          '</div></td>' +
        '</tr>';
    }).join('');

    if (!pagination) {
      return;
    }

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + orderedRows.length + ' order siap kirim/pending';

    pagination.innerHTML = '' +
      '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
      '<div class="table-pagination-actions">' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleReadyOrderPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleReadyOrderPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
      '</div>';
  }

  function getAdminReadyOrderDisplayStatus_(row) {
    var statusOrder = String(row && row.status_order || '').trim();
    var tanggalRencana = normalizeDateKey_(row && row.tanggal_kirim_rencana);
    var today = getTodayIsoDate_();

    if (normalizeSearchText_(statusOrder) === 'siap kirim' && tanggalRencana && tanggalRencana < today) {
      return 'Pending Kirim';
    }

    return statusOrder || '-';
  }

  function getReadyOrderPageTotal_() {
    return Math.max(1, Math.ceil((getFilteredReadyOrders_().length || 0) / READY_ORDER_PAGE_SIZE));
  }

  function normalizeReadyOrderPage_() {
    var totalPages = getReadyOrderPageTotal_();
    var currentPage = Number(appState.readyOrderPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > totalPages) {
      currentPage = totalPages;
    }

    appState.readyOrderPage = currentPage;
    return currentPage;
  }

  function handleReadyOrderPageChange_(direction) {
    var nextPage = normalizeReadyOrderPage_() + Number(direction || 0);
    var totalPages = getReadyOrderPageTotal_();

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.readyOrderPage) {
      return;
    }

    appState.readyOrderPage = nextPage;
    renderReadyOrderTable_();
  }

  function handleReadyOrderSearchInput_() {
    appState.readyOrderSearch = getFieldValue_('readyOrderSearch');
    appState.readyOrderPage = 1;
    renderReadyOrderTable_();
  }

  function normalizeReadyOrderSearchQuery_() {
    return normalizeSearchText_(appState.readyOrderSearch || '');
  }

  function getFilteredReadyOrders_() {
    var query = normalizeReadyOrderSearchQuery_();

    if (query.length < 2) {
      return appState.readyOrders || [];
    }

    return (appState.readyOrders || []).filter(function(row) {
      var haystacks = [
        row && row.nama_customer_input,
        row && row.nama_customer,
        row && row.no_so,
        row && row.sales_nama,
        row && row.item_summary
      ];

      return haystacks.some(function(value) {
        return normalizeSearchText_(value).indexOf(query) !== -1;
      });
    });
  }

  function renderDeliveryTable_() {
    var tbody = document.getElementById('deliveryTableBody');
    var pagination = document.getElementById('deliveryPagination');
    var filteredOrders;
    var activeDateLabel;
    var searchQuery;
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;
    if (!tbody) return;

    if (!appState.deliveryOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Belum ada surat jalan.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    filteredOrders = getFilteredDeliveryOrders_();
    activeDateLabel = appState.deliveryFilterDate ? formatLongDateId_(appState.deliveryFilterDate) : '';
    searchQuery = normalizeDeliverySearchQuery_();

    if (!filteredOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">' +
        escapeHtml_(activeDateLabel ? ('Belum ada surat jalan untuk tanggal ' + activeDateLabel + '.') : 'Belum ada surat jalan.') +
      '</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    filteredOrders = getFilteredSearchedDeliveryOrders_(filteredOrders);

    if (!filteredOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">' +
        escapeHtml_(searchQuery ? 'Surat jalan tidak ditemukan.' : 'Belum ada surat jalan.') +
      '</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getDeliveryPageTotal_(filteredOrders);
    currentPage = normalizeDeliveryPage_(totalPages);
    startIndex = (currentPage - 1) * DELIVERY_PAGE_SIZE;
    endIndex = Math.min(startIndex + DELIVERY_PAGE_SIZE, filteredOrders.length);
    pageRows = filteredOrders.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      var noSo = String(row.no_so || '');
      var actions = [];
      var statusVerifikasi = String(row.status_verifikasi_cs || 'Belum Dicek');

      if (String(row.status_kirim || '') === 'Siap Kirim') {
        actions.push('<button type="button" class="approve-btn" onclick="handleMarkDelivered(\'' + escapeJs_(noSo) + '\')">Terkirim</button>');
      }

      if (String(row.status_kirim || '') === 'Terkirim') {
        actions.push('<button type="button" class="ghost-btn" onclick="openDeliveryVerification(\'' + escapeJs_(noSo) + '\')">Verifikasi CS</button>');

        if (statusVerifikasi === 'Sudah Dicek') {
          actions.push('<button type="button" class="ghost-btn" onclick="handleCompleteOrder(\'' + escapeJs_(noSo) + '\')">Selesai</button>');
        }
      }

      actions.push('<button type="button" class="ghost-btn print-action-btn" onclick="handlePrintSuratJalan(\'' + escapeJs_(noSo) + '\')">Print (SJ+Nota)</button>');
      actions.push('<button type="button" class="ghost-btn print-action-btn" onclick="handlePrintSuratJalanOnly(\'' + escapeJs_(noSo) + '\')">Print (SJ)</button>');

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(row.no_surat_jalan) + '</td>' +
          '<td>' + escapeHtml_(formatShortDateId_(row.tanggal_kirim || row.tanggal_cetak || '')) + '</td>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + escapeHtml_(row.nama_customer) + '</td>' +
          '<td>' + buildDeliveryStatusCellHtml_(row) + '</td>' +
          '<td><div class="inline-actions">' + actions.join('') + '</div></td>' +
        '</tr>';
    }).join('');

    if (!pagination) {
      return;
    }

    if (filteredOrders.length <= DELIVERY_PAGE_SIZE) {
      pagination.innerHTML = '';
      return;
    }

  function buildPayoutBatchSummaryText_(detail) {
    var payload = detail || {};
    var batch = payload.batch || {};
    var rows = Array.isArray(payload.rows) ? payload.rows : [];
    var lineItems = [];

    if (!batch.payout_batch_id && !rows.length) {
      return '';
    }

    lineItems = rows.map(function(row, index) {
      return [
        String(index + 1) + '. ' + String(row.no_so || '-'),
        String(row.nama_customer || '-'),
        formatCurrencyInput_(row.nominal_komisi || 0),
        'Status ' + String(row.status_detail || '-')
      ].join(' | ');
    });

    return [
      'Ringkasan Batch Payout SLF',
      'No Batch: ' + String(batch.payout_batch_id || '-'),
      'Sales: ' + String(batch.sales_nama || batch.sales_id || '-'),
      'Tanggal: ' + formatShortDateId_(batch.tanggal_pengajuan || batch.created_at || ''),
      'Status: ' + String(batch.status_payout || '-'),
      'Jumlah SO: ' + String(batch.jumlah_so || rows.length || 0),
      'Total Komisi: ' + formatCurrencyInput_(batch.total_komisi || 0),
      'Catatan Sales: ' + String(batch.catatan_sales || '-'),
      'Catatan Approver: ' + String(batch.catatan_approver || '-'),
      '',
      'Daftar SO:',
      lineItems.length ? lineItems.join('\n') : '-'
    ].join('\n');
  }

  function submitPayoutActionModal_() {
    var draft = appState.payoutActionDraft || null;
    var note = String(getFieldValue_('payoutActionNote') || '').trim();
    var saveBtn = document.getElementById('savePayoutActionBtn');
    var noteEl = document.getElementById('payoutActionNote');

    if (!draft || !draft.mode) {
      renderResult_('Draft aksi payout tidak ditemukan. Tutup modal lalu coba lagi.', true);
      return;
    }

    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Sedang Diproses...';
    }

    if (noteEl) {
      noteEl.disabled = true;
    }

    if (draft.mode === 'submit_sales_payout') {
      setStatusText_('Mengajukan batch payout komisi...');
      google.script.run
        .withSuccessHandler(function(result) {
          closePayoutActionModal_();
          setStatusText_('Pengajuan payout berhasil dibuat');
          renderResult_(
            'Pengajuan pencairan berhasil dibuat.\nNo Batch: ' + String(result.payout_batch_id || '-') +
            '\nJumlah SO: ' + String(result.jumlah_so || 0) +
            '\nTotal: ' + formatCurrencyInput_(result.total_komisi || 0),
            false
          );
          loadSalesData_();
        })
        .withFailureHandler(function(error) {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = draft.save_label || 'Simpan';
          }
          if (noteEl) {
            noteEl.disabled = false;
          }
          setStatusText_('Gagal mengajukan payout komisi');
          renderResult_('Gagal mengajukan payout komisi: ' + (error && error.message ? error.message : error), true);
        })
        .submitSlfPayoutRequestFromDashboard(appState.currentUser.user_id, {
          catatan_sales: note
        });
      return;
    }

    if (draft.mode === 'mark_batch_paid') {
      setStatusText_('Menyimpan pembayaran batch payout...');
      google.script.run
        .withSuccessHandler(function(result) {
          closePayoutActionModal_();
          setStatusText_('Batch payout berhasil ditandai dibayar');
          renderResult_(
            'Batch payout berhasil ditandai sudah dibayar.\nNo Batch: ' + String(result.payout_batch_id || draft.payout_batch_id || '-') +
            '\nJumlah SO: ' + String(result.updated_count || 0),
            false
          );
          loadApproverCommissionData_();
        })
        .withFailureHandler(function(error) {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = draft.save_label || 'Simpan';
          }
          if (noteEl) {
            noteEl.disabled = false;
          }
          setStatusText_('Gagal menyimpan pembayaran batch payout');
          renderResult_('Gagal menyimpan pembayaran batch payout: ' + (error && error.message ? error.message : error), true);
        })
        .markSlfPayoutBatchPaidFromDashboard(appState.currentUser.user_id, {
          payout_batch_id: draft.payout_batch_id,
          catatan_approver: note
        });
      return;
    }

    if (draft.mode === 'mark_batch_processing') {
      setStatusText_('Mengubah status batch ke Diproses...');
      google.script.run
        .withSuccessHandler(function(result) {
          closePayoutActionModal_();
          setStatusText_('Batch payout ditandai sedang diproses');
          renderResult_(
            'Batch payout ditandai sedang diproses.\nNo Batch: ' + String(result.payout_batch_id || draft.payout_batch_id || '-') +
            '\nJumlah SO: ' + String(result.updated_count || 0),
            false
          );
          loadApproverCommissionData_();
        })
        .withFailureHandler(function(error) {
          if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = draft.save_label || 'Simpan';
          }
          if (noteEl) {
            noteEl.disabled = false;
          }
          setStatusText_('Gagal mengubah status batch payout');
          renderResult_('Gagal mengubah status batch payout: ' + (error && error.message ? error.message : error), true);
        })
        .markSlfPayoutBatchInProcessFromDashboard(appState.currentUser.user_id, {
          payout_batch_id: draft.payout_batch_id,
          catatan_approver: note

  function handleSaveApproverKpiTarget_() {
    if (!ensureAuthorizedSession_()) return;

    var saveBtn = document.getElementById('saveApproverKpiBtn');

    var monthKey = normalizeMonthKeyClient_(getFieldValue_('approverKpiMonth')) || appState.approverKpiMonth || getTodayMonthKey_();
    var salesId = String(getFieldValue_('approverKpiSales') || '').trim();
    var qty = Number(getFieldValue_('approverKpiTargetQty') || 0);
    var note = String(getFieldValue_('approverKpiNote') || '').trim();

    if (!google || !google.script || !google.script.run) {
      setStatusText_('Fitur KPI belum aktif');
      renderResult_('Simpan target KPI belum tersedia di deployment ini. Silakan redeploy Apps Script (Deploy > Manage deployments > Edit > Update).', true);
      return;
    }

    if (!salesId) {
      renderResult_('Pilih sales sebelum menyimpan target KPI.', true);
      return;
    }

    if (!(qty >= 0)) {
      renderResult_('Target KPI harus berupa angka (boleh 0).', true);
      return;
    }

    if (saveBtn) {
      saveBtn.disabled = true;
    }
    setStatusText_('Menyimpan target KPI...');

    if (KPI_SAVE_ASYNC_STATUS_TIMER) {
      clearTimeout(KPI_SAVE_ASYNC_STATUS_TIMER);
    }
    KPI_SAVE_ASYNC_STATUS_TIMER = setTimeout(function() {
      try {
        if (saveBtn) {
          saveBtn.disabled = false;
        }
        setStatusText_('Gagal simpan target KPI (timeout)');
        renderResult_('Simpan target KPI tidak mendapat respon dari Apps Script. Cek Deploy terbaru dan menu Executions di Apps Script untuk melihat error server.', true);
      } catch (error) {
        // ignore
      }
    }, 15000);

    google.script.run
      .withSuccessHandler(function(result) {
        if (KPI_SAVE_ASYNC_STATUS_TIMER) {
          clearTimeout(KPI_SAVE_ASYNC_STATUS_TIMER);
          KPI_SAVE_ASYNC_STATUS_TIMER = null;
        }
        if (saveBtn) {
          saveBtn.disabled = false;
        }
        setStatusText_('Target KPI tersimpan');
        if (result && result.mode === 'all') {
          renderResult_('Target KPI berhasil diterapkan ke semua sales aktif (' + String(result.updated_count || 0) + ' sales).', false);
        } else {

  function updateDeliverySummaryAfterStatusChange_(previousStatus, nextStatus) {
    var summary = appState.deliverySummary || null;
    if (!summary) {
      return;
    }

    function toKey(status) {
      var normalized = String(status || '').trim().toLowerCase();
      if (normalized === 'siap kirim') return 'siap_kirim';
      if (normalized === 'terkirim') return 'terkirim';
      if (normalized === 'selesai') return 'selesai';
      return '';
    }

    var prevKey = toKey(previousStatus);
    var nextKey = toKey(nextStatus);

    if (prevKey && typeof summary[prevKey] === 'number') {
      summary[prevKey] = Math.max(Number(summary[prevKey] || 0) - 1, 0);
    }

    if (nextKey && typeof summary[nextKey] === 'number') {
      summary[nextKey] = Number(summary[nextKey] || 0) + 1;
    }

    appState.deliverySummary = summary;
  }

  function updateDeliveryOrderInState_(noSo, updates) {
    var target = getDeliveryOrderByNoSo_(noSo);
    if (!target) return null;

    var previousStatus = String(target.status_kirim || '').trim();

    Object.keys(updates || {}).forEach(function(key) {
      target[key] = updates[key];
    });

    return {
      order: target,
      previousStatus: previousStatus,
      nextStatus: String(target.status_kirim || '').trim()
    };
  }

  function handleVerificationLineInput_(index) {

  function updateDeliveryVerificationTotals_() {
    var order = getDeliveryOrderByNoSo_(appState.currentDeliveryVerificationNoSo);
    var details = Array.isArray(order && order.details) ? order.details : [];
    var totals = details.reduce(function(result, _, index) {
      var qty = Number(getFieldValue_('verify-qty-' + index) || 0);
      var harga = Number(getFieldValue_('verify-harga-' + index) || 0);
      var diskon = Number(getFieldValue_('verify-diskon-' + index) || 0);
      var subtotal = Math.max((qty * harga) - diskon, 0);

      result.subtotal += qty * harga;
      result.diskon += diskon;
      result.total += subtotal;
      return result;
    }, {
      subtotal: 0,
      diskon: 0,
      total: 0
    });

    setFieldValue_('verificationSubtotalFinal', formatCurrencyInput_(totals.subtotal));
    setFieldValue_('verificationDiskonFinal', formatCurrencyInput_(totals.diskon));
    setFieldValue_('verificationTotalFinal', formatCurrencyInput_(totals.total));
  }

    if (!String(payload.no_so || '').trim()) {

    if (!String(payload.term_pembayaran || '').trim()) {

      return 'Alasan revisi wajib diisi.';
    }

    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item revisi wajib diisi.';
    }

    for (var i = 0; i < payload.items.length; i += 1) {
      if (!(Number(payload.items[i].qty || 0) > 0)) {
        return 'Qty revisi pada semua item harus lebih dari 0.';
      }
      if (Number(payload.items[i].harga || 0) < 0) {
        return 'Harga revisi tidak boleh negatif.';
      }
      if (Number(payload.items[i].diskon || 0) < 0) {
        return 'Diskon revisi tidak boleh negatif.';
      }
    }

    return '';
  }

  function saveCsRevision_(event) {
    var payload;
    var validationMessage;
    var saveBtn = document.getElementById('saveCsRevisionBtn');
    var invalidFieldId = '';

    if (event && typeof event.preventDefault === 'function') {
      event.preventDefault();
    }

    clearCsRevisionMessage_();
    clearCsRevisionFieldErrors_();
    payload = collectCsRevisionPayload_();
    validationMessage = validateCsRevisionPayload_(payload);

    if (validationMessage) {
      if (!String(payload.term_pembayaran || '').trim()) {
        invalidFieldId = 'csRevisionTermPembayaran';
      } else if (!String(payload.tanggal_kirim_rencana || '').trim()) {
        invalidFieldId = 'csRevisionTanggalKirim';
      } else if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
        invalidFieldId = 'csRevisionTanggalJatuhTempo';
      } else if (!String(payload.alasan_revisi || '').trim()) {
        invalidFieldId = 'csRevisionAlasan';
      }

      showCsRevisionMessage_(validationMessage);
      markCsRevisionFieldError_(invalidFieldId);
      setStatusText_('Form Revisi CS belum lengkap');
      renderResult_(validationMessage, true);
      return;
    }

    saveBtn.disabled = true;
    setStatusText_('Menyimpan Revisi CS...');

    google.script.run
      .withSuccessHandler(function(result) {
        saveBtn.disabled = false;
        closeCsRevisionModal_();
        setStatusText_('Revisi CS berhasil disimpan');
        renderResult_(
          (result && result.message ? result.message : 'Revisi CS berhasil disimpan.') +
          '\nNo. SO: ' + (result.no_so || '-') +
          '\nStatus Order: ' + (result.status_order || '-'),
          false
        );
        loadAdminOperationsData_();
      })
      .withFailureHandler(function(error) {
        saveBtn.disabled = false;
        showCsRevisionMessage_('Gagal menyimpan revisi order: ' + error.message);
        setStatusText_('Gagal menyimpan Revisi CS');
        renderResult_('Gagal menyimpan revisi order: ' + error.message, true);
      })
      .saveSalesOrderRevisionFromDashboard(appState.currentUser.user_id, payload);
  }

  function handleAddCsRevisionItem_() {
    var select = document.getElementById('csRevisionAddItem');
    var option = select && select.options ? select.options[select.selectedIndex] : null;
    var draft = appState.csRevisionDraft || {};
    var kodeItem = option ? String(option.dataset.kodeItem || option.value || '').trim() : '';
    var namaItem = option ? String(option.dataset.namaItem || option.textContent || '').trim() : '';
    var qty = Number(getFieldValue_('csRevisionAddQty') || 0);
    var harga = parseCurrencyInput_(getFieldValue_('csRevisionAddHarga'));
    var diskon = Number(getFieldValue_('csRevisionAddDiskon') || 0);
    var product;

    clearCsRevisionMessage_();

    if (!kodeItem || !namaItem) {
      showCsRevisionMessage_('Pilih produk yang ingin ditambahkan.');
      return;
    }

    if ((draft.details || []).some(function(item) {
      return String(item.kode_item || '').trim() === kodeItem || String(item.nama_item || '').trim() === namaItem;
    })) {
      showCsRevisionMessage_('Produk ini sudah ada di SO. Silakan revisi qty atau harga pada baris yang sudah ada.');
      return;
    }

    if (!(qty > 0)) {
      showCsRevisionMessage_('Qty item baru harus lebih dari 0.');
      return;
    }

    if (harga < 0) {
      showCsRevisionMessage_('Harga item baru tidak boleh negatif.');
      return;
    }

    if (diskon < 0) {
      showCsRevisionMessage_('Diskon item baru tidak boleh negatif.');
      return;
    }

    product = (appState.products || []).find(function(row) {
      return String(row.kode_item || '').trim() === kodeItem;
    }) || null;

    draft.details = Array.isArray(draft.details) ? draft.details : [];
    draft.details.push({
      detail_id: '',
      kode_item: kodeItem,
      nama_item: namaItem,
      qty: qty,
      original_qty: 0,
      satuan: product && product.satuan ? product.satuan : '',
      harga: harga,
      original_harga: 0,
      diskon: diskon,
      subtotal: Math.max((qty * harga) - diskon, 0),
      is_new: true
    });

    appState.csRevisionDraft = draft;
    renderCsRevisionDraft_();
  }

  function handleRemoveCsRevisionItem_(index) {
    var draft = appState.csRevisionDraft || {};

    if (!Array.isArray(draft.details) || !draft.details.length) {

    appState.csRevisionDraft = draft;

  function handleCsRevisionLineInput_(index) {
    var draft = appState.csRevisionDraft || {};
    var detail = draft && draft.details ? draft.details[index] : null;
    var qty = Number(getFieldValue_('csRevisionQty-' + index) || 0);
    var harga = parseCurrencyInput_(getFieldValue_('csRevisionHarga-' + index));
    var diskon = Number(getFieldValue_('csRevisionDiskon-' + index) || 0);
    var subtotal = Math.max((qty * harga) - diskon, 0);

    if (!detail) {
      return;
    }

    detail.qty = qty;
    detail.harga = harga;
    detail.diskon = diskon;
    detail.subtotal = subtotal;
    setFieldValue_('csRevisionHarga-' + index, formatPlainNumberInput_(harga));
    setFieldValue_('csRevisionSubtotal-' + index, formatCurrencyInput_(subtotal));
    updateCsRevisionTotals_();
  }

  function updateCsRevisionTotals_() {
    var draft = appState.csRevisionDraft || {};
    var totals = (draft.details || []).reduce(function(result, item, index) {
      var qty = Number(getFieldValue_('csRevisionQty-' + index) || item.qty || 0);
      var harga = parseCurrencyInput_(getFieldValue_('csRevisionHarga-' + index) || item.harga || 0);
      var diskon = Number(getFieldValue_('csRevisionDiskon-' + index) || item.diskon || 0);
      var subtotal = Math.max((qty * harga) - diskon, 0);

      result.subtotal += qty * harga;
      result.diskon += diskon;
      result.total += subtotal;
      return result;
    }, {
      subtotal: 0,
      diskon: 0,
      total: 0
    });

    setText_('csRevisionSubtotal', formatCurrencyInput_(totals.subtotal));
    setText_('csRevisionDiskon', formatCurrencyInput_(totals.diskon));
    setText_('csRevisionTotal', formatCurrencyInput_(totals.total));
  }

  function renderSalesKpiOrders_() {
    var tbody = document.getElementById('salesKpiOrdersBody');
    var pagination = document.getElementById('salesKpiOrdersPagination');
    var summary;
    var orders;
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;
    if (!tbody) return;

    summary = appState.salesKpiSummary || null;
    orders = summary && Array.isArray(summary.orders) ? summary.orders : [];

    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-cell">Belum ada data KPI.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getSalesKpiOrdersPageTotal_();
    currentPage = normalizeSalesKpiOrdersPage_();
    startIndex = (currentPage - 1) * SALES_KPI_ORDERS_PAGE_SIZE;
    endIndex = Math.min(startIndex + SALES_KPI_ORDERS_PAGE_SIZE, orders.length);
    pageRows = orders.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      return '' +

          '<td class="cell-right">' + escapeHtml_(formatNumber_(row.qty_total || 0)) + '</td>' +
        '</tr>';
    }).join('');

    if (!pagination) {
      return;
    }

    if (orders.length <= SALES_KPI_ORDERS_PAGE_SIZE) {
      pagination.innerHTML = '';
      return;
    }

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + orders.length + ' order';

    pagination.innerHTML = '' +
      '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
      '<div class="table-pagination-actions">' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleSalesKpiOrdersPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleSalesKpiOrdersPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
      '</div>';
  }

  function getSalesKpiOrdersPageTotal_() {
    var summary = appState.salesKpiSummary || null;
    var orders = summary && Array.isArray(summary.orders) ? summary.orders : [];

    return Math.max(1, Math.ceil((orders.length || 0) / SALES_KPI_ORDERS_PAGE_SIZE));
  }

  function normalizeSalesKpiOrdersPage_() {
    var totalPages = getSalesKpiOrdersPageTotal_();
    var currentPage = Number(appState.salesKpiOrdersPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > totalPages) {
      currentPage = totalPages;
    }

    appState.salesKpiOrdersPage = currentPage;
    return currentPage;
  }

  function handleSalesKpiOrdersPageChange_(direction) {
    var nextPage = normalizeSalesKpiOrdersPage_() + Number(direction || 0);
    var totalPages = getSalesKpiOrdersPageTotal_();

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.salesKpiOrdersPage) {
      return;
    }

    appState.salesKpiOrdersPage = nextPage;
    renderSalesKpiOrders_();
  }

  function renderApproverPayoutSummary_() {
    var rows = appState.approverPayoutBatches || [];
    var pending = { count: 0, amount: 0 };
    var processing = { count: 0, amount: 0 };
    var paid = { count: 0, amount: 0 };
    var total = { count: rows.length, amount: 0 };

    rows.forEach(function(row) {
      var amount = Number(row.total_komisi || 0);
      var statusKey = normalizeClientText_(row.status_payout);

      total.amount += amount;

      if (statusKey === 'dibayar') {
        paid.count += 1;
        paid.amount += amount;
      } else if (statusKey === 'diproses') {
        processing.count += 1;
        processing.amount += amount;
      } else {
        pending.count += 1;
        pending.amount += amount;
      }
    });

    setText_('approverPayoutPendingCount', formatNumber_(pending.count));
    setText_('approverPayoutPendingAmount', formatCurrencyInput_(pending.amount));
    setText_('approverPayoutProcessingCount', formatNumber_(processing.count));
    setText_('approverPayoutProcessingAmount', formatCurrencyInput_(processing.amount));
    setText_('approverPayoutPaidCount', formatNumber_(paid.count));
    setText_('approverPayoutPaidAmount', formatCurrencyInput_(paid.amount));
    setText_('approverPayoutTotalCount', formatNumber_(total.count));

  function calculateSalesCommissionSummary_() {
    var summary = {
      potensial: { count: 0, amount: 0 },
      dalam_proses: { count: 0, amount: 0 },
      siap_cair: { count: 0, amount: 0 },
      sudah_dibayar: { count: 0, amount: 0 }
    };

    (appState.salesHistoryOrders || []).forEach(function(order) {
      var statusKey = normalizeClientText_(order.status_komisi).replace(/\s+/g, '_');
      var amount = resolveCommissionAmountForStatus_(order);

      if (statusKey === 'menunggu_pembayaran' || statusKey === 'masuk_batch') {
        summary.dalam_proses.count += 1;
        summary.dalam_proses.amount += amount;
        return;
      }

      if (!summary[statusKey]) {
        return;
      }

      summary[statusKey].count += 1;
      summary[statusKey].amount += amount;
    });

    return summary;
  }

  function getFilteredSalesHistoryOrders_() {
    var query = normalizeSearchText_(appState.salesHistorySearch);
    var statusFilter = normalizeSearchText_(appState.salesHistoryStatus);

    return (appState.salesHistoryOrders || []).filter(function(row) {
      var haystack;
      var rowStatus = normalizeSearchText_(row.status_order);

      if (statusFilter && rowStatus !== statusFilter) {
        return false;
      }

      if (!query) {
        return true;
      }

      haystack = [
        row.no_so,
        row.nama_customer_input,
        row.nama_customer,
        row.item_summary,
        row.qty_summary,
        row.catatan,
        row.alasan_hold,
        row.alasan_batal
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function getSalesHistoryPageTotal_() {
    return Math.max(1, Math.ceil(getFilteredSalesHistoryOrders_().length / SALES_HISTORY_PAGE_SIZE));
  }

  function normalizeSalesHistoryPage_() {
    var totalPages = getSalesHistoryPageTotal_();
    var currentPage = Number(appState.salesHistoryPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > totalPages) {
      currentPage = totalPages;
    }

    appState.salesHistoryPage = currentPage;
    return currentPage;
  }

  function renderSalesHistoryStatusOptions_() {
    var select = document.getElementById('salesHistoryStatusFilter');
    var options = ['<option value="">Semua Status</option>'];
    var statuses = {};

    if (!select) return;

    (appState.salesHistoryOrders || []).forEach(function(row) {
      var status = String(row.status_order || '').trim();
      if (status) {
        statuses[status] = true;
      }
    });

    Object.keys(statuses).sort(function(left, right) {
      return normalizeSearchText_(left).localeCompare(normalizeSearchText_(right), 'id-ID');
    }).forEach(function(status) {
      options.push('<option value="' + escapeHtml_(status) + '">' + escapeHtml_(status) + '</option>');
    });

    select.innerHTML = options.join('');

  function renderSalesHistoryTable_() {
    var tbody = document.getElementById('salesHistoryTableBody');
    var pagination = document.getElementById('salesHistoryPagination');
    var orders = getFilteredSalesHistoryOrders_();
    var totalPages;
    var currentPage;
    var startIndex;
    var endIndex;
    var pageRows;
    var pageInfo;

    if (!tbody) return;

    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="11" class="empty-cell">Belum ada order yang cocok dengan filter.</td></tr>';
      if (pagination) {
        pagination.innerHTML = '';
      }
      return;
    }

    totalPages = getSalesHistoryPageTotal_();
    currentPage = normalizeSalesHistoryPage_();
    startIndex = (currentPage - 1) * SALES_HISTORY_PAGE_SIZE;
    endIndex = Math.min(startIndex + SALES_HISTORY_PAGE_SIZE, orders.length);
    pageRows = orders.slice(startIndex, endIndex);

    tbody.innerHTML = pageRows.map(function(row) {
      var customerName = String(row.nama_customer_input || row.nama_customer || '-').trim() || '-';
      var note = String(row.alasan_hold || row.alasan_batal || row.catatan || '-').trim() || '-';

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(String(row.no_so || '-')) + '</td>' +
          '<td>' + escapeHtml_(formatShortDateId_(row.tanggal_order || '')) + '</td>' +
          '<td>' + escapeHtml_(customerName) + '</td>' +
          '<td>' + buildOrderItemSummaryHtml_(row) + '</td>' +
          '<td>' + escapeHtml_(getOrderQtyLabel_(row)) + '</td>' +
          '<td>' + formatNumber_(row.total_final || row.total_order || row.total || 0) + '</td>' +
          '<td>' + escapeHtml_(String(row.jenis_komisi_order || '-').trim() || '-') + '</td>' +
          '<td>' + formatCommissionDisplayValue_(row) + '</td>' +
          '<td>' + buildStatusBadge_(row.status_komisi || '-') + '</td>' +
          '<td>' + buildStatusBadge_(row.status_order || '-') + '</td>' +
          '<td>' + escapeHtml_(note) + '</td>' +
        '</tr>';
    }).join('');

    if (!pagination) {
      return;
    }

    pageInfo = 'Menampilkan ' + (startIndex + 1) + '-' + endIndex + ' dari ' + orders.length + ' order';

    pagination.innerHTML = '' +
      '<div class="table-pagination-info">' + escapeHtml_(pageInfo) + '</div>' +
      '<div class="table-pagination-actions">' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleSalesHistoryPageChange_(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>Sebelumnya</button>' +
        '<span class="table-pagination-status">Halaman ' + currentPage + ' dari ' + totalPages + '</span>' +
        '<button type="button" class="ghost-btn pagination-btn" onclick="handleSalesHistoryPageChange_(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>Berikutnya</button>' +
      '</div>';
  }

  function handleSalesHistoryPageChange_(direction) {

    if (nextPage > totalPages) {

    appState.salesHistoryPage = nextPage;
    renderSalesHistoryTable_();

      var draftItem = collectSalesItemDraft_();

      if (draftItem.validationMessage) {
        setStatusText_('Detail item belum lengkap');
        renderResult_(draftItem.validationMessage, true);
        return;
      }

      appState.salesOrderItems.push(draftItem.item);
      renderSalesOrderItems_();
      resetSalesItemDraft_();
      if (draftItem.item.butuh_persetujuan_harga) {
        setStatusText_('Item ditambahkan, harga di bawah harga dasar akan masuk approval');
      } else {
        setStatusText_('Item berhasil ditambahkan ke sales order');
      }
    } catch (error) {
      setStatusText_('Gagal tambah item');
      renderResult_('Gagal tambah item: ' + (error && error.message ? error.message : error), true);
    }
  }

    renderSalesOrderItems_();

  function syncPaymentDueDateByField_(deliveryFieldId, termFieldId, dueDateFieldId) {
    var deliveryDate = normalizeDateKey_(getFieldValue_(deliveryFieldId));
    var termValue = getFieldValue_(termFieldId);
    var dueDate;

    if (!deliveryDate) {
      setFieldValue_(dueDateFieldId, '');
      return;
    }

    dueDate = addDaysToIsoDate_(deliveryDate, getPaymentTermDays_(termValue));
    setFieldValue_(dueDateFieldId, dueDate);
  }

  function getPaymentTermDays_(termValue) {
    var normalizedTerm = normalizeClientText_(termValue);
    var match = normalizedTerm.match(/(\d+)/);

    if (!normalizedTerm || normalizedTerm === 'cash') {
      return 0;
    }

    return match ? Number(match[1] || 0) : 0;
  }

  function addDaysToIsoDate_(isoDate, daysToAdd) {
    var normalizedDate = normalizeDateKey_(isoDate);
    var dateValue;

    if (!normalizedDate) {
      return '';
    }

    dateValue = new Date(normalizedDate + 'T00:00:00');
    dateValue.setDate(dateValue.getDate() + Number(daysToAdd || 0));

    return [
      dateValue.getFullYear(),
      String(dateValue.getMonth() + 1).padStart(2, '0'),
      String(dateValue.getDate()).padStart(2, '0')
    ].join('-');
  }

  function submitLoginForm_(event) {
    var userId;
    var password;
    var loginBtn = document.getElementById('loginBtn');

    event.preventDefault();
    userId = String(getFieldValue_('login_user_id') || '').trim().toUpperCase();
    password = String(getFieldValue_('login_password') || '');

    if (!userId) {
      setStatusText_('Masukkan User ID terlebih dahulu');
      renderUnauthorizedMessage_('User ID wajib diisi untuk masuk ke webapp.');
      return;
    }

    if (!password) {
      setStatusText_('Masukkan password terlebih dahulu');
      renderUnauthorizedMessage_('Password wajib diisi untuk masuk ke webapp.');
      return;
    }

    loginBtn.disabled = true;
    setStatusText_('Memeriksa kredensial login...');

    if (LAST_ASYNC_STATUS_TIMER) {
      clearTimeout(LAST_ASYNC_STATUS_TIMER);
    }
    LAST_ASYNC_STATUS_TIMER = setTimeout(function() {
      try {
        loginBtn.disabled = false;
        setStatusText_('Gagal login (timeout)');
        renderUnauthorizedMessage_('Login tidak mendapat respon. Coba refresh halaman (Ctrl+F5) atau cek log eksekusi Apps Script.');
      } catch (error) {
        // ignore
      }
    }, 15000);

    google.script.run
      .withSuccessHandler(function(profile) {
        if (LAST_ASYNC_STATUS_TIMER) {
          clearTimeout(LAST_ASYNC_STATUS_TIMER);
          LAST_ASYNC_STATUS_TIMER = null;
        }
        loginBtn.disabled = false;
        syncCurrentUser_(profile);

        if (!appState.currentUser.authorized) {
          clearSavedUserSession_();
          setStatusText_('Akses belum aktif');
          renderUnauthorizedMessage_('User ID ' + userId + ' belum terdaftar aktif di MASTER_USER.');
          renderUnauthorizedState_();
          return;
        }

        saveUserSession_(appState.currentUser.user_id);
        setFieldValue_('login_password', '');
        applyCurrentUserAccess_();
        setStatusText_('User berhasil masuk');
        renderResult_('Siap digunakan oleh ' + (appState.currentUser.nama_user || appState.currentUser.user_id), false);
        loadAllData_();
      })
      .withFailureHandler(function(error) {
        if (LAST_ASYNC_STATUS_TIMER) {
          clearTimeout(LAST_ASYNC_STATUS_TIMER);
          LAST_ASYNC_STATUS_TIMER = null;
        }
        loginBtn.disabled = false;
        clearSavedUserSession_();
        setStatusText_('Gagal login');
        renderUnauthorizedMessage_('Gagal login: ' + error.message);
      })
      .loginFromDashboard({
        user_id: userId,
        password: password
      });

  function collectSalesItemDraft_() {
    calculateTotals_();

    var namaItem = String(getFieldValue_('item') || '').trim();
    var qty = Number(getFieldValue_('qty') || 0);
    var harga = parseCurrencyInput_(getFieldValue_('harga'));
    var diskonPersen = clampDiscountPercent_(getFieldValue_('diskon'));
    var grossSubtotal = qty * harga;
    var diskon = grossSubtotal * (diskonPersen / 100);
    var subtotal = parseCurrencyInput_(getFieldValue_('line_subtotal'));
    var product = getProductByName_(namaItem);
    var hargaDasar = Number(product && (product.harga_dasar || product.harga_default) || 0);

    if (!namaItem) {
      return { validationMessage: 'Produk wajib dipilih sebelum menambah item.' };
    }

    if (!product) {
      return { validationMessage: 'Produk tidak ditemukan di master item.' };
    }

    if (hargaDasar <= 0 && harga > 0) {
      hargaDasar = harga;
    }

    if (hargaDasar <= 0) {
      return { validationMessage: 'Harga dasar produk belum diinput approver. Hubungi approver untuk melengkapi harga dasar item.' };
    }

    if (qty <= 0) {
      return { validationMessage: 'Qty item harus lebih dari 0.' };
    }

    if (harga < 0) {
      return { validationMessage: 'Harga item tidak boleh negatif.' };
    }

    if (diskonPersen < 0) {
      return { validationMessage: 'Diskon item tidak boleh negatif.' };
    }

    if (diskonPersen > 100) {
      return { validationMessage: 'Diskon item maksimal 100%.' };
    }

    return {
      validationMessage: '',
      item: {
        kode_item: product ? product.kode_item || '' : '',
        nama_item: namaItem,
        qty: qty,
        satuan: product ? product.satuan || '' : '',
        harga: harga,
        harga_dasar: hargaDasar,
        diskon: diskon,
        diskon_persen: diskonPersen,
        butuh_persetujuan_harga: harga < hargaDasar,
        subtotal: subtotal
      }
    };
  }

  function validateSalesFormPayload_(payload) {
    var requiredNewCustomerFields;

    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order wajib ditambahkan.';
    }

    if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
      return 'Tanggal Jatuh Tempo wajib diisi.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    requiredNewCustomerFields = [
      { key: 'nama_customer_input', label: 'Nama Customer' },
      { key: 'pic_customer', label: 'PIC Customer' },
      { key: 'alamat_kirim', label: 'Alamat Kirim' },
      { key: 'no_hp_customer', label: 'No. HP Customer' },
      { key: 'link_google_maps', label: 'Link Google Maps' }
    ];

    for (var i = 0; i < requiredNewCustomerFields.length; i += 1) {
      if (!String(payload[requiredNewCustomerFields[i].key] || '').trim()) {
        return requiredNewCustomerFields[i].label + ' wajib diisi untuk customer baru.';
      }
    }

    return '';
  }

  function renderSubmitResult_(result) {
    var isWarning = result.butuh_persetujuan === 'Ya';
    var statusOrder = String(result.status_order || '-').trim() || '-';
    var lines = [
      'No. SO: ' + result.no_so,
      'ID Customer: ' + (result.customer_id || '-'),
      'Jumlah Item: ' + String(result.jumlah_item || 0),
      'Status Order: ' + statusOrder,
      'Tanggal Jatuh Tempo: ' + (result.tanggal_jatuh_tempo || '-'),
      'Butuh Persetujuan: ' + result.butuh_persetujuan
    ];

    if (result.alasan_hold) {
      lines.push('Alasan Hold: ' + result.alasan_hold);
    }

    if (currentUserIsFreelance_()) {
      lines.push('Jenis Komisi: ' + (result.jenis_komisi_order || '-'));
      lines.push('Estimasi Komisi: ' + formatCommissionDisplayText_(result));
      lines.push('Status Komisi: ' + (result.status_komisi || '-'));
    }

    renderSalesSubmitResult_(result, {
      isWarning: isWarning,
      statusOrder: statusOrder
    });
    renderGlobalResultOnly_(lines.join('\n'), isWarning);

  function renderSalesSubmitResult_(result, options) {
    var card = document.getElementById('resultCard');
    var content = document.getElementById('resultContent');
    var safeOptions = options || {};
    var statusOrder = String(safeOptions.statusOrder || result.status_order || '-').trim() || '-';
    var isWarning = !!safeOptions.isWarning;
    var statusBadgeHtml = buildStatusBadge_(statusOrder);
    var guidanceHtml = isWarning
      ? '<div class="submit-guidance">Tindakan: Tunggu approver menyetujui order ini sebelum diproses lebih lanjut.</div>'
      : '<div class="submit-guidance submit-guidance-ok">Tindakan: Order sudah tercatat. Lanjut pantau status order pada proses berikutnya.</div>';

    if (!card || !content) {
      return;
    }

    card.classList.toggle('result-card-warning', isWarning);
    card.classList.toggle('result-card-success', !isWarning);

    content.className = isWarning ? 'result-warn sales-submit-result' : 'result-ok sales-submit-result';
    content.innerHTML = '' +
      '<div class="submit-kicker">' + (isWarning ? 'Perlu perhatian sales' : 'Order berhasil diproses') + '</div>' +
      '<div class="submit-meta-line"><strong>No. SO:</strong> ' + escapeHtml_(result.no_so || '-') + '</div>' +
      '<div class="submit-meta-line"><strong>ID Customer:</strong> ' + escapeHtml_(result.customer_id || '-') + '</div>' +
      '<div class="submit-meta-line"><strong>Jumlah Item:</strong> ' + escapeHtml_(String(result.jumlah_item || 0)) + '</div>' +
      '<div class="submit-meta-line submit-status-line"><strong>Status Order:</strong> ' + statusBadgeHtml + '</div>' +
      '<div class="submit-meta-line"><strong>Tanggal Jatuh Tempo:</strong> ' + escapeHtml_(result.tanggal_jatuh_tempo || '-') + '</div>' +
      '<div class="submit-meta-line"><strong>Butuh Persetujuan:</strong> ' + escapeHtml_(result.butuh_persetujuan || '-') + '</div>' +
      (currentUserIsFreelance_()
        ? '<div class="submit-commission-grid">' +
            '<div class="submit-meta-line"><strong>Jenis Komisi:</strong> ' + escapeHtml_(result.jenis_komisi_order || '-') + '</div>' +
            '<div class="submit-meta-line"><strong>Estimasi Komisi:</strong> ' + escapeHtml_(formatCommissionDisplayText_(result)) + '</div>' +
            '<div class="submit-meta-line submit-status-line"><strong>Status Komisi:</strong> ' + buildStatusBadge_(result.status_komisi || '-') + '</div>' +
          '</div>'
        : '') +
      (result.alasan_hold
        ? '<div class="submit-meta-line submit-alasan-hold"><strong>Alasan Hold:</strong> ' + escapeHtml_(result.alasan_hold || '-') + '</div>'
        : '') +
      guidanceHtml;

  function applyCurrentUserAccess_() {
    var currentUser = appState.currentUser || {};
    var roleKey = currentUser.role_key || '';
    var summary = 'Belum login';
    var appTabs = document.getElementById('appTabs');

    if (currentUser.authorized) {
      summary = (currentUser.nama_user || currentUser.user_id || '-') + ' | ' + (currentUser.role || '-') + ' | ' + (currentUser.user_id || '-');
    }

    setText_('userSummary', summary);
    document.getElementById('logoutBtn').classList.toggle('hidden', !currentUser.authorized);
    document.getElementById('authNotice').classList.toggle('hidden', !!currentUser.authorized);
    if (appTabs) {
      appTabs.classList.toggle('hidden', !currentUser.authorized);
    }

    document.querySelectorAll('.tab-btn').forEach(function(button) {
      var allowed = button.dataset.role === roleKey;
      button.classList.toggle('hidden', !allowed);
      button.disabled = !allowed;
    });

    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.toggle('hidden', panel.dataset.role !== roleKey);
      panel.classList.remove('active');
    });

    if (currentUser.authorized) {
      if (roleKey === 'cs_admin') {
        activateAdminView_('operations');
      }
      if (roleKey === 'approver') {
        activateApproverView_('approval');
      }
      if (roleKey === 'sales' || roleKey === 'approver' || roleKey === 'cs_admin' || roleKey === 'controller') {
        activateTab_(roleKey === 'cs_admin' ? 'admin' : roleKey);
      }
    }

  function getFilteredDeliveryOrders_() {
    var filterDate = normalizeDateKey_(appState.deliveryFilterDate);

    if (!filterDate) {
      return appState.deliveryOrders.slice();
    }

    return appState.deliveryOrders.filter(function(row) {
      return getDeliveryDateKey_(row) === filterDate;
    });
  }

  function getDeliveryDateKey_(row) {
    return normalizeDateKey_(row && (row.tanggal_kirim || row.tanggal_cetak || ''));
  }

  function normalizeDeliverySearchQuery_() {
    return normalizeSearchText_(appState.deliverySearch || '');
  }

  function getFilteredSearchedDeliveryOrders_(baseRows) {
    var rows = Array.isArray(baseRows) ? baseRows : getFilteredDeliveryOrders_();
    var query = normalizeDeliverySearchQuery_();

    if (query.length < 2) {
      return rows;
    }

    return rows.filter(function(row) {
      var haystacks = [
        row && row.no_surat_jalan,
        row && row.no_so,
        row && row.nama_customer
      ];

      return haystacks.some(function(value) {
        return normalizeSearchText_(value).indexOf(query) !== -1;
      });
    });
  }

  function getDeliveryPageTotal_(rows) {
    var sourceRows = Array.isArray(rows) ? rows : getFilteredSearchedDeliveryOrders_();
    return Math.max(1, Math.ceil((sourceRows.length || 0) / DELIVERY_PAGE_SIZE));
  }

  function normalizeDeliveryPage_(totalPages) {
    var maxPage = Number(totalPages || getDeliveryPageTotal_());
    var currentPage = Number(appState.deliveryPage || 1);

    if (!isFinite(currentPage) || currentPage < 1) {
      currentPage = 1;
    }

    if (currentPage > maxPage) {
      currentPage = maxPage;
    }

    appState.deliveryPage = currentPage;
    return currentPage;
  }

  function handleDeliveryPageChange_(direction) {
    var totalPages = getDeliveryPageTotal_();
    var nextPage = normalizeDeliveryPage_(totalPages) + Number(direction || 0);

    if (nextPage < 1) {
      nextPage = 1;
    }

    if (nextPage > totalPages) {
      nextPage = totalPages;
    }

    if (nextPage === appState.deliveryPage) {
      return;
    }

    appState.deliveryPage = nextPage;
    renderDeliveryTable_();
  }

  function extractAreaLabel_(alamat) {

      }).filter(Boolean);

      if (parts.length > 1) {

    }

    keywordMatch = text.match(/(serang baru|cikarang|bekasi|karawang|tangerang|bogor|depok|bandung|jakarta|serang)/i);

        var unit = String(detail.satuan || getProductUnitByName_(detail.nama_item)).trim();

  function formatLongDateId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || monthIndex > 11 || !day) {
      return String(value || '-');
    }

    return day + ' ' + monthNames[monthIndex] + ' ' + year;
  }

  function formatShortDateId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun',
      'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'
    ];
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || monthIndex > 11 || !day) {
      return String(value || '-');

    return String(day).padStart(2, '0') + ' ' + monthNames[monthIndex] + ' ' + year;

  function formatShortDateTimeId_(value) {
    var text = String(value || '').trim();
    var parsed = new Date(text);
    var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
    var day;
    var month;
    var year;
    var hours;
    var minutes;
    var datePart;

    if (!text) {
      return '-';
    }

    if (!isNaN(parsed.getTime())) {
      day = parsed.getDate();
      month = monthNames[parsed.getMonth()] || '';
      year = parsed.getFullYear();
      hours = String(parsed.getHours()).padStart(2, '0');
      minutes = String(parsed.getMinutes()).padStart(2, '0');
      datePart = String(day).padStart(2, '0') + ' ' + month + ' ' + year;
      return datePart + ', ' + hours + ':' + minutes;
    }

    datePart = formatShortDateId_(text);
    return datePart !== text ? datePart : text;
  }

  function formatShortDateLabelId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun',
      'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'
    ];
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    return String(day).padStart(2, '0') + ' ' + monthNames[monthIndex];

  function formatTimeLabelWib_(value) {
    var text = String(value || '').trim();
    var match;
    var parsed;
    var hours;
    var minutes;

    if (!text) {
      return '-';
    }

    match = text.match(/T(\d{2}):(\d{2})(?::\d{2})?$/);
    if (!match) {
      match = text.match(/^(\d{2}):(\d{2})(?::\d{2})?$/);
    }

    if (match) {
      return match[1] + ':' + match[2] + ' WIB';
    }

    parsed = new Date(text);
    if (!isNaN(parsed.getTime())) {
      hours = String(parsed.getHours()).padStart(2, '0');
      minutes = String(parsed.getMinutes()).padStart(2, '0');
      return hours + ':' + minutes + ' WIB';
    }

    return text;
  }

    }

    return [match[1], match[2], match[3]].join('-');
  }

  function copyTextToClipboard_(text, onSuccess, onFailure) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(onFailure);
      return;
    }

    var tempArea = document.createElement('textarea');
    tempArea.value = text;
    tempArea.setAttribute('readonly', 'readonly');
    tempArea.style.position = 'fixed';
    tempArea.style.top = '-9999px';
    document.body.appendChild(tempArea);
    tempArea.focus();
    tempArea.select();

    try {
      document.execCommand('copy');
      document.body.removeChild(tempArea);
      onSuccess();
    } catch (error) {
      document.body.removeChild(tempArea);
      onFailure(error);
    }
  }

    var link = document.createElement('a');

    link.href = url;
    link.download = fileName || 'download.txt';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function getControllerPresetRange_(presetKey) {
    var today = new Date();
    var start;
    var end;
    var monthStart;
    var monthEnd;

    function toIso(dateValue) {
      return [
        dateValue.getFullYear(),
        padNumber_(dateValue.getMonth() + 1),
        padNumber_(dateValue.getDate())
      ].join('-');
    }

    if (presetKey === 'week') {
      start = new Date(today);
      start.setDate(today.getDate() - ((today.getDay() + 6) % 7));
      end = new Date(today);
      return { startDate: toIso(start), endDate: toIso(end) };
    }

    if (presetKey === 'month') {
      monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      end = new Date(today);
      return { startDate: toIso(monthStart), endDate: toIso(end) };
    }

    if (presetKey === 'last_month') {
      monthStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      monthEnd = new Date(today.getFullYear(), today.getMonth(), 0);
      return { startDate: toIso(monthStart), endDate: toIso(monthEnd) };
    }

    if (presetKey === 'all') {
      return { startDate: '', endDate: '' };
    }

    return { startDate: toIso(today), endDate: toIso(today) };
  }

      google.charts.load('current', {

        controllerTrendChartReadyCallbacks_ = [];

  function getControllerTrendSeries_(rows) {
    var sourceRows = Array.isArray(rows) ? rows : [];
    var normalizedMap = {};
    var latestDateKey = '';
    var anchorDate;
    var result = [];
    var index;
    var currentDate;
    var dateKey;
    var sourceRow;

    sourceRows.forEach(function(row) {
      var rowDateKey = normalizeDateKey_(row.tanggal || '');

      if (!rowDateKey) {
        return;
      }

      normalizedMap[rowDateKey] = row;
      if (!latestDateKey || rowDateKey > latestDateKey) {
        latestDateKey = rowDateKey;
      }
    });

    anchorDate = parseIsoDateToLocal_(latestDateKey || getTodayIsoDate_());

    for (index = 6; index >= 0; index -= 1) {
      currentDate = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate() - index);
      dateKey = [
        currentDate.getFullYear(),
        String(currentDate.getMonth() + 1).padStart(2, '0'),
        String(currentDate.getDate()).padStart(2, '0')
      ].join('-');
      sourceRow = normalizedMap[dateKey] || {};
      result.push({
        tanggal: dateKey,
        shortLabel: formatShortDateLabelId_(dateKey),
        label: formatShortDateId_(dateKey),
        so_count: Number(sourceRow.so_count || 0),
        omzet: Number(sourceRow.omzet || 0),
        value: formatNumber_(sourceRow.so_count || 0),
        note: formatCurrencyInput_(sourceRow.omzet || 0)
      });
    }

    return result;
  }

  function parseIsoDateToLocal_(value) {
    var parts = normalizeDateKey_(value).split('-');
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || !day) {
      return new Date();
    }

    return new Date(year, monthIndex, day);
  }

  function buildPrintDocument_(data, options) {
    var safeOptions = options || {};

    return '' +
